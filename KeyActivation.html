<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyPulse — KeyActivation</title>
  <style>
    :root {
      --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;
      --accent:#6c63ff;--accent2:#a78bfa;
      --green:#22c55e;--red:#ef4444;--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
      --radius:14px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:24px 16px 48px;}
    .container{max-width:640px;margin:0 auto;}
    h1{font-size:22px;font-weight:800;color:var(--accent2);margin-bottom:4px;}
    .subtitle{font-size:13px;color:var(--text2);margin-bottom:24px;}
    .card{background:var(--bg2);border-radius:var(--radius);padding:18px;margin-bottom:16px;border:1px solid var(--bg3);}
    .card-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;}
    label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;}
    input,select{width:100%;background:var(--bg3);border:1px solid #475569;border-radius:10px;color:var(--text);font-size:14px;padding:10px 12px;margin-bottom:14px;outline:none;}
    input:focus,select:focus{border-color:var(--accent);}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px;transition:opacity .15s;}
    .btn:active{opacity:.75;}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-outline{background:transparent;color:var(--text2);border:1px solid var(--bg3);}
    .key-item{background:var(--bg3);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .key-code{font-family:monospace;font-size:15px;font-weight:700;color:var(--accent2);letter-spacing:.05em;flex:1;word-break:break-all;}
    .badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;}
    .badge-ok{background:#16a34a33;color:var(--green);}
    .badge-err{background:#dc262633;color:var(--red);}
    .key-meta{font-size:11px;color:var(--text3);margin-top:4px;}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:17px;padding:4px;flex-shrink:0;opacity:.6;}
    .icon-btn:hover{opacity:1;}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--bg3);color:var(--text);font-size:13px;font-weight:600;padding:10px 20px;border-radius:20px;box-shadow:0 4px 24px #0008;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
    .toast.show{opacity:1;}
    .empty{text-align:center;color:var(--text3);padding:24px;font-size:13px;}
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .count-badge{font-size:12px;background:var(--bg3);color:var(--text2);padding:2px 10px;border-radius:20px;}
    #login-screen{display:block;}
    #main-screen{display:none;}
    .login-card{max-width:360px;margin:60px auto 0;text-align:center;}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid #ffffff44;border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .progress-bar{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;margin:6px 0 4px;}
    .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;}
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div style="font-size:40px;margin-bottom:8px;">🔑</div>
    <h1>KeyActivation</h1>
    <p class="subtitle">Portal de Geração de Chaves Pro — MyPulse</p>
    <div class="card" style="text-align:left;">
      <label>Token GitHub (permissão repo)</label>
      <input type="password" id="gh-token-input" placeholder="ghp_..." autocomplete="off" spellcheck="false">
      <label>Repositório</label>
      <input type="text" id="gh-repo-input" placeholder="usuario/freemium" autocomplete="off" spellcheck="false">
      <button class="btn btn-primary" onclick="doLogin()" id="login-btn">Entrar</button>
    </div>
    <p style="font-size:11px;color:var(--text3);">Portal privado — não compartilhe o token.</p>
  </div>
</div>

<div id="main-screen">
  <div class="container">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
      <h1>🔑 KeyActivation</h1>
      <button class="btn btn-outline" style="width:auto;padding:6px 14px;font-size:12px;margin:0;" onclick="doLogout()">Sair</button>
    </div>
    <p class="subtitle" id="repo-label">MyPulse — Gestão de Chaves Pro</p>

    <div class="card">
      <div class="card-title">✨ Gerar Nova Chave</div>
      <label>Limite de ativações</label>
      <select id="key-limit">
        <option value="1">1 uso (uso único)</option>
        <option value="3">3 usos</option>
        <option value="5">5 usos</option>
        <option value="10">10 usos</option>
        <option value="999">Ilimitado</option>
      </select>
      <label>Validade</label>
      <select id="key-days">
        <option value="30">30 dias (mensal)</option>
        <option value="90">90 dias (trimestral)</option>
        <option value="365">365 dias (anual)</option>
        <option value="36500">Vitalício</option>
      </select>
      <button class="btn btn-primary" onclick="generateKey()" id="gen-btn">✨ Gerar e Salvar Chave</button>
    </div>

    <div class="card">
      <div class="section-header">
        <div class="card-title" style="margin:0;">📋 Chaves Geradas</div>
        <span class="count-badge" id="key-count">—</span>
      </div>
      <div id="keys-list"><div class="empty">Carregando...</div></div>
      <button class="btn btn-outline" style="margin-top:8px;" onclick="loadKeys()">🔄 Atualizar lista</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let GH_TOKEN = '', GH_REPO = '', FILE_SHA = '', DADOS = null;

// Toast
let _tt;
function toast(msg, type) {
  const el = document.getElementById('toast');
  const ico = type === 'ok' ? '✅' : type === 'err' ? '❌' : 'ℹ️';
  el.textContent = ico + ' ' + msg;
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 2800);
}

// Login
async function doLogin() {
  const token = document.getElementById('gh-token-input').value.trim();
  const repo  = document.getElementById('gh-repo-input').value.trim();
  if (!token || !repo) { toast('Preencha token e repositório', 'err'); return; }
  const btn = document.getElementById('login-btn');
  btn.innerHTML = '<span class="spinner"></span>Verificando...';
  btn.disabled = true;
  try {
    const res = await fetch(`https://api.github.com/repos/${repo}/contents/dados.json`, {
      headers: { Authorization: 'token ' + token }
    });
    if (!res.ok) throw new Error('Token ou repositório inválido (HTTP ' + res.status + ')');
    GH_TOKEN = token; GH_REPO = repo;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display  = 'block';
    document.getElementById('repo-label').textContent = repo + ' — Chaves Pro';
    await loadKeys();
  } catch(e) {
    toast(e.message, 'err');
  } finally {
    btn.innerHTML = 'Entrar'; btn.disabled = false;
  }
}

function doLogout() {
  GH_TOKEN = GH_REPO = FILE_SHA = '';
  DADOS = null;
  document.getElementById('login-screen').style.display = 'block';
  document.getElementById('main-screen').style.display  = 'none';
  document.getElementById('gh-token-input').value = '';
}

// GitHub helpers
async function loadDados() {
  const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/dados.json`, {
    headers: { Authorization: 'token ' + GH_TOKEN }
  });
  if (!res.ok) throw new Error('Erro ao carregar dados.json (' + res.status + ')');
  const meta = await res.json();
  FILE_SHA = meta.sha;
  DADOS = JSON.parse(atob(meta.content.replace(/\n/g, '')));
  if (!DADOS.security) DADOS.security = {};
  if (!Array.isArray(DADOS.security.validProKeys)) DADOS.security.validProKeys = [];
}

async function saveDados(msg) {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(DADOS, null, 2))));
  const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/dados.json`, {
    method: 'PUT',
    headers: { Authorization: 'token ' + GH_TOKEN, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg, content, sha: FILE_SHA })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.message || 'Erro ao salvar'); }
  const r = await res.json();
  FILE_SHA = r.content.sha;
}

// Gerar chave
async function generateKey() {
  const limit = parseInt(document.getElementById('key-limit').value);
  const days  = parseInt(document.getElementById('key-days').value);
  const btn   = document.getElementById('gen-btn');
  btn.innerHTML = '<span class="spinner"></span>Salvando...'; btn.disabled = true;
  try {
    await loadDados();
    const r = () => Math.random().toString(36).substring(2,6).toUpperCase();
    const key = 'PRO-' + new Date().getFullYear() + '-' + r() + '-' + r();
    DADOS.security.validProKeys.push({ key, limit, uses: 0, days, createdAt: new Date().toISOString(), lastUsedAt: null });
    await saveDados('key: generate ' + key);
    toast('Chave ' + key + ' criada!', 'ok');
    renderKeys();
  } catch(e) { toast(e.message, 'err'); }
  finally { btn.innerHTML = '✨ Gerar e Salvar Chave'; btn.disabled = false; }
}

// Carregar chaves
async function loadKeys() {
  document.getElementById('keys-list').innerHTML = '<div class="empty">Carregando...</div>';
  try { await loadDados(); renderKeys(); }
  catch(e) { document.getElementById('keys-list').innerHTML = '<div class="empty">Erro ao carregar.</div>'; toast(e.message, 'err'); }
}

// Renderizar
function renderKeys() {
  const all  = DADOS?.security?.validProKeys || [];
  const keys = all.slice().reverse();
  document.getElementById('key-count').textContent = all.length + ' chave' + (all.length !== 1 ? 's' : '');
  const list = document.getElementById('keys-list');
  if (!keys.length) { list.innerHTML = '<div class="empty">Nenhuma chave criada ainda.</div>'; return; }
  list.innerHTML = keys.map((k, ri) => {
    const realIdx = all.length - 1 - ri;
    const esgotada = k.uses >= k.limit && k.limit !== 999;
    const badge = esgotada ? '<span class="badge badge-err">Esgotada</span>' : '<span class="badge badge-ok">Ativa</span>';
    const pct = k.limit === 999 ? 0 : Math.min(100, (k.uses / k.limit) * 100);
    const bar = k.limit !== 999 ? `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>` : '';
    const val = k.days >= 36500 ? 'Vitalícia' : k.days + 'd';
    const cr  = k.createdAt ? new Date(k.createdAt).toLocaleDateString('pt-BR') : '—';
    const lu  = k.lastUsedAt ? new Date(k.lastUsedAt).toLocaleDateString('pt-BR') : 'Nunca';
    return `<div class="key-item">
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">${badge}<span class="key-code">${k.key}</span></div>
        ${bar}
        <div class="key-meta">Usos: ${k.uses}/${k.limit===999?'∞':k.limit} · Val: ${val} · Criada: ${cr} · Ativação: ${lu}</div>
      </div>
      <button class="icon-btn" title="Copiar" onclick="copyKey('${k.key}')">📋</button>
      <button class="icon-btn" title="Revogar" onclick="revokeKey(${realIdx})" style="color:#ef4444;">🗑</button>
    </div>`;
  }).join('');
}

// Copiar
function copyKey(k) {
  navigator.clipboard.writeText(k).then(() => toast('Copiada: ' + k, 'ok')).catch(() => prompt('Copie:', k));
}

// Revogar
async function revokeKey(idx) {
  const key = DADOS.security.validProKeys[idx]?.key;
  if (!key || !confirm('Revogar a chave ' + key + '?\nEla não poderá mais ser usada.')) return;
  toast('Revogando...', 'info');
  try {
    await loadDados();
    const i = DADOS.security.validProKeys.findIndex(k => k.key === key);
    if (i === -1) { toast('Chave não encontrada', 'err'); return; }
    DADOS.security.validProKeys.splice(i, 1);
    await saveDados('key: revoke ' + key);
    toast(key + ' revogada.', 'ok');
    renderKeys();
  } catch(e) { toast(e.message, 'err'); }
}

// Enter no login
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const id = document.activeElement?.id;
  if (id === 'gh-token-input' || id === 'gh-repo-input') doLogin();
});
</script>
</body>
</html>
