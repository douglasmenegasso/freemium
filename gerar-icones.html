<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gerar Ícones Kayla</title>
    <style>
        body { background: #12121a; color: #fff; font-family: Arial; text-align: center; padding: 50px; }
        button { background: #7c5cfc; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 10px; cursor: pointer; margin: 20px; }
        button:hover { background: #9b82fc; }
        canvas { border-radius: 20px; margin: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <h1>🎨 Gerador de Ícones Kayla</h1>
    <p>Clique no botão para baixar os ícones com o nome "Kayla"</p>
    <canvas id="preview" width="192" height="192"></canvas>
    <br>
    <button onclick="baixarTodos()">📥 BAIXAR TODOS OS ÍCONES</button>
    
    <script>
        function desenhar(ctx, size) {
            // Fundo
            ctx.fillStyle = '#12121a';
            ctx.fillRect(0, 0, size, size);
            
            // Sacola roxa
            ctx.fillStyle = '#7c5cfc';
            const s = size / 192;
            ctx.beginPath();
            ctx.moveTo(56*s, 80*s);
            ctx.lineTo(136*s, 80*s);
            ctx.lineTo(136*s, 136*s);
            ctx.quadraticCurveTo(136*s, 152*s, 120*s, 152*s);
            ctx.lineTo(72*s, 152*s);
            ctx.quadraticCurveTo(56*s, 152*s, 56*s, 136*s);
            ctx.fill();
            
            // Alça
            ctx.strokeStyle = '#7c5cfc';
            ctx.lineWidth = 8*s;
            ctx.beginPath();
            ctx.moveTo(76*s, 80*s);
            ctx.arc(96*s, 64*s, 20*s, Math.PI, 0, true);
            ctx.lineTo(116*s, 80*s);
            ctx.stroke();
            
            // Gráfico
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 5*s;
            ctx.beginPath();
            ctx.moveTo(72*s, 115*s);
            ctx.lineTo(88*s, 131*s);
            ctx.lineTo(112*s, 99*s);
            ctx.stroke();
            
            // Texto Kayla
            ctx.fillStyle = '#a0a0b0';
            ctx.font = 'bold ' + (22*s) + 'px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Kayla', size/2, size*0.87);
        }
        
        function baixar(canvas, nome) {
            const link = document.createElement('a');
            link.download = nome;
            link.href = canvas.toDataURL();
            link.click();
        }
        
        function baixarTodos() {
            const sizes = [
                {s: 192, n: 'icon-192-dark.png'},
                {s: 512, n: 'icon-512-dark.png'},
                {s: 180, n: 'apple-touch-icon-dark.png'},
                {s: 192, n: 'apple-touch-icon.png'},
                {s: 192, n: 'icon-192.png'},
                {s: 512, n: 'icon-512.png'}
            ];
            
            sizes.forEach((item, i) => {
                setTimeout(() => {
                    const c = document.createElement('canvas');
                    c.width = c.height = item.s;
                    const ctx = c.getContext('2d');
                    desenhar(ctx, item.s);
                    baixar(c, item.n);
                }, i * 300);
            });
            
            setTimeout(() => alert('✅ Ícones baixados! Agora suba no GitHub substituindo os antigos.'), 2000);
        }
        
        // Preview
        const canvas = document.getElementById('preview');
        const ctx = canvas.getContext('2d');
        desenhar(ctx, 192);
    </script>
</body>
</html>
