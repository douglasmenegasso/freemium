<!DOCTYPE html>
<html>
<head>
    <title>Atualizando...</title>
    <script>
        // 1. Limpa Service Workers
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let registration of registrations) {
                    registration.unregister();
                }
            });
        }
        // 2. Limpa Caches
        if ('caches' in window) {
            caches.keys().then(names => {
                for (let name of names) caches.delete(name);
            });
        }
        // 3. Limpa LocalStorage de controle
        localStorage.removeItem('last_sw_reset');
        
        // 4. Redireciona para o novo arquivo limpo
        setTimeout(() => {
            window.location.href = 'app.html?v=' + Date.now();
        }, 1000);
    </script>
</head>
<body style="background:#0f172a;color:white;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;">
    <div style="text-align:center;">
        <div style="font-size:24px;margin-bottom:10px;">🚀 Atualizando MyPulse...</div>
        <div style="color:#94a3b8;">Limpando cache e carregando nova versão v4.1.0</div>
    </div>
</body>
</html>
