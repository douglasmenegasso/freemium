<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>Kayla Consignado</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f0f13; --bg2: #1a1a24; --bg3: #252530; --text: #fff; --text2: #a0a0b0; --text3: #606070; --accent: #7c5cfc; --border: #2a2a35; --success: #00c853; --error: #ff1744; --radius: 12px; --radius-sm: 8px; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #login-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 30px 20px; width: 100%; max-width: 360px; text-align: center; }
        .login-logo { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 20px; }
        .login-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .login-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
        .btn { display: flex; align-items: center; justify-content: center; padding: 14px 20px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; border: none; width: 100%; margin-bottom: 12px; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-red { background: var(--error); color: #fff; }
        #app { display: none; flex-direction: column; height: 100vh; position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
        .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 16px; flex-shrink: 0; }
        .header-title { font-size: 18px; font-weight: 700; }
        .header-sub { font-size: 12px; color: var(--text2); }
        .content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 90px; }
        .nav { background: var(--bg2); border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; justify-content: space-around; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 2px; cursor: pointer; border: none; background: transparent; color: var(--text2); font-size: 11px; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn .icon { font-size: 20px; }
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
        .form-group { margin-bottom: 14px; text-align: left; }
        .form-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; }
        .form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; color: var(--text); font-size: 15px; }
        #modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 2500; display: none; align-items: flex-end; justify-content: center; }
        #modal-overlay.show { display: flex; }
        .modal-content { background: var(--bg2); border-radius: 20px 20px 0 0; padding: 24px 20px; width: 100%; max-width: 500px; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 8px; }
        .modal-sub { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 20px; }
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 3000; }
        .toast { padding: 12px 20px; border-radius: var(--radius-sm); margin-bottom: 8px; text-align: center; animation: fadeIn 0.3s; }
        .toast.success { background: var(--success); color: #fff; }
        .toast.error { background: var(--error); color: #fff; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <img src="icon-192-dark.png" class="login-logo" alt="Kayla">
            <div class="login-title">Kayla Consignado</div>
            <div class="login-sub">Selecione seu perfil de acesso</div>
            <button class="btn btn-primary" onclick="abrirLogin('admin')">👑 Administrador</button>
            <button class="btn btn-outline" onclick="abrirLogin('user')">👤 Usuário</button>
            <div style="font-size:11px;color:var(--text3);margin-top:20px">v4.1.4</div>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <div class="header-title">📦 Kayla Consignado</div>
            <div class="header-sub" id="header-sub">Scanner</div>
        </div>
        <div class="content" id="content"></div>
        <div class="nav">
            <button class="nav-btn active" onclick="mudarAba('scan')"><span class="icon">⚡</span>Escanear</button>
            <button class="nav-btn" onclick="mudarAba('clients')"><span class="icon">👥</span>Clientes</button>
            <button class="nav-btn" onclick="mudarAba('products')"><span class="icon">🏷️</span>Produtos</button>
            <button class="nav-btn" onclick="mudarAba('orders')"><span class="icon">📋</span>Pedidos</button>
            <button class="nav-btn" onclick="mudarAba('history')"><span class="icon">📊</span>Histórico</button>
            <button class="nav-btn" onclick="mudarAba('settings')"><span class="icon">⚙️</span>Config</button>
        </div>
    </div>

    <div id="modal-overlay" onclick="fecharModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-body"></div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        var supabaseClient = null;
        var currentUser = null;
        var perfilAtual = null;

        window.addEventListener('DOMContentLoaded', function() {
            console.log('Iniciando Kayla...');
            try {
                supabaseClient = supabase.createClient('https://xwwklngrkvdwgiinycvt.supabase.co', 'sb_publishable_2Viwv3t4SvejW4SEfvpxGA_5K5thi7S');
                console.log('Supabase OK');
            } catch(e) { console.error('Erro:', e); }
            verificarSessao();
        });

        async function verificarSessao() {
            if (!supabaseClient) { mostrarLogin(); return; }
            var result = await supabaseClient.auth.getSession();
            if (result.data && result.data.session && result.data.session.user) {
                currentUser = result.data.session.user;
                mostrarApp();
            } else {
                mostrarLogin();
            }
        }

        function mostrarLogin() {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }

        function mostrarApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            mudarAba('scan');
        }

        function abrirLogin(tipo) {
            perfilAtual = tipo;
            var titulo = tipo === 'admin' ? '👑 Login Admin' : '👤 Login Usuário';
            var html = '<div class="modal-title">' + titulo + '</div>';
            html += '<div class="modal-sub">Digite suas credenciais</div>';
            html += '<div class="form-group"><label class="form-label">E-mail</label><input class="form-input" id="email" type="email" placeholder="seu@email.com"></div>';
            html += '<div class="form-group"><label class="form-label">Senha</label><input class="form-input" id="senha" type="password" placeholder="Sua senha"></div>';
            html += '<button class="btn btn-primary" onclick="fazerLogin()">Entrar</button>';
            html += '<button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>';
            document.getElementById('modal-body').innerHTML = html;
            document.getElementById('modal-overlay').classList.add('show');
            setTimeout(function() { document.getElementById('email').focus(); }, 100);
        }

        async function fazerLogin() {
            var email = document.getElementById('email').value.trim();
            var senha = document.getElementById('senha').value;
            if (!email || !senha) { toast('Preencha e-mail e senha', 'error'); return; }
            var btn = event.target;
            var textoAntigo = btn.innerText;
            btn.innerText = 'Entrando...';
            btn.disabled = true;
            try {
                var result = await supabaseClient.auth.signInWithPassword({ email: email, password: senha });
                if (result.error) throw result.error;
                currentUser = result.data.user;
                localStorage.setItem('perfilAcesso', perfilAtual);
                fecharModal();
                toast('Bem-vindo!', 'success');
                mostrarApp();
            } catch (error) {
                toast('Erro: ' + error.message, 'error');
                btn.innerText = textoAntigo;
                btn.disabled = false;
            }
        }

        async function fazerLogout() {
            if (supabaseClient) await supabaseClient.auth.signOut();
            localStorage.removeItem('perfilAcesso');
            currentUser = null;
            toast('Logout realizado', 'success');
            mostrarLogin();
        }

        function mudarAba(aba) {
            document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
            event.currentTarget.classList.add('active');
            var content = document.getElementById('content');
            var sub = document.getElementById('header-sub');
            if (aba === 'scan') { sub.textContent = 'Scanner'; content.innerHTML = '<div class="card"><p style="text-align:center;color:var(--text2);padding:40px">Área do scanner</p></div>'; }
            else if (aba === 'clients') { sub.textContent = 'Clientes'; content.innerHTML = '<div class="card"><button class="btn btn-primary">+ Novo Cliente</button></div>'; }
            else if (aba === 'products') { sub.textContent = 'Produtos'; content.innerHTML = '<div class="card"><button class="btn btn-primary">+ Novo Produto</button></div>'; }
            else if (aba === 'orders') { sub.textContent = 'Pedidos'; content.innerHTML = '<div class="card"><p style="text-align:center;color:var(--text2);padding:20px">Nenhum pedido</p></div>'; }
            else if (aba === 'history') { sub.textContent = 'Histórico'; content.innerHTML = '<div class="card"><p style="text-align:center;color:var(--text2);padding:20px">Nenhuma venda</p></div>'; }
            else if (aba === 'settings') { 
                sub.textContent = 'Configurações'; 
                content.innerHTML = '<div class="card"><div class="form-group"><label class="form-label">Usuário</label><div style="background:var(--bg3);padding:12px;border-radius:8px">' + (currentUser ? currentUser.email : 'Não logado') + '</div></div><button class="btn btn-red" onclick="fazerLogout()">🚪 Sair</button></div>'; 
            }
        }

        function fecharModal(e) {
            if (!e || e.target.id === 'modal-overlay') {
                document.getElementById('modal-overlay').classList.remove('show');
                document.getElementById('modal-body').innerHTML = '';
            }
        }

        function toast(msg, tipo) {
            var container = document.getElementById('toast-container');
            var el = document.createElement('div');
            el.className = 'toast ' + tipo;
            el.textContent = msg;
            container.appendChild(el);
            setTimeout(function() { el.style.opacity = '0'; setTimeout(function() { el.remove(); }, 300); }, 3000);
        }
    </script>
</body>
</html>
