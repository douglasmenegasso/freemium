<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>Kayla Consignado</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f0f13; --bg2: #1a1a24; --bg3: #252530;
            --text: #ffffff; --text2: #a0a0b0; --text3: #606070;
            --accent: #7c5cfc; --accent2: #9b82fc; --border: #2a2a35;
            --success: #00c853; --error: #ff1744; --radius: 12px; --radius-sm: 8px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100dvh; position: fixed; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; }
        .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 16px; flex-shrink: 0; }
        .header-title { font-size: 18px; font-weight: 700; }
        .header-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
        .content { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; padding-bottom: 90px; min-height: 0; }
        .nav { background: var(--bg2); border-top: 1px solid var(--border); display: flex; flex-shrink: 0; position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); justify-content: space-around; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 2px 12px; cursor: pointer; border: none; background: transparent; color: var(--text2); font-size: 11px; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn .icon { font-size: 20px; }
        
        /* TELA DE LOGIN */
        #login-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 30px 20px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-logo { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 20px; object-fit: cover; }
        .login-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .login-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
        
        /* BOTÕES E FORMS */
        .btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 20px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; border: none; width: 100%; transition: transform 0.1s; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-red { background: var(--error); color: #fff; }
        .login-btn { margin-bottom: 12px; }
        .form-group { margin-bottom: 14px; text-align: left; }
        .form-label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; display: block; }
        .form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; color: var(--text); font-size: 15px; outline: none; }
        .form-input:focus { border-color: var(--accent); }
        
        /* CARDS */
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
        .card-title { font-size: 14px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px; }
        
        /* TOAST */
        #toast-root { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 3000; display: flex; flex-direction: column; gap: 8px; width: 90%; max-width: 300px; pointer-events: none; }
        .toast { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; text-align: center; animation: slideDown 0.3s ease; }
        .toast.success { background: var(--success); color: #fff; }
        .toast.error { background: var(--error); color: #fff; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* MODAL - CORREÇÃO AQUI */
        #modal-root { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 2500; display: none; align-items: flex-end; justify-content: center; }
        #modal-root.show { display: flex; }
        #modal-root::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); }
        .modal-content { position: relative; background: var(--bg2); border-radius: 20px 20px 0 0; padding: 24px 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s ease; z-index: 1; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
        .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; text-align: center; }
        .modal-sub { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <!-- TELA DE LOGIN -->
    <div id="login-screen">
        <div class="login-card">
            <img src="icon-192-dark.png" alt="Kayla" class="login-logo">
            <div class="login-title">Kayla Consignado</div>
            <div class="login-sub">Selecione seu perfil de acesso</div>
            <button class="btn btn-primary login-btn" onclick="solicitarLogin('admin')">👑 Administrador</button>
            <button class="btn btn-outline login-btn" onclick="solicitarLogin('user')">👤 Usuário</button>
            <div style="font-size:11px; color:var(--text3); margin-top:20px;">v4.1.4</div>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="app" style="display:none;">
        <div class="header">
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <div>
                    <div class="header-title">📦 Kayla Consignado</div>
                    <div class="header-sub" id="header-sub">Selecione um cliente</div>
                </div>
            </div>
        </div>
        <div class="content" id="content"></div>
        <div class="nav">
            <button class="nav-btn active" id="nav-scan" onclick="showTab('scan')"><span class="icon">⚡</span>Escanear</button>
            <button class="nav-btn" id="nav-clients" onclick="showTab('clients')"><span class="icon">👥</span>Clientes</button>
            <button class="nav-btn" id="nav-products" onclick="showTab('products')"><span class="icon">🏷️</span>Produtos</button>
            <button class="nav-btn" id="nav-orders" onclick="showTab('orders')"><span class="icon">📋</span>Pedidos</button>
            <button class="nav-btn" id="nav-history" onclick="showTab('history')"><span class="icon">📊</span>Histórico</button>
            <button class="nav-btn" id="nav-settings" onclick="showTab('settings')"><span class="icon">⚙️</span>Config</button>
        </div>
    </div>

    <!-- MODAL E TOAST -->
    <div id="modal-root"></div>
    <div id="toast-root"></div>

    <script>
        // VARIÁVEIS GLOBAIS
        let supabaseClient = null;
        let currentUser = null;
        let currentProfile = null;
        const SUPABASE_URL = 'https://xwwklngrkvdwgiinycvt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_2Viwv3t4SvejW4SEfvpxGA_5K5thi7S';

        // INICIALIZAÇÃO
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 Kayla Consignado iniciando...');
            try {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                console.log('✅ Supabase conectado');
            } catch(e) { console.error('Erro Supabase:', e); }
            checkSessionAndLoad();
        });

        // VERIFICA SESSÃO
        async function checkSessionAndLoad() {
            console.log('🔍 Verificando sessão...');
            if (!supabaseClient) { showLoginScreen(); return; }
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session && session.user) {
                console.log('✅ Usuário logado:', session.user.email);
                currentUser = session.user;
                showApp();
            } else {
                console.log('❌ Sem sessão. Mostrando login.');
                showLoginScreen();
            }
        }

        function showLoginScreen() {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            showTab('scan');
        }

        // LOGIN
        function solicitarLogin(tipo) {
            currentProfile = tipo;
            const html = `
                <div class="modal-handle"></div>
                <div class="modal-title">${tipo === 'admin' ? '👑' : '👤'} Login ${tipo === 'admin' ? 'Administrador' : 'Usuário'}</div>
                <div class="modal-sub">Digite suas credenciais</div>
                <div class="form-group"><label class="form-label">E-mail</label><input class="form-input" id="login-email" type="email" placeholder="seu@email.com"></div>
                <div class="form-group"><label class="form-label">Senha</label><input class="form-input" id="login-senha" type="password" placeholder="Sua senha"></div>
                <button class="btn btn-primary" onclick="fazerLogin()">Entrar</button>
                <button class="btn btn-outline" onclick="closeModal()" style="margin-top:10px">Cancelar</button>
            `;
            showModal(html);
            setTimeout(() => document.getElementById('login-email')?.focus(), 100);
        }

        async function fazerLogin() {
            const email = document.getElementById('login-email').value.trim();
            const senha = document.getElementById('login-senha').value;
            if (!email || !senha) { toast('Preencha e-mail e senha', 'error'); return; }
            const btn = event.target;
            const textoOriginal = btn.innerText;
            btn.innerText = '⏳ Entrando...';
            btn.disabled = true;
            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: senha });
                if (error) throw error;
                currentUser = data.user;
                localStorage.setItem('perfilAcesso', currentProfile);
                closeModal();
                toast('Bem-vindo!', 'success');
                showApp();
            } catch (error) {
                toast('Erro: ' + error.message, 'error');
                btn.innerText = textoOriginal;
                btn.disabled = false;
            }
        }

        // LOGOUT
        async function fazerLogout() {
            if (supabaseClient) await supabaseClient.auth.signOut();
            localStorage.removeItem('perfilAcesso');
            currentUser = null;
            currentProfile = null;
            toast('Logout realizado', 'success');
            showLoginScreen();
        }

        // NAVEGAÇÃO
        function showTab(tabName) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('nav-' + tabName)?.classList.add('active');
            const content = document.getElementById('content');
            const headerSub = document.getElementById('header-sub');
            const tabs = {
                scan: { title: 'Scanner', html: '<div class="card"><div class="card-title">⚡ Escanear Produto</div><p style="color:var(--text3);text-align:center;padding:40px">Área do scanner</p></div>' },
                clients: { title: 'Clientes', html: '<div class="card"><div class="card-title">👥 Clientes</div><button class="btn btn-primary" style="margin-bottom:12px">+ Novo Cliente</button></div>' },
                products: { title: 'Produtos', html: '<div class="card"><div class="card-title">🏷️ Produtos</div><button class="btn btn-primary" style="margin-bottom:12px">+ Novo Produto</button></div>' },
                orders: { title: 'Pedidos', html: '<div class="card"><div class="card-title">📋 Pedidos</div><p style="color:var(--text3);text-align:center;padding:20px">Nenhum pedido em aberto</p></div>' },
                history: { title: 'Histórico', html: '<div class="card"><div class="card-title">📊 Histórico</div><p style="color:var(--text3);text-align:center;padding:20px">Nenhuma venda registrada</p></div>' },
                settings: { title: 'Config', html: `<div class="card"><div class="card-title">⚙️ Configurações</div><div class="form-group"><label class="form-label">Usuário Logado</label><div style="background:var(--bg3);padding:12px;border-radius:var(--radius-sm)">${currentUser?.email || 'Não logado'}</div></div><button class="btn btn-red" onclick="fazerLogout()" style="margin-top:10px">🚪 Sair / Logout</button></div>` }
            };
            headerSub.textContent = tabs[tabName].title;
            content.innerHTML = tabs[tabName].html;
        }

        // MODAL - CORREÇÃO AQUI
        function showModal(htmlContent) {
            const modal = document.getElementById('modal-root');
            modal.innerHTML = `<div class="modal-content">${htmlContent}</div>`;
            modal.classList.add('show');
        }

        function closeModal() {
            const modal = document.getElementById('modal-root');
            modal.innerHTML = '';
            modal.classList.remove('show');
        }

        // TOAST
        function toast(message, type = 'success') {
            const root = document.getElementById('toast-root');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = message;
            root.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
        }

        // Fecha modal ao clicar fora
        document.getElementById('modal-root').addEventListener('click', (e) => {
            if (e.target.id === 'modal-root') closeModal();
        });
    </script>
</body>
</html>
