<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="google" content="notranslate">
<title>Kayla - Venda Consignada</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root { --bg: #0f0f13; --bg2: #1a1a24; --bg3: #252530; --text: #fff; --text2: #a0a0b0; --text3: #606070; --accent: #7c5cfc; --accent2: #9b82fc; --border: #2a2a35; --success: #00c853; --error: #ff1744; --warning: #ffab00; --radius: 12px; --radius-sm: 8px; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }

#login-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
.login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 30px 20px; width: 100%; max-width: 360px; text-align: center; }
.login-logo { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 20px; }
.login-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.login-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }

.btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 20px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; border: none; width: 100%; margin-bottom: 12px; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-red { background: var(--error); color: #fff; }
.btn-green { background: var(--success); color: #fff; }
.btn-warning { background: var(--warning); color: #000; }
.btn-sm { padding: 10px 16px; font-size: 13px; width: auto; }

#app { display: none; flex-direction: column; height: 100vh; position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
.header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 16px; flex-shrink: 0; }
.header-title { font-size: 18px; font-weight: 700; }
.header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 90px; }
.nav { background: var(--bg2); border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 2px; cursor: pointer; border: none; background: transparent; color: var(--text2); font-size: 11px; }
.nav-btn.active { color: var(--accent); }
.nav-btn .icon { font-size: 20px; margin-bottom: 2px; }

.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.card-title { font-size: 14px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.form-group { margin-bottom: 14px; text-align: left; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; text-transform: uppercase; }
.form-input, .form-select { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; color: var(--text); font-size: 15px; outline: none; }
.form-input:focus, .form-select:focus { border-color: var(--accent); }
.form-select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a0a0b0' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 12px center; background-size: 18px; padding-right: 40px; }

.checkbox-group { display: flex; align-items: center; gap: 8px; margin: 12px 0; }
.checkbox-group input { width: 18px; height: 18px; }

.item-list { display: flex; flex-direction: column; gap: 8px; }
.item-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.item-card:active { background: var(--bg2); }
.item-info { flex: 1; min-width: 0; }
.item-name { font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-detail { font-size: 13px; color: var(--text3); }

#reader { width: 100%; border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 12px; }

#modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 2500; display: none; align-items: flex-end; justify-content: center; }
#modal-overlay.show { display: flex; }
.modal-content { background: var(--bg2); border-radius: 20px 20px 0 0; padding: 24px 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
.modal-sub { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 20px; }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }

#toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 3000; width: 90%; max-width: 300px; }
.toast { padding: 12px 20px; border-radius: var(--radius-sm); margin-bottom: 8px; text-align: center; animation: fadeIn 0.3s; }
.toast.success { background: var(--success); color: #fff; }
.toast.error { background: var(--error); color: #fff; }
.toast.warning { background: var(--warning); color: #000; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

.badge-free { background: var(--text3); color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-pro { background: var(--accent); color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-online { background: var(--success); color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.badge-offline { background: var(--text3); color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; }

.order-item { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px; }
.order-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.order-item-name { font-weight: 600; font-size: 15px; flex: 1; margin-right: 8px; }
.order-item-price { color: var(--accent); font-weight: 700; white-space: nowrap; }
.order-item-controls { display: flex; align-items: center; gap: 8px; }
.qty-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg2); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.qty-btn:active { background: var(--accent); }
.qty-value { min-width: 40px; text-align: center; font-weight: 700; font-size: 16px; }
.order-item-remove { color: var(--error); font-size: 12px; margin-left: 8px; cursor: pointer; text-decoration: underline; }

.order-total { background: var(--bg3); border-radius: var(--radius-sm); padding: 16px; margin-top: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; font-weight: 700; }
.order-total span:last-child { color: var(--accent); font-size: 22px; }

.client-selected { background: var(--success); color: #fff; padding: 8px 12px; border-radius: var(--radius-sm); margin-bottom: 12px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
.client-selected span { font-weight: 600; }

.empty-state { text-align: center; color: var(--text3); padding: 30px 20px; }

.limit-warning { background: var(--warning); color: #000; padding: 12px; border-radius: var(--radius-sm); margin: 12px 0; text-align: center; font-weight: 600; }

.product-history { background: var(--bg3); border-left: 3px solid var(--warning); padding: 8px 12px; margin: 8px 0; border-radius: 4px; font-size: 12px; color: var(--text2); }
.product-history strong { color: var(--warning); }

.config-section { margin-bottom: 20px; }
.config-section-title { font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

.logo-preview { width: 100px; height: 100px; border: 2px dashed var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin: 12px 0; overflow: hidden; }
.logo-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }

.file-input-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
.file-input-wrapper input[type=file] { position: absolute; left: -9999px; }
.file-input-label { display: block; padding: 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); text-align: center; cursor: pointer; }
.file-input-label:hover { border-color: var(--accent); }

.product-modal-list { max-height: 400px; overflow-y: auto; }
.product-search-box { position: relative; margin-bottom: 16px; }
.product-search-box input { width: 100%; padding: 12px 16px 12px 44px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; color: var(--text); }
.product-search-box::before { content: '🔍'; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; }
.product-item-add { display: flex; justify-content: space-between; align-items: center; padding: 14px; background: var(--bg3); border-radius: var(--radius-sm); margin-bottom: 8px; cursor: pointer; }
.product-item-add:active { background: var(--bg2); }
.product-item-info { flex: 1; }
.product-item-name { font-weight: 600; margin-bottom: 4px; }
.product-item-code-price { font-size: 13px; color: var(--text3); }
.btn-add-product { width: 36px; height: 36px; border-radius: 10px; background: var(--accent); color: #fff; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.btn-add-product:active { transform: scale(0.95); }

.sync-info { background: var(--bg3); padding: 12px; border-radius: var(--radius-sm); margin: 12px 0; font-size: 12px; color: var(--text2); }
.sync-info strong { color: var(--success); }

.whatsapp-btn { background: #25D366; color: #fff; margin-top: 12px; }
.whatsapp-btn:hover { background: #128C7E; }

.backup-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }

.qty-selector { display: flex; align-items: center; justify-content: center; gap: 16px; margin: 20px 0; }
.qty-selector .qty-btn { width: 44px; height: 44px; font-size: 24px; }
.qty-selector .qty-value { font-size: 28px; min-width: 60px; }
.qty-selector-label { text-align: center; color: var(--text2); font-size: 12px; margin-bottom: 8px; text-transform: uppercase; }

.update-banner { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; padding: 16px; border-radius: var(--radius); margin-bottom: 16px; display: none; }
.update-banner.show { display: block; }
.update-banner-title { font-weight: 700; margin-bottom: 8px; }
.update-banner-text { font-size: 13px; margin-bottom: 12px; opacity: 0.9; }
.update-banner button { margin-top: 8px; }

#exit-toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 12px 24px; border-radius: var(--radius-sm); font-size: 14px; z-index: 3500; display: none; }

.menu-item { padding: 16px; background: var(--bg3); border-radius: var(--radius-sm); margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.menu-item:active { background: var(--bg2); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
    <div class="login-card">
        <img src="icon-192-dark.png" class="login-logo" alt="Kayla">
        <div class="login-title">Kayla - Venda Consignada</div>
        <div class="login-sub">Selecione seu perfil de acesso</div>
        <button class="btn btn-primary" onclick="abrirLogin('admin')">👑 Administrador</button>
        <button class="btn btn-outline" onclick="abrirLogin('user')">👤 Usuário</button>
        <div style="font-size:11px;color:var(--text3);margin-top:20px">v4.4.0</div>
    </div>
</div>

<!-- APP -->
<div id="app">
    <div class="header">
        <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
                <div class="header-title">📦 Kayla - Venda Consignada</div>
                <div class="header-sub" id="header-sub">Nova Venda</div>
            </div>
            <div class="header-actions">
                <span id="plan-badge" class="badge-free">GRÁTIS</span>
                <span id="connection-badge" class="badge-offline">OFFLINE</span>
            </div>
        </div>
    </div>
    <div class="content" id="content">
        <!-- Banner de atualização -->
        <div id="update-banner" class="update-banner">
            <div class="update-banner-title">🚀 Atualização Disponível!</div>
            <div class="update-banner-text">Nova versão disponível. Atualize agora para ter acesso às últimas melhorias.</div>
            <button class="btn btn-primary" onclick="atualizarApp()">🔄 Atualizar Agora</button>
            <button class="btn btn-outline" onclick="fecharBannerAtualizacao()" style="margin-top:8px;border-color:#fff;color:#fff">Agora não</button>
        </div>
    </div>
    <div class="nav">
        <button class="nav-btn active" onclick="mudarAba('scan')"><span class="icon">⚡</span>Vender</button>
        <button class="nav-btn" onclick="mudarAba('clients')"><span class="icon">👥</span>Clientes</button>
        <button class="nav-btn" onclick="mudarAba('products')"><span class="icon">🏷️</span>Produtos</button>
        <button class="nav-btn" onclick="mudarAba('orders')"><span class="icon">📋</span>Pedidos</button>
        <button class="nav-btn" onclick="mudarAba('history')"><span class="icon">📊</span>Histórico</button>
        <button class="nav-btn" onclick="mudarAba('settings')"><span class="icon">⚙️</span>Config</button>
    </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="fecharModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="modal-body"></div>
    </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>
<div id="exit-toast">Toque novamente para sair</div>

<script>
// ============ VARIÁVEIS ============
var supabaseClient = null;
var currentUser = null;
var perfilAtual = null;
var html5QrCode = null;
var clientes = [];
var produtos = [];
var pedidos = [];
var pedidoItens = [];
var clienteAtual = null;
var configEmpresa = {};
var LIMITES = { freeClientes: 3, freeProdutos: 20, proAtivo: false };
var isOnline = navigator.onLine;
var lastSync = localStorage.getItem('kayla_last_sync') || null;
var lastBackPress = 0;
var appVersion = '4.4.0';
// Adicione após as outras variáveis globais
var SUPABASE_EDGE_URL = 'https://xwwklngrkvdwgiinycvt.supabase.co/functions/v1';
var deviceUniqueId = localStorage.getItem('kayla_device_id') || null;
var currentProKey = localStorage.getItem('kayla_pro_key') || null;

// ============ INICIALIZAÇÃO ============
window.addEventListener('DOMContentLoaded', function() {
    verificarStatusPro();
    carregarConfigEmpresa();
    carregarDadosLocais();
    verificarAtualizacao();
    
    try {
        supabaseClient = supabase.createClient('https://xwwklngrkvdwgiinycvt.supabase.co', 'sb_publishable_2Viwv3t4SvejW4SEfvpxGA_5K5thi7S');
        verificarConexao();
    } catch(e) { console.error('Erro:', e); }
    
    window.addEventListener('online', function() { 
        isOnline = true; 
        atualizarBadgeConexao();
        if (currentUser) sincronizarDados();
        verificarAtualizacao();
    });
    window.addEventListener('offline', function() { 
        isOnline = false; 
        atualizarBadgeConexao();
    });
    
    document.addEventListener('backbutton', onBackButton, false);
    
    // Prevenir seleção de texto e menu de contexto
    document.addEventListener('selectstart', function(e) { e.preventDefault(); }, false);
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); }, false);
    
    mostrarTelaSelecao();
});

function onBackButton() {
    var modalOverlay = document.getElementById('modal-overlay');
    if (modalOverlay && modalOverlay.classList.contains('show')) {
        fecharModal();
        return;
    }
    
    var currentTime = Date.now();
    if (currentTime - lastBackPress < 2000) {
        if (navigator.app && navigator.app.exitApp) {
            navigator.app.exitApp();
        } else {
            window.close();
        }
    } else {
        lastBackPress = currentTime;
        var toast = document.getElementById('exit-toast');
        toast.style.display = 'block';
        setTimeout(function() {
            toast.style.display = 'none';
            lastBackPress = 0;
        }, 2000);
    }
}

function verificarConexao() {
    isOnline = navigator.onLine;
    atualizarBadgeConexao();
}

function atualizarBadgeConexao() {
    var badge = document.getElementById('connection-badge');
    if (!badge) return;
    if (isOnline) {
        badge.textContent = 'ONLINE';
        badge.className = 'badge-online';
    } else {
        badge.textContent = 'OFFLINE';
        badge.className = 'badge-offline';
    }
}

function verificarStatusPro() {
    var chave = localStorage.getItem('kayla_pro_key');
    if (chave && chave.startsWith('PRO-')) {
        LIMITES.proAtivo = true;
        localStorage.setItem('kayla_pro', 'true');
    }
}

function carregarConfigEmpresa() {
    var config = localStorage.getItem('kayla_config_empresa');
    if (config) {
        try { configEmpresa = JSON.parse(config); } catch(e) {}
    }
}

function salvarConfigEmpresa() {
    var configParaSalvar = Object.assign({}, configEmpresa);
    delete configParaSalvar.logo;
    localStorage.setItem('kayla_config_empresa', JSON.stringify(configParaSalvar));
    if (configEmpresa.logo) {
        localStorage.setItem('kayla_logo_local', configEmpresa.logo);
    }
}

function carregarDadosLocais() {
    var dados = localStorage.getItem('kayla_dados_locais');
    if (dados) {
        try {
            var parsed = JSON.parse(dados);
            if (parsed.clientes) clientes = parsed.clientes;
            if (parsed.produtos) produtos = parsed.produtos;
            if (parsed.pedidos) pedidos = parsed.pedidos;
        } catch(e) {}
    }
}

function salvarDadosLocais() {
    var dados = {
        clientes: clientes,
        produtos: produtos,
        pedidos: pedidos,
        lastUpdate: new Date().toISOString()
    };
    localStorage.setItem('kayla_dados_locais', JSON.stringify(dados));
}

function mostrarTelaSelecao() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
}

function atualizarBadgePlano() {
    var badge = document.getElementById('plan-badge');
    if (!badge) return;
    if (LIMITES.proAtivo) {
        badge.textContent = 'PRO';
        badge.className = 'badge-pro';
    } else {
        badge.textContent = 'GRÁTIS';
        badge.className = 'badge-free';
    }
}

function mostrarApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    atualizarBadgePlano();
    atualizarBadgeConexao();
    mudarAba('scan');
}

// ============ ATUALIZAÇÃO ============
function verificarAtualizacao() {
    if (!isOnline) return;
    
    fetch('version.json?t=' + Date.now())
        .then(function(response) { return response.json(); })
        .then(function(data) {
            if (data.version !== appVersion) {
                mostrarBannerAtualizacao(data);
            }
        })
        .catch(function(err) { console.log('Erro ao verificar atualização:', err); });
}

function mostrarBannerAtualizacao(data) {
    var banner = document.getElementById('update-banner');
    var content = document.querySelector('.content');
    if (banner && content) {
        content.insertBefore(banner, content.firstChild);
        banner.classList.add('show');
    }
}

function fecharBannerAtualizacao() {
    var banner = document.getElementById('update-banner');
    if (banner) {
        banner.classList.remove('show');
        localStorage.setItem('kayla_dismiss_update', Date.now().toString());
    }
}

function atualizarApp() {
    if ('caches' in window) {
        caches.keys().then(function(names) {
            for (var name of names) caches.delete(name);
        });
    }
    window.location.reload(true);
}

// ============ AUTENTICAÇÃO ============
async function verificarSessao() {
    if (!supabaseClient) { mostrarTelaSelecao(); return; }
    var lembrarMe = localStorage.getItem('kayla_lembrar_me');
    if (lembrarMe === 'true') {
        var result = await supabaseClient.auth.getSession();
        if (result.data && result.data.session && result.data.session.user) {
            currentUser = result.data.session.user;
            await carregarDados();
            mostrarApp();
            return;
        }
    }
    mostrarTelaSelecao();
}

function abrirLogin(tipo) {
    perfilAtual = tipo;
    var html = '<div class="modal-title">' + (tipo === 'admin' ? '👑 Login Admin' : '👤 Login Usuário') + '</div>';
    html += '<div class="modal-sub">Digite suas credenciais</div>';
    html += '<div class="form-group"><label class="form-label">E-mail</label><input class="form-input" id="email" type="email" placeholder="seu@email.com" onkeypress="if(event.key===\'Enter\')fazerLogin()"></div>';
    html += '<div class="form-group"><label class="form-label">Senha</label><input class="form-input" id="senha" type="password" placeholder="Mínimo 6 caracteres" onkeypress="if(event.key===\'Enter\')fazerLogin()"></div>';
    html += '<div class="checkbox-group"><input type="checkbox" id="lembrar-me"><label for="lembrar-me" style="color:var(--text2);font-size:13px">Lembrar de mim</label></div>';
    html += '<button class="btn btn-primary" onclick="fazerLogin()">Entrar</button>';
    html += '<button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>';
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('show');
    setTimeout(function() { document.getElementById('email').focus(); }, 100);
}

async function fazerLogin() {
    var email = document.getElementById('email').value.trim();
    var senha = document.getElementById('senha').value;
    var lembrarMe = document.getElementById('lembrar-me').checked;
    
    if (!email || !senha) { toast('Preencha tudo', 'error'); return; }
    
    var btn = event.target;
    var texto = btn.innerText;
    btn.innerText = 'Verificando...';
    btn.disabled = true;
    
    try {
        var result = await supabaseClient.auth.signInWithPassword({ email: email, password: senha });
        if (result.error) {
            toast('E-mail ou senha incorretos', 'error');
            btn.innerText = texto;
            btn.disabled = false;
            return;
        }
        
        if (lembrarMe) {
            localStorage.setItem('kayla_lembrar_me', 'true');
            localStorage.setItem('kayla_email', email);
        } else {
            localStorage.removeItem('kayla_lembrar_me');
            localStorage.removeItem('kayla_email');
        }
        
        await loginSucesso(result.data.user);
        
    } catch (error) {
        toast('Erro de conexão', 'error');
    }
    btn.innerText = texto;
    btn.disabled = false;
}

async function loginSucesso(user) {
    currentUser = user;
    localStorage.setItem('perfilAcesso', perfilAtual);
    await carregarDados();
    fecharModal();
    toast('Bem-vindo!', 'success');
    mostrarApp();
}

async function fazerLogout() {
    if (supabaseClient && isOnline) await supabaseClient.auth.signOut();
    localStorage.removeItem('perfilAcesso');
    localStorage.removeItem('kayla_lembrar_me');
    localStorage.removeItem('kayla_email');
    currentUser = null;
    clienteAtual = null;
    pedidoItens = [];
    toast('Logout realizado', 'success');
    mostrarTelaSelecao();
}

async function carregarDados() {
    if (!isOnline) return;
    try {
        var r;
        r = await supabaseClient.from('clientes').select('*').order('nome');
        if (!r.error) { clientes = r.data || []; salvarDadosLocais(); }
        
        r = await supabaseClient.from('produtos').select('*').order('nome');
        if (!r.error) { produtos = r.data || []; salvarDadosLocais(); }
        
        r = await supabaseClient.from('pedidos').select('*').order('created_at', { ascending: false });
        if (!r.error) { pedidos = r.data || []; salvarDadosLocais(); }
        
        lastSync = new Date().toISOString();
        localStorage.setItem('kayla_last_sync', lastSync);
        
    } catch(e) { console.error('Erro:', e); }
}

async function sincronizarDados() {
    if (!isOnline || !currentUser) return;
    toast('🔄 Sincronizando...', 'warning');
    await carregarDados();
    toast('✅ Dados sincronizados!', 'success');
}

// ============ LIMITES ============
function verificarLimite(tipo) {
    if (LIMITES.proAtivo) return true;
    if (tipo === 'clientes' && clientes.length >= LIMITES.freeClientes) {
        toast('Limite de ' + LIMITES.freeClientes + ' clientes atingido!', 'error');
        return false;
    }
    if (tipo === 'produtos' && produtos.length >= LIMITES.freeProdutos) {
        toast('Limite de ' + LIMITES.freeProdutos + ' produtos atingido!', 'error');
        return false;
    }
    return true;
}

// ============ NAVEGAÇÃO ============
function mudarAba(aba) {
    document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
    var idx = ['scan','clients','products','orders','history','settings'].indexOf(aba) + 1;
    var btn = document.querySelector('.nav-btn:nth-child(' + idx + ')');
    if (btn) btn.classList.add('active');
    
    var content = document.getElementById('content');
    var sub = document.getElementById('header-sub');
    
    // Re-insere banner se existir
    var banner = document.getElementById('update-banner');
    if (banner && banner.classList.contains('show')) {
        content.insertBefore(banner, content.firstChild);
    }
    
    switch(aba) {
        case 'scan':
            sub.textContent = 'Nova Venda';
            content.innerHTML = renderizarVenda();
            setTimeout(iniciarScanner, 500);
            break;
        case 'clients':
            sub.textContent = 'Clientes';
            content.innerHTML = renderizarClientes();
            break;
        case 'products':
            sub.textContent = 'Produtos';
            content.innerHTML = renderizarProdutos();
            break;
        case 'orders':
            sub.textContent = 'Pedidos';
            content.innerHTML = renderizarPedidos();
            break;
        case 'history':
            sub.textContent = 'Histórico';
            content.innerHTML = renderizarHistorico();
            break;
        case 'settings':
            sub.textContent = 'Configurações';
            content.innerHTML = renderizarConfig();
            break;
    }
}

// ============ VENDA ============
function renderizarVenda() {
    var html = '';
    
    html += '<div class="card"><div class="card-title">👥 Cliente</div>';
    if (clienteAtual) {
        html += '<div class="client-selected"><span>✓ ' + clienteAtual.nome + '</span>';
        html += '<button class="btn-sm btn-outline" style="margin:0;color:#fff;border-color:#fff" onclick="trocarCliente()">Trocar</button></div>';
    } else {
        html += '<div class="form-group">';
        if (clientes.length === 0) {
            html += '<p style="color:var(--warning);font-size:13px;margin-bottom:8px">⚠️ Nenhum cliente</p>';
            html += '<button class="btn btn-primary" onclick="abrirModalCliente()">+ Cadastrar</button>';
        } else {
            html += '<select class="form-select" id="select-cliente" onchange="selecionarClienteVenda(this.value)">';
            html += '<option value="">-- Selecione --</option>';
            clientes.forEach(function(c) {
                html += '<option value="' + c.id + '">' + c.nome + '</option>';
            });
            html += '</select>';
        }
        html += '</div></div>';
    }
    
    html += '<div class="card"><div class="card-title">⚡ Adicionar Produto</div>';
    if (!clienteAtual) {
        html += '<p style="color:var(--warning);text-align:center;padding:20px">⚠️ Selecione cliente primeiro</p>';
    } else {
        html += '<button class="btn btn-primary" onclick="abrirModalAdicionarProduto()">+ Adicionar Produto</button>';
        html += '<div class="form-group" style="margin-top:12px">';
        html += '<label class="form-label">Ou digite/escaneie código</label>';
        html += '<input class="form-input" id="codigo-manual" placeholder="Código de barras" onkeypress="if(event.key===\'Enter\')buscarProdutoManual()">';
        html += '</div>';
        html += '<div id="reader"></div>';
    }
    html += '</div>';
    
    html += '<div class="card"><div class="card-title">📦 Pedido Atual';
    if (clienteAtual) html += ' - ' + clienteAtual.nome;
    html += '</div>';
    
    if (pedidoItens.length === 0) {
        html += '<div class="empty-state">Nenhum item</div>';
    } else {
        pedidoItens.forEach(function(item, idx) {
            html += '<div class="order-item">';
            html += '<div class="order-item-header">';
            html += '<div class="order-item-name">' + item.nome + '</div>';
            html += '<div class="order-item-price">R$ ' + (item.preco * item.qtd).toFixed(2).replace('.',',') + '</div>';
            html += '</div>';
            html += '<div class="order-item-controls">';
            html += '<button class="qty-btn" onclick="alterarQtd(' + idx + ',-1)">−</button>';
            html += '<div class="qty-value">' + item.qtd + '</div>';
            html += '<button class="qty-btn" onclick="alterarQtd(' + idx + ',1)">+</button>';
            html += '<span style="color:var(--text3);font-size:12px;margin-left:8px">R$ ' + item.preco.toFixed(2).replace('.',',') + ' un</span>';
            html += '<span class="order-item-remove" onclick="removerItem(' + idx + ')">remover</span>';
            html += '</div></div>';
        });
        html += '<div class="order-total"><span>Total:</span><span>R$ ' + calcularTotal().toFixed(2).replace('.',',') + '</span></div>';
        html += '<button class="btn btn-green" onclick="finalizarPedido()" onkeypress="if(event.key===\'Enter\')finalizarPedido()" style="margin-top:12px">✅ Finalizar (Enter)</button>';
        html += '<button class="btn btn-outline" onclick="cancelarPedido()">❌ Cancelar</button>';
    }
    html += '</div>';
    
    return html;
}

function selecionarClienteVenda(id) {
    if (!id) { clienteAtual = null; return; }
    clienteAtual = clientes.find(function(c) { return c.id === id; });
    toast('Cliente: ' + clienteAtual.nome, 'success');
    mudarAba('scan');
}

function trocarCliente() {
    clienteAtual = null;
    pedidoItens = [];
    mudarAba('scan');
}

function buscarProdutoManual() {
    var codigo = document.getElementById('codigo-manual').value.trim();
    if (!codigo) { toast('Digite código', 'error'); return; }
    if (!clienteAtual) { toast('Selecione cliente', 'error'); return; }
    processarCodigo(codigo);
}

function onScanSuccess(decodedText) {
    if (!clienteAtual) { toast('Selecione cliente', 'warning'); return; }
    if (html5QrCode) html5QrCode.pause();
    processarCodigo(decodedText);
}

function processarCodigo(codigo) {
    var produto = produtos.find(function(p) { return p.codigo === codigo; });
    if (!produto) {
        toast('Produto não cadastrado!', 'warning');
        setTimeout(function() { abrirModalProdutoSelecao(codigo); }, 1000);
        return;
    }
    
    var itemExistente = pedidoItens.find(function(i) { return i.produto_id === produto.id; });
    if (itemExistente) {
        abrirModalDuplicado(produto, itemExistente);
    } else {
        adicionarItem(produto, 1);
        toast('✅ ' + produto.nome, 'success');
    }
    
    var campo = document.getElementById('codigo-manual');
    if (campo) { campo.value = ''; campo.focus(); }
}

function abrirModalDuplicado(produto, item) {
    var html = '<div class="modal-handle"></div>';
    html += '<div class="modal-title">📦 Já na Lista</div>';
    html += '<div class="modal-sub">' + produto.nome + '</div>';
    html += '<div class="card" style="background:var(--bg3);padding:16px;text-align:center;margin-bottom:16px">';
    html += '<p>Produto já está no pedido com <strong style="color:var(--accent)">' + item.qtd + ' un</strong></p></div>';
    html += '<div class="qty-selector-label">Adicionar mais</div>';
    html += '<div class="qty-selector">';
    html += '<button class="qty-btn" onclick="ajustarQtdModal(-1)">−</button>';
    html += '<div class="qty-value" id="modal-qtd-display">' + item.qtd + '</div>';
    html += '<button class="qty-btn" onclick="ajustarQtdModal(1)">+</button>';
    html += '</div>';
    html += '<input type="hidden" id="modal-produto-id" value="' + produto.id + '">';
    html += '<input type="hidden" id="modal-qtd-atual" value="' + item.qtd + '">';
    html += '<button class="btn btn-primary" onclick="adicionarMaisUnidadesModal()">➕ Adicionar</button>';
    html += '<button class="btn btn-outline" onclick="fecharModal(); retomarScanner()">Cancelar</button>';
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('show');
}

function ajustarQtdModal(delta) {
    var display = document.getElementById('modal-qtd-display');
    var hidden = document.getElementById('modal-qtd-atual');
    var qtd = parseInt(hidden.value) + delta;
    if (qtd < 1) qtd = 1;
    hidden.value = qtd;
    display.textContent = qtd;
}

function adicionarMaisUnidadesModal() {
    var produtoId = document.getElementById('modal-produto-id').value;
    var qtdAdd = parseInt(document.getElementById('modal-qtd-atual').value);
    var item = pedidoItens.find(function(i) { return i.produto_id === produtoId; });
    if (item) {
        item.qtd += qtdAdd;
    }
    toast('➕ +' + qtdAdd + ' unidades', 'success');
    fecharModal();
    mudarAba('scan');
}

function adicionarItem(produto, qtd) {
    pedidoItens.push({
        produto_id: produto.id,
        nome: produto.nome,
        codigo: produto.codigo,
        preco: produto.preco,
        qtd: qtd
    });
    mudarAba('scan');
}

function alterarQtd(idx, delta) {
    pedidoItens[idx].qtd += delta;
    if (pedidoItens[idx].qtd <= 0) {
        pedidoItens.splice(idx, 1);
    }
    mudarAba('scan');
}

function removerItem(idx) {
    pedidoItens.splice(idx, 1);
    mudarAba('scan');
}

function calcularTotal() {
    var total = 0;
    pedidoItens.forEach(function(i) { total += i.preco * i.qtd; });
    return total;
}

function cancelarPedido() {
    if (pedidoItens.length > 0 && !confirm('Cancelar pedido?')) return;
    pedidoItens = [];
    clienteAtual = null;
    mudarAba('scan');
}

async function finalizarPedido() {
    if (pedidoItens.length === 0) { toast('Adicione produtos', 'error'); return; }
    if (!clienteAtual) { toast('Selecione cliente', 'error'); return; }
    
    var btn = event.target;
    var texto = btn.innerText;
    btn.innerText = 'Finalizando...';
    btn.disabled = true;
    
    try {
        var total = calcularTotal();
        var totalItens = 0;
        var itensDetalhes = [];
        
        pedidoItens.forEach(function(i) { 
            totalItens += i.qtd;
            itensDetalhes.push({
                produto_id: i.produto_id,
                nome: i.nome,
                codigo: i.codigo,
                preco: i.preco,
                qtd: i.qtd,
                total: i.preco * i.qtd
            });
        });
        
        var pedidoData = {
            cliente_id: clienteAtual.id,
            cliente_nome: clienteAtual.nome,
            status: 'aberto',
            itens: totalItens,
            total: total,
            itens_json: JSON.stringify(itensDetalhes),
            user_id: currentUser ? currentUser.id : 'local',
            created_at: new Date().toISOString()
        };
        
        if (isOnline && supabaseClient) {
            // Tenta criar com itens_json
            var result = await supabaseClient.from('pedidos').insert(pedidoData).select();
            if (result.error) {
                // Se falhar, tenta sem o campo
                delete pedidoData.itens_json;
                result = await supabaseClient.from('pedidos').insert(pedidoData).select();
                if (result.error) throw result.error;
            }
            await carregarDados();
        } else {
            pedidos.unshift(pedidoData);
            salvarDadosLocais();
        }
        
        setTimeout(function() {
            if (confirm('✅ Pedido finalizado!\n\nGerar PDF?')) {
                gerarPDFPedido(pedidoData);
            }
        }, 500);
        
        pedidoItens = [];
        clienteAtual = null;
        mudarAba('scan');
        
    } catch (error) {
        toast('Erro: ' + error.message, 'error');
        console.error(error);
    }
    
    btn.innerText = texto;
    btn.disabled = false;
}

async function salvarCliente(clienteId) {
    var nome = document.getElementById('cliente-nome').value.trim();
    if (!nome) { toast('Nome obrigatório', 'error'); return; }
    
    var clienteData = { 
        nome: nome, 
        telefone: document.getElementById('cliente-telefone').value.trim(), 
        endereco: document.getElementById('cliente-endereco').value.trim(),
        user_id: currentUser ? currentUser.id : 'local',
        updated_at: new Date().toISOString()
    };
    
    if (clienteId) {
        if (isOnline && supabaseClient) {
            var result = await supabaseClient.from('clientes').update(clienteData).eq('id', clienteId);
            if (result.error) { toast('Erro: ' + result.error.message, 'error'); return; }
            await carregarDados();
        } else {
            var idx = clientes.findIndex(function(c) { return c.id === clienteId; });
            if (idx >= 0) {
                clientes[idx] = Object.assign({}, clientes[idx], clienteData);
                salvarDadosLocais();
            }
        }
        toast('✅ Cliente atualizado!', 'success');
    } else {
        if (!verificarLimite('clientes')) return;
        clienteData.created_at = new Date().toISOString();
        if (isOnline && supabaseClient) {
            var result = await supabaseClient.from('clientes').insert(clienteData).select();
            if (result.error) { toast('Erro: ' + result.error.message, 'error'); return; }
            await carregarDados();
        } else {
            clienteData.id = 'local_' + Date.now();
            clientes.push(clienteData);
            salvarDadosLocais();
        }
        toast('✅ Cliente cadastrado!', 'success');
    }
    
    fecharModal();
    mudarAba('clients');
}

async function devolverPedido(pedidoId) {
    var pedido = pedidos.find(function(p) { return p.id === pedidoId; });
    if (!pedido) return;
    
    var html = '<div class="modal-handle"></div>';
    html += '<div class="modal-title">↩️ Devolução</div>';
    html += '<div class="modal-sub">Pedido #' + pedidoId.toString().substr(0,8) + ' - ' + pedido.cliente_nome + '</div>';
    html += '<div class="card" style="background:var(--bg3);padding:16px;margin-bottom:16px">';
    html += '<p style="color:var(--text2);margin-bottom:12px">Itens do pedido:</p>';
    
    try {
        var itens = JSON.parse(pedido.itens_json || '[]');
        itens.forEach(function(item, idx) {
            html += '<div class="item-card" style="margin-bottom:8px">';
            html += '<div class="item-info"><div class="item-name">' + item.nome + '</div><div class="item-detail">Qtd: ' + item.qtd + ' • R$ ' + item.total.toFixed(2).replace('.',',') + '</div></div>';
            html += '<label style="display:flex;align-items:center;gap:8px;cursor:pointer">';
            html += '<input type="checkbox" class="dev-item-checkbox" data-idx="' + idx + '" value="' + item.qtd + '">';
            html += '<span style="font-size:12px">Devolver</span></label></div>';
        });
    } catch(e) {
        html += '<p style="color:var(--error)">Erro ao carregar itens</p>';
    }
    html += '</div>';
    html += '<button class="btn btn-warning" onclick="confirmarDevolucao(\'' + pedidoId + '\')">✅ Confirmar Devolução</button>';
    html += '<button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>';
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('show');
}

async function confirmarDevolucao(pedidoId) {
    var pedido = pedidos.find(function(p) { return p.id === pedidoId; });
    if (!pedido) return;
    
    var checkboxes = document.querySelectorAll('.dev-item-checkbox:checked');
    if (checkboxes.length === 0) {
        toast('Selecione pelo menos 1 item', 'error');
        return;
    }
    
    var itens = JSON.parse(pedido.itens_json || '[]');
    var itensDevolvidos = [];
    
    checkboxes.forEach(function(cb) {
        var idx = parseInt(cb.getAttribute('data-idx'));
        itensDevolvidos.push(itens[idx]);
    });
    
    var devolucaoData = {
        status: 'devolvido',
        devolucao_detalhes: JSON.stringify(itensDevolvidos),
        devolucao_data: new Date().toISOString()
    };
    
    if (isOnline && supabaseClient) {
        var result = await supabaseClient.from('pedidos').update(devolucaoData).eq('id', pedidoId);
        if (result.error) { toast('Erro: ' + result.error.message, 'error'); return; }
        await carregarDados();
    } else {
        Object.assign(pedido, devolucaoData);
        salvarDadosLocais();
    }
    
    toast('✅ Devolução registrada!', 'success');
    fecharModal();
    mudarAba('orders');
}

    var pedido = pedidos.find(function(p) { return p.id === pedidoId; });
    if (pedido) gerarPDFPedido(pedido);
}

function gerarPDFPedido(pedido) {
    try {
        var { jsPDF } = window.jspdf;
        var doc = new jsPDF();
        
        var logoLocal = localStorage.getItem('kayla_logo_local');
        if (logoLocal) {
            try {
                doc.addImage(logoLocal, 'PNG', 15, 10, 40, 20);
            } catch(e) {}
        }
        
        doc.setFontSize(16);
        doc.setTextColor(124, 92, 252);
        doc.text(configEmpresa.nome || 'Kayla - Venda Consignada', 105, 15, { align: 'center' });
        
        doc.setFontSize(10);
        doc.setTextColor(100);
        if (configEmpresa.cnpj) doc.text('CNPJ/CPF: ' + configEmpresa.cnpj, 105, 22, { align: 'center' });
        if (configEmpresa.endereco) doc.text(configEmpresa.endereco, 105, 27, { align: 'center' });
        if (configEmpresa.telefone) doc.text('Tel: ' + configEmpresa.telefone, 105, 32, { align: 'center' });
        
        doc.setDrawColor(200);
        doc.line(10, 38, 200, 38);
        
        doc.setFontSize(14);
        doc.setTextColor(0);
        doc.text('PEDIDO DE VENDA', 105, 48, { align: 'center' });
        
        doc.setFontSize(11);
        doc.text('Pedido #' + pedido.id.toString().substr(0,8), 15, 60);
        doc.text('Data: ' + new Date(pedido.created_at).toLocaleDateString('pt-BR'), 15, 67);
        doc.text('Status: ' + pedido.status.toUpperCase(), 15, 74);
        
        doc.setFillColor(240, 240, 240);
        doc.rect(15, 80, 180, 15, 'F');
        doc.setFontSize(12);
        doc.text('Cliente: ' + pedido.cliente_nome, 20, 90);
        
        doc.setFontSize(11);
        doc.text('Itens do Pedido:', 15, 105);
        
        var y = 115;
        try {
            var itens = JSON.parse(pedido.itens_json || '[]');
            itens.forEach(function(item) {
                doc.text(item.nome, 20, y);
                doc.text(item.qtd + 'x R$ ' + item.preco.toFixed(2).replace('.',','), 120, y);
                doc.text('R$ ' + item.total.toFixed(2).replace('.',','), 170, y, { align: 'right' });
                y += 7;
            });
        } catch(e) {}
        
        y += 5;
        doc.setDrawColor(200);
        doc.line(15, y, 195, y);
        y += 10;
        doc.setFontSize(14);
        doc.setFont(undefined, 'bold');
        doc.text('TOTAL: R$ ' + parseFloat(pedido.total).toFixed(2).replace('.',','), 170, y, { align: 'right' });
        
        doc.setFontSize(9);
        doc.setTextColor(150);
        doc.text('Gerado em: ' + new Date().toLocaleString('pt-BR'), 105, 280, { align: 'center' });
        
        doc.save('Pedido-' + pedido.id.toString().substr(0,8) + '.pdf');
        toast('📄 PDF gerado!', 'success');
        
    } catch(error) {
        toast('Erro ao gerar PDF: ' + error.message, 'error');
    }
}

function uploadLogo(input) {
    var file = input.files[0];
    if (!file) return;
    
    if (file.size > 2 * 1024 * 1024) {
        toast('Imagem muito grande (máx. 2MB)', 'error');
        return;
    }
    
    var reader = new FileReader();
    reader.onload = function(e) {
        localStorage.setItem('kayla_logo_local', e.target.result);
        toast('✅ Logo carregada (local)!', 'success');
        abrirDadosEmpresa();
    };
    reader.readAsDataURL(file);
}

function removerLogo() {
    localStorage.removeItem('kayla_logo_local');
    toast('Logo removida', 'success');
    abrirDadosEmpresa();
}

function salvarConfiguracoesEmpresa() {
    configEmpresa.nome = document.getElementById('config-nome').value.trim();

    configEmpresa.telefone = document.getElementById('config-telefone').value.trim();

}

function exportarBackup() {
    var dados = {
        clientes: clientes,
        produtos: produtos,
        pedidos: pedidos,
        config: configEmpresa,
        dataExport: new Date().toISOString(),
        versao: appVersion
    };
    
    var blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'kayla_backup_' + new Date().toISOString().split('T')[0] + '.json';
    a.click();
    URL.revokeObjectURL(url);
    
    toast('📥 Backup exportado!', 'success');
}

function importarBackup(input) {
    var file = input.files[0];
    if (!file) return;
    
    var reader = new FileReader();
    reader.onload = function(e) {
        try {
            var dados = JSON.parse(e.target.result);
            
            if (dados.clientes) clientes = dados.clientes;
            if (dados.produtos) produtos = dados.produtos;
            if (dados.pedidos) pedidos = dados.pedidos;
            if (dados.config) {
                configEmpresa = dados.config;
                salvarConfigEmpresa();
            }
            
            salvarDadosLocais();
            toast('✅ Backup importado!', 'success');
            mudarAba('settings');
            
        } catch(err) {
            toast('Erro ao importar backup: ' + err.message, 'error');
        }
    };
    reader.readAsText(file);
}

function getDeviceId() {
    if (!deviceUniqueId) {
        deviceUniqueId = 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('kayla_device_id', deviceUniqueId);
    }
    return deviceUniqueId;
}

function getDeviceName() {
    var ua = navigator.userAgent;
    if (ua.indexOf('Android') > -1) return 'Android';
    if (ua.indexOf('iPhone') > -1) return 'iPhone';
    if (ua.indexOf('iPad') > -1) return 'iPad';
    return 'Web';
}

async function validarKeyBackend(keyCode) {
    try {
        var response = await fetch(SUPABASE_EDGE_URL + '/validate-key', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': 'Bearer sb_publishable_2Viwv3t4SvejW4SEfvpxGA_5K5thi7S'
            },
            body: JSON.stringify({
                key_code: keyCode,
                device_id: getDeviceId(),
                device_name: getDeviceName()
            })
        });
        
        var data = await response.json();
        return data;
    } catch (error) {
        console.error('Erro ao validar key:', error);
        return { valid: false, message: 'Erro de conexão' };
    }
}

}

function fecharModal(e) {
    if (!e || e.target.id === 'modal-overlay') {
        document.getElementById('modal-overlay').classList.remove('show');
        document.getElementById('modal-body').innerHTML = '';
    }
}

function toast(msg, tipo) {
    var el = document.createElement('div');
    el.className = 'toast ' + tipo;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(function() { el.style.opacity = '0'; setTimeout(function() { el.remove(); }, 300); }, 3000);
}
