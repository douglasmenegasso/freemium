<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kayla Consignado</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root { --bg: #0f0f13; --bg2: #1a1a24; --bg3: #252530; --text: #fff; --text2: #a0a0b0; --text3: #606070; --accent: #7c5cfc; --accent2: #9b82fc; --border: #2a2a35; --success: #00c853; --error: #ff1744; --warning: #ffab00; --radius: 12px; --radius-sm: 8px; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

#login-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
.login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 30px 20px; width: 100%; max-width: 360px; text-align: center; }
.login-logo { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 20px; }
.login-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.login-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }

.btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 20px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; border: none; width: 100%; margin-bottom: 12px; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-red { background: var(--error); color: #fff; }
.btn-green { background: var(--success); color: #fff; }
.btn-warning { background: var(--warning); color: #000; }
.btn-sm { padding: 10px 16px; font-size: 13px; width: auto; }

#app { display: none; flex-direction: column; height: 100vh; position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
.header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 16px; flex-shrink: 0; }
.header-title { font-size: 18px; font-weight: 700; }
.header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 90px; }
.nav { background: var(--bg2); border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 2px; cursor: pointer; border: none; background: transparent; color: var(--text2); font-size: 11px; }
.nav-btn.active { color: var(--accent); }
.nav-btn .icon { font-size: 20px; margin-bottom: 2px; }

.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.card-title { font-size: 14px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.form-group { margin-bottom: 14px; text-align: left; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; text-transform: uppercase; }
.form-input, .form-select { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; color: var(--text); font-size: 15px; outline: none; }
.form-input:focus, .form-select:focus { border-color: var(--accent); }
.form-select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a0a0b0' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 12px center; background-size: 18px; padding-right: 40px; }

.checkbox-group { display: flex; align-items: center; gap: 8px; margin: 12px 0; }
.checkbox-group input { width: 18px; height: 18px; }

.item-list { display: flex; flex-direction: column; gap: 8px; }
.item-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; display: flex; justify-content: space-between; align-items: center; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-detail { font-size: 13px; color: var(--text3); }

#reader { width: 100%; border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 12px; }

#modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 2500; display: none; align-items: flex-end; justify-content: center; }
#modal-overlay.show { display: flex; }
.modal-content { background: var(--bg2); border-radius: 20px 20px 0 0; padding: 24px 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 8px; }
.modal-sub { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 20px; }

#toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 3000; width: 90%; max-width: 300px; }
.toast { padding: 12px 20px; border-radius: var(--radius-sm); margin-bottom: 8px; text-align: center; animation: fadeIn 0.3s; }
.toast.success { background: var(--success); color: #fff; }
.toast.error { background: var(--error); color: #fff; }
.toast.warning { background: var(--warning); color: #000; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

.badge-free { background: var(--text3); color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-pro { background: var(--accent); color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }

.order-item { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px; }
.order-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.order-item-name { font-weight: 600; font-size: 15px; flex: 1; margin-right: 8px; }
.order-item-price { color: var(--accent); font-weight: 700; white-space: nowrap; }
.order-item-controls { display: flex; align-items: center; gap: 8px; }
.qty-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg2); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.qty-btn:active { background: var(--accent); }
.qty-value { min-width: 40px; text-align: center; font-weight: 700; font-size: 16px; }
.order-item-remove { color: var(--error); font-size: 12px; margin-left: 8px; cursor: pointer; text-decoration: underline; }

.order-total { background: var(--bg3); border-radius: var(--radius-sm); padding: 16px; margin-top: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; font-weight: 700; }
.order-total span:last-child { color: var(--accent); font-size: 22px; }

.client-selected { background: var(--success); color: #fff; padding: 8px 12px; border-radius: var(--radius-sm); margin-bottom: 12px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
.client-selected span { font-weight: 600; }

.empty-state { text-align: center; color: var(--text3); padding: 30px 20px; }

.limit-warning { background: var(--warning); color: #000; padding: 12px; border-radius: var(--radius-sm); margin: 12px 0; text-align: center; font-weight: 600; }

.product-history { background: var(--bg3); border-left: 3px solid var(--warning); padding: 8px 12px; margin: 8px 0; border-radius: 4px; font-size: 12px; color: var(--text2); }
.product-history strong { color: var(--warning); }

.config-section { margin-bottom: 20px; }
.config-section-title { font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

.logo-preview { width: 100px; height: 100px; border: 2px dashed var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin: 12px 0; overflow: hidden; }
.logo-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }

.file-input-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
.file-input-wrapper input[type=file] { position: absolute; left: -9999px; }
.file-input-label { display: block; padding: 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); text-align: center; cursor: pointer; }
.file-input-label:hover { border-color: var(--accent); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
    <div class="login-card">
        <img src="icon-192-dark.png" class="login-logo" alt="Kayla">
        <div class="login-title">Kayla Consignado</div>
        <div class="login-sub">Selecione seu perfil de acesso</div>
        <button class="btn btn-primary" onclick="abrirLogin('admin')">👑 Administrador</button>
        <button class="btn btn-outline" onclick="abrirLogin('user')">👤 Usuário</button>
        <div style="font-size:11px;color:var(--text3);margin-top:20px">v4.2.0</div>
    </div>
</div>

<!-- APP -->
<div id="app">
    <div class="header">
        <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
                <div class="header-title">📦 Kayla Consignado</div>
                <div class="header-sub" id="header-sub">Nova Venda</div>
            </div>
            <span id="plan-badge" class="badge-free">GRÁTIS</span>
        </div>
    </div>
    <div class="content" id="content"></div>
    <div class="nav">
        <button class="nav-btn active" onclick="mudarAba('scan')"><span class="icon">⚡</span>Vender</button>
        <button class="nav-btn" onclick="mudarAba('clients')"><span class="icon">👥</span>Clientes</button>
        <button class="nav-btn" onclick="mudarAba('products')"><span class="icon">🏷️</span>Produtos</button>
        <button class="nav-btn" onclick="mudarAba('orders')"><span class="icon">📋</span>Pedidos</button>
        <button class="nav-btn" onclick="mudarAba('history')"><span class="icon">📊</span>Histórico</button>
        <button class="nav-btn" onclick="mudarAba('settings')"><span class="icon">⚙️</span>Config</button>
    </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="fecharModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="modal-body"></div>
    </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<script>
// ============ VARIÁVEIS ============
var supabaseClient = null;
var currentUser = null;
var perfilAtual = null;
var html5QrCode = null;
var clientes = [];
var produtos = [];
var pedidos = [];
var pedidoItens = [];
var clienteAtual = null;
var configEmpresa = {};
var LIMITES = { freeClientes: 3, freeProdutos: 20, proAtivo: false };

// ============ INICIALIZAÇÃO ============
window.addEventListener('DOMContentLoaded', function() {
    verificarStatusPro();
    carregarConfigEmpresa();
    try {
        supabaseClient = supabase.createClient('https://xwwklngrkvdwgiinycvt.supabase.co', 'sb_publishable_2Viwv3t4SvejW4SEfvpxGA_5K5thi7S');
    } catch(e) { console.error('Erro:', e); }
    mostrarTelaSelecao();
});

function verificarStatusPro() {
    var chave = localStorage.getItem('kayla_pro_key');
    if (chave && chave.startsWith('PRO-')) {
        LIMITES.proAtivo = true;
        localStorage.setItem('kayla_pro', 'true');
    }
}

function carregarConfigEmpresa() {
    var config = localStorage.getItem('kayla_config_empresa');
    if (config) {
        try { configEmpresa = JSON.parse(config); } catch(e) {}
    }
}

function salvarConfigEmpresa() {
    localStorage.setItem('kayla_config_empresa', JSON.stringify(configEmpresa));
}

function mostrarTelaSelecao() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
}

function atualizarBadgePlano() {
    var badge = document.getElementById('plan-badge');
    if (LIMITES.proAtivo) {
        badge.textContent = 'PRO';
        badge.className = 'badge-pro';
    } else {
        badge.textContent = 'GRÁTIS';
        badge.className = 'badge-free';
    }
}

function mostrarApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    atualizarBadgePlano();
    mudarAba('scan');
}

// ============ AUTENTICAÇÃO ============
async function verificarSessao() {
    if (!supabaseClient) { mostrarTelaSelecao(); return; }
    var lembrarMe = localStorage.getItem('kayla_lembrar_me');
    if (lembrarMe === 'true') {
        var result = await supabaseClient.auth.getSession();
        if (result.data && result.data.session && result.data.session.user) {
            currentUser = result.data.session.user;
            await carregarDados();
            mostrarApp();
            return;
        }
    }
    mostrarTelaSelecao();
}

function abrirLogin(tipo) {
    perfilAtual = tipo;
    var html = '<div class="modal-title">' + (tipo === 'admin' ? '👑 Login Admin' : '👤 Login Usuário') + '</div>';
    html += '<div class="modal-sub">Digite suas credenciais</div>';
    html += '<div class="form-group"><label class="form-label">E-mail</label><input class="form-input" id="email" type="email" placeholder="seu@email.com"></div>';
    html += '<div class="form-group"><label class="form-label">Senha</label><input class="form-input" id="senha" type="password" placeholder="Mínimo 6 caracteres"></div>';
    html += '<div class="checkbox-group"><input type="checkbox" id="lembrar-me"><label for="lembrar-me" style="color:var(--text2);font-size:13px">Lembrar de mim</label></div>';
    html += '<button class="btn btn-primary" onclick="fazerLogin()">Entrar</button>';
    html += '<button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>';
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('show');
    setTimeout(function() { document.getElementById('email').focus(); }, 100);
}

async function fazerLogin() {
    var email = document.getElementById('email').value.trim();
    var senha = document.getElementById('senha').value;
    var lembrarMe = document.getElementById('lembrar-me').checked;
    
    if (!email || !senha) { toast('Preencha tudo', 'error'); return; }
    
    var btn = event.target;
    var texto = btn.innerText;
    btn.innerText = 'Verificando...';
    btn.disabled = true;
    
    try {
        var result = await supabaseClient.auth.signInWithPassword({ email: email, password: senha });
        if (result.error) {
            toast('E-mail ou senha incorretos', 'error');
            btn.innerText = texto;
            btn.disabled = false;
            return;
        }
        
        if (lembrarMe) {
            localStorage.setItem('kayla_lembrar_me', 'true');
            localStorage.setItem('kayla_email', email);
        } else {
            localStorage.removeItem('kayla_lembrar_me');
            localStorage.removeItem('kayla_email');
        }
        
        await loginSucesso(result.data.user);
        
    } catch (error) {
        toast('Erro de conexão', 'error');
    }
    btn.innerText = texto;
    btn.disabled = false;
}

async function loginSucesso(user) {
    currentUser = user;
    localStorage.setItem('perfilAcesso', perfilAtual);
    await carregarDados();
    fecharModal();
    toast('Bem-vindo!', 'success');
    mostrarApp();
}

async function fazerLogout() {
    if (supabaseClient) await supabaseClient.auth.signOut();
    localStorage.removeItem('perfilAcesso');
    localStorage.removeItem('kayla_lembrar_me');
    localStorage.removeItem('kayla_email');
    currentUser = null;
    clienteAtual = null;
    pedidoItens = [];
    toast('Logout realizado', 'success');
    mostrarTelaSelecao();
}

async function carregarDados() {
    try {
        var r;
        r = await supabaseClient.from('clientes').select('*').order('nome');
        clientes = r.error ? [] : (r.data || []);
        r = await supabaseClient.from('produtos').select('*').order('nome');
        produtos = r.error ? [] : (r.data || []);
        r = await supabaseClient.from('pedidos').select('*').order('created_at', { ascending: false });
        pedidos = r.error ? [] : (r.data || []);
    } catch(e) { console.error('Erro:', e); }
}

// ============ LIMITES ============
function verificarLimite(tipo) {
    if (LIMITES.proAtivo) return true;
    if (tipo === 'clientes' && clientes.length >= LIMITES.freeClientes) {
        toast('Limite de ' + LIMITES.freeClientes + ' clientes atingido!', 'error');
        return false;
    }
    if (tipo === 'produtos' && produtos.length >= LIMITES.freeProdutos) {
        toast('Limite de ' + LIMITES.freeProdutos + ' produtos atingido!', 'error');
        return false;
    }
    return true;
}

// ============ NAVEGAÇÃO ============
function mudarAba(aba) {
    document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
    var idx = ['scan','clients','products','orders','history','settings'].indexOf(aba) + 1;
    var btn = document.querySelector('.nav-btn:nth-child(' + idx + ')');
    if (btn) btn.classList.add('active');
    
    var content = document.getElementById('content');
    var sub = document.getElementById('header-sub');
    
    switch(aba) {
        case 'scan':
            sub.textContent = 'Nova Venda';
            content.innerHTML = renderizarVenda();
            setTimeout(iniciarScanner, 500);
            break;
        case 'clients':
            sub.textContent = 'Clientes';
            content.innerHTML = renderizarClientes();
            break;
        case 'products':
            sub.textContent = 'Produtos';
            content.innerHTML = renderizarProdutos();
            break;
        case 'orders':
            sub.textContent = 'Pedidos';
            content.innerHTML = renderizarPedidos();
            break;
        case 'history':
            sub.textContent = 'Histórico';
            content.innerHTML = renderizarHistorico();
            break;
        case 'settings':
            sub.textContent = 'Configurações';
            content.innerHTML = renderizarConfig();
            break;
    }
}

// ============ VENDA ============
function renderizarVenda() {
    var html = '';
    
    // Cliente
    html += '<div class="card"><div class="card-title">👥 Cliente</div>';
    if (clienteAtual) {
        html += '<div class="client-selected"><span>✓ ' + clienteAtual.nome + '</span>';
        html += '<button class="btn-sm btn-outline" style="margin:0;color:#fff;border-color:#fff" onclick="trocarCliente()">Trocar</button></div>';
    } else {
        html += '<div class="form-group">';
        if (clientes.length === 0) {
            html += '<p style="color:var(--warning);font-size:13px;margin-bottom:8px">⚠️ Nenhum cliente</p>';
            html += '<button class="btn btn-primary" onclick="abrirModalCliente()">+ Cadastrar</button>';
        } else {
            html += '<select class="form-select" id="select-cliente" onchange="selecionarClienteVenda(this.value)">';
            html += '<option value="">-- Selecione --</option>';
            clientes.forEach(function(c) {
                html += '<option value="' + c.id + '">' + c.nome + '</option>';
            });
            html += '</select>';
        }
        html += '</div></div>';
    }
    
    // Produto
    html += '<div class="card"><div class="card-title">⚡ Adicionar Produto</div>';
    if (!clienteAtual) {
        html += '<p style="color:var(--warning);text-align:center;padding:20px">⚠️ Selecione cliente primeiro</p>';
    } else {
        html += '<div class="form-group"><label class="form-label">Código</label>';
        html += '<div style="display:flex;gap:8px">';
        html += '<input class="form-input" id="codigo-manual" placeholder="Digite ou escaneie" onkeypress="if(event.key===\'Enter\')buscarProdutoManual()">';
        html += '<button class="btn btn-primary btn-sm" onclick="buscarProdutoManual()" style="margin:0">Buscar</button>';
        html += '</div></div>';
        html += '<div id="reader"></div>';
    }
    html += '</div>';
    
    // Pedido
    html += '<div class="card"><div class="card-title">📦 Pedido Atual';
    if (clienteAtual) html += ' - ' + clienteAtual.nome;
    html += '</div>';
    
    if (pedidoItens.length === 0) {
        html += '<div class="empty-state">Nenhum item</div>';
    } else {
        pedidoItens.forEach(function(item, idx) {
            html += '<div class="order-item">';
            html += '<div class="order-item-header">';
            html += '<div class="order-item-name">' + item.nome + '</div>';
            html += '<div class="order-item-price">R$ ' + (item.preco * item.qtd).toFixed(2).replace('.',',') + '</div>';
            html += '</div>';
            html += '<div class="order-item-controls">';
            html += '<button class="qty-btn" onclick="alterarQtd(' + idx + ',-1)">−</button>';
            html += '<div class="qty-value">' + item.qtd + '</div>';
            html += '<button class="qty-btn" onclick="alterarQtd(' + idx + ',1)">+</button>';
            html += '<span style="color:var(--text3);font-size:12px;margin-left:8px">R$ ' + item.preco.toFixed(2).replace('.',',') + ' un</span>';
            html += '<span class="order-item-remove" onclick="removerItem(' + idx + ')">remover</span>';
            html += '</div></div>';
        });
        html += '<div class="order-total"><span>Total:</span><span>R$ ' + calcularTotal().toFixed(2).replace('.',',') + '</span></div>';
        html += '<button class="btn btn-green" onclick="finalizarPedido()" style="margin-top:12px">✅ Finalizar</button>';
        html += '<button class="btn btn-outline" onclick="cancelarPedido()">❌ Cancelar</button>';
    }
    html += '</div>';
    
    return html;
}

function selecionarClienteVenda(id) {
    if (!id) { clienteAtual = null; return; }
    clienteAtual = clientes.find(function(c) { return c.id === id; });
    toast('Cliente: ' + clienteAtual.nome, 'success');
    mudarAba('scan');
}

function trocarCliente() {
    clienteAtual = null;
    pedidoItens = [];
    mudarAba('scan');
}

function buscarProdutoManual() {
    var codigo = document.getElementById('codigo-manual').value.trim();
    if (!codigo) { toast('Digite código', 'error'); return; }
    if (!clienteAtual) { toast('Selecione cliente', 'error'); return; }
    processarCodigo(codigo);
}

function onScanSuccess(decodedText) {
    if (!clienteAtual) { toast('Selecione cliente', 'warning'); return; }
    if (html5QrCode) html5QrCode.pause();
    processarCodigo(decodedText);
}

function processarCodigo(codigo) {
    var produto = produtos.find(function(p) { return p.codigo === codigo; });
    if (!produto) {
        toast('Produto não cadastrado!', 'warning');
        setTimeout(function() { abrirModalProdutoSelecao(codigo); }, 1000);
        return;
    }
    
    // Verifica histórico do cliente
    var historico = getHistoricoCliente(clienteAtual.id);
    var jaComprou = historico.filter(function(h) { return h.produto_id === produto.id; });
    
    if (jaComprou.length > 0) {
        abrirModalHistoricoProduto(produto, jaComprou);
    } else {
        var itemExistente = pedidoItens.find(function(i) { return i.produto_id === produto.id; });
        if (itemExistente) {
            abrirModalDuplicado(produto, itemExistente);
        } else {
            adicionarItem(produto, 1);
            toast('✅ ' + produto.nome, 'success');
        }
    }
    
    var campo = document.getElementById('codigo-manual');
    if (campo) { campo.value = ''; campo.focus(); }
}

function getHistoricoCliente(clienteId) {
    var historico = [];
    pedidos.forEach(function(p) {
        if (p.cliente_id === clienteId && p.itens_detalhes) {
            try {
                var itens = JSON.parse(p.itens_detalhes);
                itens.forEach(function(item) {
                    historico.push({
                        produto_id: item.produto_id,
                        produto_nome: item.nome,
                        pedido_id: p.id,
                        data: p.created_at,
                        status: p.status
                    });
                });
            } catch(e) {}
        }
    });
    return historico;
}

function abrirModalHistoricoProduto(produto, historico) {
    var html = '<div class="modal-title">⚠️ Produto Já Comprado</div>';
    html += '<div class="modal-sub">' + produto.nome + '</div>';
    html += '<div class="product-history">';
    html += '<strong>Este cliente já comprou este produto ' + historico.length + ' vez(es)</strong><br><br>';
    historico.forEach(function(h, i) {
        if (i < 3) {
            var data = new Date(h.data).toLocaleDateString('pt-BR');
            html += '• Pedido #' + h.pedido_id.substr(0,8) + ' em ' + data + ' (' + h.status + ')<br>';
        }
    });
    if (historico.length > 3) html += '... e mais ' + (historico.length - 3) + ' vezes';
    html += '</div>';
    html += '<p style="color:var(--text2);font-size:13px;margin:16px 0">Deseja adicionar mesmo assim?</p>';
    html += '<button class="btn btn-primary" onclick="adicionarItemComHistorico(\'' + produto.id + '\')">✅ Sim, Adicionar</button>';
    html += '<button class="btn btn-outline" onclick="fecharModal(); retomarScanner()">❌ Cancelar</button>';
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('show');
}

function adicionarItemComHistorico(produtoId) {
    var produto = produtos.find(function(p) { return p.id === produtoId; });
    if (produto) {
        adicionarItem(produto, 1);
        toast('✅ ' + produto.nome + ' adicionado', 'success');
    }
}

function abrirModalDuplicado(produto, item) {
    var html = '<div class="modal-title">📦 Já na Lista</div>';
    html += '<div class="modal-sub">' + produto.nome + '</div>';
    html += '<div class="card" style="background:var(--bg3);padding:16px;text-align:center">';
    html += '<p style="margin-bottom:12px">Produto já está no pedido com <strong style="color:var(--accent)">' + item.qtd + ' un</strong></p></div>';
    html += '<div class="form-group"><label class="form-label">Adicionar mais</label>';
    html += '<input class="form-input" id="qtd-add" type="number" value="1" min="1" style="text-align:center;font-size:18px"></div>';
    html += '<button class="btn btn-primary" onclick="adicionarMaisUnidades(\'' + produto.id + '\')">➕ Adicionar</button>';
    html += '<button class="btn btn-outline" onclick="fecharModal(); retomarScanner()">Cancelar</button>';
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('show');
}

function adicionarMaisUnidades(produtoId) {
    var qtdAdd = parseInt(document.getElementById('qtd-add').value) || 1;
    var item = pedidoItens.find(function(i) { return i.produto_id === produtoId; });
    if (item) {
        item.qtd += qtdAdd;
    }
    toast('➕ +' + qtdAdd + ' unidades', 'success');
    fecharModal();
    mudarAba('scan');
}

function adicionarItem(produto, qtd) {
    pedidoItens.push({
        produto_id: produto.id,
        nome: produto.nome,
        codigo: produto.codigo,
        preco: produto.preco,
        qtd: qtd
    });
    mudarAba('scan');
}

function alterarQtd(idx, delta) {
    pedidoItens[idx].qtd += delta;
    if (pedidoItens[idx].qtd <= 0) {
        pedidoItens.splice(idx, 1);
    }
    mudarAba('scan');
}

function removerItem(idx) {
    pedidoItens.splice(idx, 1);
    mudarAba('scan');
}

function calcularTotal() {
    var total = 0;
    pedidoItens.forEach(function(i) { total += i.preco * i.qtd; });
    return total;
}

function cancelarPedido() {
    if (pedidoItens.length > 0 && !confirm('Cancelar pedido?')) return;
    pedidoItens = [];
    clienteAtual = null;
    mudarAba('scan');
}

async function finalizarPedido() {
    if (pedidoItens.length === 0) { toast('Adicione produtos', 'error'); return; }
    if (!clienteAtual) { toast('Selecione cliente', 'error'); return; }
    
    var btn = event.target;
    var texto = btn.innerText;
    btn.innerText = 'Finalizando...';
    btn.disabled = true;
    
    try {
        var total = calcularTotal();
        var totalItens = 0;
        var itensDetalhes = [];
        
        pedidoItens.forEach(function(i) { 
            totalItens += i.qtd;
            itensDetalhes.push({
                produto_id: i.produto_id,
                nome: i.nome,
                codigo: i.codigo,
                preco: i.preco,
                qtd: i.qtd,
                total: i.preco * i.qtd
            });
        });
        
        var pedidoData = {
            cliente_id: clienteAtual.id,
            cliente_nome: clienteAtual.nome,
            status: 'aberto',
            itens: totalItens,
            total: total,
            itens_detalhes: JSON.stringify(itensDetalhes),
            user_id: currentUser.id,
            created_at: new Date().toISOString()
        };
        
        var result = await supabaseClient.from('pedidos').insert(pedidoData).select();
        if (result.error) throw result.error;
        
        var pedidoId = result.data[0].id;
        
        // Pergunta se quer gerar PDF
        setTimeout(function() {
            if (confirm('✅ Pedido #' + pedidoId.substr(0,8) + ' criado!\n\nGerar PDF do pedido?')) {
                gerarPDFPedido(result.data[0]);
            }
        }, 500);
        
        pedidoItens = [];
        clienteAtual = null;
        await carregarDados();
        mudarAba('scan');
        
    } catch (error) {
        toast('Erro: ' + error.message, 'error');
    }
    
    btn.innerText = texto;
    btn.disabled = false;
}

function iniciarScanner() {
    if (html5QrCode) { html5QrCode.stop(); html5QrCode = null; }
    var reader = document.getElementById('reader');
    if (!reader) return;
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, onScanSuccess)
        .catch(function(err) { reader.innerHTML = '<p style="color:var(--text3);text-align:center;padding:20px">Câmera indisponível</p>'; });
}

    html += '</div>';
    html += '<button class="btn btn-warning" onclick="confirmarDevolucao(\'' + pedidoId + '\')">✅ Confirmar Devolução</button>';

async function confirmarDevolucao(pedidoId) {
    var pedido = pedidos.find(function(p) { return p.id === pedidoId; });
    if (!pedido) return;
    
    // Verifica quais itens foram selecionados para devolução
    var itens = JSON.parse(pedido.itens_detalhes);
    var itensDevolvidos = [];
    
    itens.forEach(function(item, idx) {
        var checkbox = document.getElementById('dev-item-' + idx);
        if (checkbox && checkbox.checked) {
            itensDevolvidos.push(item);
        }
    });
    
    if (itensDevolvidos.length === 0) {
        toast('Selecione pelo menos 1 item', 'error');
        return;
    }
    
    // Atualiza pedido com status de devolvido
    var result = await supabaseClient.from('pedidos').update({ 
        status: 'devolvido',
        devolucao_detalhes: JSON.stringify(itensDevolvidos),
        devolucao_data: new Date().toISOString()
    }).eq('id', pedidoId);
    
    if (result.error) { toast('Erro: ' + result.error.message, 'error'); return; }
    
    toast('✅ Devolução registrada!', 'success');
    fecharModal();
    await carregarDados();
    mudarAba('orders');
}

function verPedido(pedidoId) {
    var pedido = pedidos.find(function(p) { return p.id === pedidoId; });
    if (!pedido) return;
    
    var html = '<div class="modal-title">📋 Pedido #' + pedidoId.substr(0,8) + '</div>';
    html += '<div class="modal-sub">' + pedido.cliente_nome + ' - ' + new Date(pedido.created_at).toLocaleDateString('pt-BR') + '</div>';
    html += '<div class="card" style="background:var(--bg3);padding:16px;margin-bottom:16px">';
    html += '<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span>Status:</span><strong style="color:' + (pedido.status === 'aberto' ? 'var(--warning)' : 'var(--success)') + '">' + pedido.status.toUpperCase() + '</strong></div>';
    html += '<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span>Itens:</span><strong>' + pedido.itens + '</strong></div>';
    html += '<div style="display:flex;justify-content:space-between"><span>Total:</span><strong style="color:var(--accent);font-size:18px">R$ ' + parseFloat(pedido.total).toFixed(2).replace('.',',') + '</strong></div>';
    html += '</div>';
    
    try {
        var itens = JSON.parse(pedido.itens_detalhes);
        html += '<div class="item-list" style="margin-bottom:16px">';
        itens.forEach(function(item) {
            html += '<div class="item-card"><div class="item-info"><div class="item-name">' + item.nome + '</div><div class="item-detail">' + item.qtd + 'x R$ ' + item.preco.toFixed(2).replace('.',',') + '</div></div><div style="font-weight:700;color:var(--accent)">R$ ' + item.total.toFixed(2).replace('.',',') + '</div></div>';
        });
        html += '</div>';
    } catch(e) {}
    
    html += '<button class="btn btn-primary" onclick="gerarPDFPedidoPorId(\'' + pedidoId + '\')">📄 Gerar PDF</button>';
    html += '<button class="btn btn-outline" onclick="fecharModal()">Fechar</button>';
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('show');
}

function gerarPDFPedidoPorId(pedidoId) {
    var pedido = pedidos.find(function(p) { return p.id === pedidoId; });
    if (pedido) gerarPDFPedido(pedido);
}

function gerarPDFPedido(pedido) {
    try {
        var { jsPDF } = window.jspdf;
        var doc = new jsPDF();
        
        // Logo (se existir)
        if (configEmpresa.logo) {
            try {
                doc.addImage(configEmpresa.logo, 'PNG', 15, 10, 40, 20);
            } catch(e) {}
        }
        
        // Dados da empresa
        doc.setFontSize(16);
        doc.setTextColor(124, 92, 252);
        doc.text(configEmpresa.nome || 'Kayla Consignado', 105, 15, { align: 'center' });
        
        doc.setFontSize(10);
        doc.setTextColor(100);
        if (configEmpresa.cnpj) doc.text('CNPJ/CPF: ' + configEmpresa.cnpj, 105, 22, { align: 'center' });
        if (configEmpresa.endereco) doc.text(configEmpresa.endereco, 105, 27, { align: 'center' });
        if (configEmpresa.telefone) doc.text('Tel: ' + configEmpresa.telefone, 105, 32, { align: 'center' });
        
        // Linha separadora
        doc.setDrawColor(200);
        doc.line(10, 38, 200, 38);
        
        // Título
        doc.setFontSize(14);
        doc.setTextColor(0);
        doc.text('PEDIDO DE VENDA', 105, 48, { align: 'center' });
        
        // Dados do pedido
        doc.setFontSize(11);
        doc.text('Pedido #' + pedido.id.substr(0,8), 15, 60);
        doc.text('Data: ' + new Date(pedido.created_at).toLocaleDateString('pt-BR'), 15, 67);
        doc.text('Status: ' + pedido.status.toUpperCase(), 15, 74);
        
        // Cliente
        doc.setFillColor(240, 240, 240);
        doc.rect(15, 80, 180, 15, 'F');
        doc.setFontSize(12);
        doc.text('Cliente: ' + pedido.cliente_nome, 20, 90);
        
        // Itens
        doc.setFontSize(11);
        doc.text('Itens do Pedido:', 15, 105);
        
        var y = 115;
        try {
            var itens = JSON.parse(pedido.itens_detalhes);
            itens.forEach(function(item) {
                doc.text(item.nome, 20, y);
                doc.text(item.qtd + 'x R$ ' + item.preco.toFixed(2).replace('.',','), 120, y);
                doc.text('R$ ' + item.total.toFixed(2).replace('.',','), 170, y, { align: 'right' });
                y += 7;
            });
        } catch(e) {}
        
        // Total
        y += 5;
        doc.setDrawColor(200);
        doc.line(15, y, 195, y);
        y += 10;
        doc.setFontSize(14);
        doc.setFont(undefined, 'bold');
        doc.text('TOTAL: R$ ' + parseFloat(pedido.total).toFixed(2).replace('.',','), 170, y, { align: 'right' });
        
        // Rodapé
        doc.setFontSize(9);
        doc.setTextColor(150);
        doc.text('Gerado em: ' + new Date().toLocaleString('pt-BR'), 105, 280, { align: 'center' });
        
        // Salvar
        doc.save('Pedido-' + pedido.id.substr(0,8) + '.pdf');
        toast('📄 PDF gerado!', 'success');
        
    } catch(error) {
        toast('Erro ao gerar PDF: ' + error.message, 'error');
    }
}

// ============ HISTÓRICO ============
function renderizarHistorico() {
    var finalizados = pedidos.filter(function(p) { return p.status === 'finalizado'; });
    var devolvidos = pedidos.filter(function(p) { return p.status === 'devolvido'; });
    
    var html = '<div class="card"><div class="card-title">📊 Resumo</div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
    html += '<div class="card" style="background:var(--bg3);padding:16px;text-align:center"><div style="font-size:24px;font-weight:700;color:var(--success)">' + finalizados.length + '</div><div style="font-size:12px;color:var(--text2)">Vendas</div></div>';
    html += '<div class="card" style="background:var(--bg3);padding:16px;text-align:center"><div style="font-size:24px;font-weight:700;color:var(--warning)">' + devolvidos.length + '</div><div style="font-size:12px;color:var(--text2)">Devoluções</div></div>';
    html += '</div></div>';
    
    var totalGeral = 0;
    finalizados.forEach(function(p) { totalGeral += parseFloat(p.total); });
    
    html += '<div class="card" style="background:var(--bg3);padding:16px"><div style="display:flex;justify-content:space-between"><span>Faturamento:</span><strong style="color:var(--accent);font-size:18px">R$ ' + totalGeral.toFixed(2).replace('.',',') + '</strong></div></div>';
    
    html += '<div class="card"><div class="card-title">📋 Todos os Pedidos</div>';
    if (pedidos.length === 0) {
        html += '<div class="empty-state">Nenhum pedido</div>';
    } else {
        html += '<div class="item-list">';
        pedidos.forEach(function(p) {
            var data = new Date(p.created_at).toLocaleDateString('pt-BR');
            var corStatus = p.status === 'aberto' ? 'var(--warning)' : (p.status === 'finalizado' ? 'var(--success)' : 'var(--error)');
            html += '<div class="item-card"><div class="item-info"><div class="item-name">#' + p.id.substr(0,8) + '</div><div class="item-detail">' + p.cliente_nome + ' • ' + data + '<br>' + p.itens + ' itens • R$ ' + parseFloat(p.total).toFixed(2).replace('.',',') + '</div></div><span style="color:' + corStatus + ';font-weight:600;font-size:12px">' + p.status.toUpperCase() + '</span></div>';
        });
        html += '</div>';
    }
    html += '</div>';
    
    return html;
}

// ============ CONFIGURAÇÕES ============
function renderizarConfig() {
    var html = '<div class="card"><div class="card-title">⚙️ Configurações</div>';
    
    html += '<div class="form-group"><label class="form-label">Usuário</label><div style="background:var(--bg3);padding:12px;border-radius:8px;margin-bottom:12px">' + (currentUser ? currentUser.email : 'Não logado') + '</div></div>';
    
    html += '<div class="form-group"><label class="form-label">Perfil</label><div style="background:var(--bg3);padding:12px;border-radius:8px;margin-bottom:12px">' + (perfilAtual === 'admin' ? '👑 Admin' : '👤 Usuário') + '</div></div>';
    
    html += '<div class="form-group"><label class="form-label">Plano</label><div style="background:var(--bg3);padding:12px;border-radius:8px;margin-bottom:12px"><span class="' + (LIMITES.proAtivo ? 'badge-pro' : 'badge-free') + '">' + (LIMITES.proAtivo ? 'PRO' : 'GRÁTIS') + '</span></div></div>';
    
    if (!LIMITES.proAtivo) {
        html += '<button class="btn btn-primary" onclick="mostrarPaywall()">🚀 Upgrade Pro</button>';
    }
    
    // Configurações da Empresa
    html += '<div class="config-section">';
    html += '<div class="config-section-title">🏢 Dados da Empresa</div>';
    
    html += '<div class="form-group"><label class="form-label">Nome da Empresa</label><input class="form-input" id="config-nome" value="' + (configEmpresa.nome || '') + '" placeholder="Nome fantasia"></div>';
    
    html += '<div class="form-group"><label class="form-label">CNPJ/CPF</label><input class="form-input" id="config-cnpj" value="' + (configEmpresa.cnpj || '') + '" placeholder="00.000.000/0000-00"></div>';
    
    html += '<div class="form-group"><label class="form-label">Telefone</label><input class="form-input" id="config-telefone" value="' + (configEmpresa.telefone || '') + '" placeholder="(00) 00000-0000"></div>';
    
    html += '<div class="form-group"><label class="form-label">Endereço</label><input class="form-input" id="config-endereco" value="' + (configEmpresa.endereco || '') + '" placeholder="Rua, número, cidade"></div>';
    
    html += '<div class="form-group"><label class="form-label">Logo da Empresa</label>';
    if (configEmpresa.logo) {
        html += '<div class="logo-preview"><img src="' + configEmpresa.logo + '" alt="Logo"></div>';
        html += '<button class="btn btn-sm btn-outline" onclick="removerLogo()" style="margin-bottom:8px">🗑️ Remover Logo</button>';
    }
    html += '<div class="file-input-wrapper">';
    html += '<input type="file" id="config-logo-file" accept="image/*" onchange="uploadLogo(this)">';
    html += '<label for="config-logo-file" class="file-input-label">📷 Selecionar Imagem (PNG, JPG)</label>';
    html += '</div></div>';
    
    html += '<button class="btn btn-primary" onclick="salvarConfiguracoesEmpresa()">💾 Salvar Configurações</button>';
    html += '</div>';
    
    html += '<div class="form-group" style="margin-top:16px"><label class="form-label">Versão</label><div style="background:var(--bg3);padding:12px;border-radius:8px">v4.2.0</div></div>';
    
    html += '<button class="btn btn-red" onclick="fazerLogout()" style="margin-top:12px">🚪 Sair</button></div>';
    
    return html;
}

function uploadLogo(input) {
    var file = input.files[0];
    if (!file) return;
    
    if (file.size > 2 * 1024 * 1024) {
        toast('Imagem muito grande (máx. 2MB)', 'error');
        return;
    }
    
    var reader = new FileReader();
    reader.onload = function(e) {
        configEmpresa.logo = e.target.result;
        toast('✅ Logo carregada!', 'success');
        mudarAba('settings');
    };
    reader.readAsDataURL(file);
}

function removerLogo() {
    configEmpresa.logo = null;
    toast('Logo removida', 'success');
    mudarAba('settings');
}

function salvarConfiguracoesEmpresa() {
    configEmpresa.nome = document.getElementById('config-nome').value.trim();
    configEmpresa.cnpj = document.getElementById('config-cnpj').value.trim();
    configEmpresa.telefone = document.getElementById('config-telefone').value.trim();
    configEmpresa.endereco = document.getElementById('config-endereco').value.trim();
    
    salvarConfigEmpresa();
    toast('✅ Configurações salvas!', 'success');
}

function mostrarPaywall() {
    var html = '<div class="modal-title" style="color:var(--accent)">🚀 Upgrade Pro</div>';
    html += '<div style="font-size:32px;font-weight:700;color:var(--accent);text-align:center;margin:20px 0">R$ 19,90<small style="font-size:14px;color:var(--text2);display:block">/mês</small></div>';
    html += '<div class="card" style="background:var(--bg3);padding:16px">';
    html += '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span>👥 Clientes</span><span style="color:var(--error)">3</span><span style="color:var(--success)">∞</span></div>';
    html += '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span>🏷️ Produtos</span><span style="color:var(--error)">20</span><span style="color:var(--success)">∞</span></div>';
    html += '<div style="display:flex;justify-content:space-between;padding:8px 0"><span>📄 PDF</span><span style="color:var(--error)">❌</span><span style="color:var(--success)">✅</span></div>';
    html += '</div>';
    html += '<div class="form-group"><label class="form-label">Chave</label><input class="form-input" id="pro-key" placeholder="PRO-XXXX-XXXX-XXXX"></div>';
    html += '<button class="btn btn-primary" onclick="ativarPro()">🔓 Ativar</button>';
    html += '<button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>';
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('show');
}

function ativarPro() {
    var chave = document.getElementById('pro-key').value.trim().toUpperCase();
    if (!chave || !chave.startsWith('PRO-')) { toast('Chave inválida', 'error'); return; }
    LIMITES.proAtivo = true;
    localStorage.setItem('kayla_pro', 'true');
    localStorage.setItem('kayla_pro_key', chave);
    toast('✅ Pro ativado!', 'success');
    fecharModal();
    atualizarBadgePlano();
}

// ============ AUXILIARES ============
function fecharModal(e) {
    if (!e || e.target.id === 'modal-overlay') {
        document.getElementById('modal-overlay').classList.remove('show');
        document.getElementById('modal-body').innerHTML = '';
    }
}

function editarCliente(id) { toast('Em breve', 'warning'); }
function editarProduto(id) { toast('Em breve', 'warning'); }

function toast(msg, tipo) {
    var el = document.createElement('div');
    el.className = 'toast ' + tipo;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(function() { el.style.opacity = '0'; setTimeout(function() { el.remove(); }, 300); }, 3000);
}
