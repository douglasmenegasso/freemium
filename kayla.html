<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>Kayla Consignado</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon-dark.png">
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Configurações Centralizadas -->
    <script src="config.js"></script>

    <style>
        /* ==========================================================
           SEÇÃO 1: VARIÁVEIS E RESET
           ========================================================== */
        :root {
            --bg: #0f0f13;
            --bg2: #1a1a24;
            --bg3: #252530;
            --text: #ffffff;
            --text2: #a0a0b0;
            --text3: #606070;
            --accent: #7c5cfc;
            --accent2: #9b82fc;
            --border: #2a2a35;
            --success: #00c853;
            --error: #ff1744;
            --warning: #ffab00;
            --radius: 12px;
            --radius-sm: 8px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

        /* ==========================================================
           SEÇÃO 2: LAYOUT PRINCIPAL E SCROLL
           ========================================================== */
        #app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
        }

        .header {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            flex-shrink: 0;
        }
        .header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; }
        .header-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }

        /* CORREÇÃO DO SCROLL: A área de conteúdo deve rolar */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 90px; /* Espaço para a barra fixa */
            min-height: 0;
        }

        /* ==========================================================
           SEÇÃO 3: BARRA DE NAVEGAÇÃO FIXA
           ========================================================== */
        .nav {
            background: var(--bg2);
            border-top: 1px solid var(--border);
            display: flex;
            flex-shrink: 0;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
            justify-content: space-around;
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 10px 2px 12px;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text2);
            font-size: 11px;
        }
        .nav-btn.active { color: var(--accent); }
        .nav-btn .icon { font-size: 20px; }

        /* ==========================================================
           SEÇÃO 4: TELA DE LOGIN CENTRALIZADA
           ========================================================== */
        #login-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .login-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 30px 20px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .login-logo { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 20px; object-fit: cover; }
        .login-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .login-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }

        /* ==========================================================
           SEÇÃO 5: COMPONENTES UI (Botões, Inputs, Cards)
           ========================================================== */
        .btn {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; padding: 14px 20px; border-radius: var(--radius-sm);
            font-size: 15px; font-weight: 600; cursor: pointer; border: none; width: 100%;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-red { background: var(--error); color: #fff; }
        .btn-green { background: var(--success); color: #fff; }
        
        .login-btn { margin-bottom: 12px; }

        .form-group { margin-bottom: 14px; text-align: left; }
        .form-label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; display: block; }
        .form-input {
            width: 100%; background: var(--bg3); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 12px; color: var(--text);
            font-size: 15px; outline: none;
        }
        .form-input:focus { border-color: var(--accent); }

        .card {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
        }
        .card-title { font-size: 14px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px; }

        /* Toast */
        #toast-root { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 3000; display: flex; flex-direction: column; gap: 8px; width: 90%; max-width: 300px; }
        .toast { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; text-align: center; animation: slideDown 0.3s ease; }
        .toast.success { background: var(--success); color: #fff; }
        .toast.error { background: var(--error); color: #fff; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Modal */
        #modal-root { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 2500; display: flex; align-items: flex-end; justify-content: center; }
        .modal-content { background: var(--bg2); border-radius: 20px 20px 0 0; padding: 24px 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
        .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; text-align: center; }
        .modal-sub { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <!-- ==========================================================
         SEÇÃO 6: TELA DE LOGIN
         ========================================================== -->
    <div id="login-screen">
        <div class="login-card">
            <img src="icon-192-dark.png" alt="Kayla" class="login-logo">
            <div class="login-title">Kayla Consignado</div>
            <div class="login-sub">Selecione seu perfil de acesso</div>
            
            <button class="btn btn-primary login-btn" onclick="solicitarLogin('admin')">
                👑 Administrador
            </button>
            <button class="btn btn-outline login-btn" onclick="solicitarLogin('user')">
                👤 Usuário
            </button>
            
            <div style="font-size:11px; color:var(--text3); margin-top:20px;">
                v<span id="login-ver">4.1.4</span>
            </div>
        </div>
    </div>

    <!-- ==========================================================
         SEÇÃO 7: APLICATIVO PRINCIPAL
         ========================================================== -->
    <div id="app" style="display:none;">
        <div class="header">
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <div>
                    <div class="header-title">📦 Kayla Consignado</div>
                    <div class="header-sub" id="header-sub">Selecione um cliente para iniciar</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-size:10px; color:var(--text3); font-weight:600; letter-spacing:.5px;">
                        <span id="cloud-status" style="color:var(--text2); margin-left:8px;">●</span>
                        <span>v<span id="hdr-ver">4.1.4</span></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="content" id="content">
            <!-- O conteúdo das abas será renderizado aqui -->
        </div>

        <div class="nav">
            <button class="nav-btn active" id="nav-scan" onclick="showTab('scan')">
                <span class="icon">⚡</span>Escanear
            </button>
            <button class="nav-btn" id="nav-clients" onclick="showTab('clients')">
                <span class="icon">👥</span>Clientes
            </button>
            <button class="nav-btn" id="nav-products" onclick="showTab('products')">
                <span class="icon">🏷️</span>Produtos
            </button>
            <button class="nav-btn" id="nav-orders" onclick="showTab('orders')">
                <span class="icon">📋</span>Pedidos
            </button>
            <button class="nav-btn" id="nav-history" onclick="showTab('history')">
                <span class="icon">📊</span>Histórico
            </button>
            <button class="nav-btn" id="nav-settings" onclick="showTab('settings')">
                <span class="icon">⚙️</span>Config
            </button>
        </div>
    </div>

    <!-- Containers para Modais e Toasts -->
    <div id="modal-root"></div>
    <div id="toast-root"></div>

    <!-- ==========================================================
         SEÇÃO 8: JAVASCRIPT ORGANIZADO
         ========================================================== -->
    <script>
        // ==========================================================
        // 8.1 INICIALIZAÇÃO E VARIÁVEIS GLOBAIS
        // ==========================================================
        let supabaseClient;
        let currentUser = null;
        let currentProfile = null; // 'admin' ou 'user'

        // Inicializa o Supabase quando a página carrega
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 Kayla Consignado iniciando...');
            
            // Atualiza versão na tela de login
            if (APP_CONFIG && APP_CONFIG.version) {
                document.getElementById('login-ver').textContent = APP_CONFIG.version;
            }

            try {
                if (typeof supabase !== 'undefined' && APP_CONFIG && APP_CONFIG.supabase) {
                    supabaseClient = supabase.createClient(APP_CONFIG.supabase.url, APP_CONFIG.supabase.key);
                    console.log('✅ Supabase conectado!');
                } else {
                    console.warn('⚠️ Supabase ou Config não carregados. Modo offline limitado.');
                }
            } catch (e) {
                console.error('❌ Erro ao iniciar Supabase:', e);
            }

            // Verifica sessão inicial
            checkSessionAndLoad();
        });

        // ==========================================================
        // 8.2 AUTENTICAÇÃO E SESSÃO
        // ==========================================================
        async function checkSessionAndLoad() {
            console.log('🔍 Verificando sessão...');
            
            if (!supabaseClient) {
                // Se não tem supabase, mostra login mesmo assim
                showLoginScreen();
                return;
            }

            const { data: { session } } = await supabaseClient.auth.getSession();
            
            if (session && session.user) {
                console.log('✅ Sessão ativa:', session.user.email);
                currentUser = session.user;
                showApp();
            } else {
                console.log('❌ Sem sessão. Mostrando login.');
                showLoginScreen();
            }
        }

        function showLoginScreen() {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            showTab('scan'); // Abre na tela de scanner por padrão
        }

        function solicitarLogin(tipo) {
            currentProfile = tipo;
            const titulo = tipo === 'admin' ? 'Login Administrador' : 'Login Usuário';
            const icone = tipo === 'admin' ? '👑' : '👤';
            
            const html = `
                <div class="modal-handle"></div>
                <div class="modal-title">${icone} ${titulo}</div>
                <div class="modal-sub">Digite suas credenciais para entrar</div>
                
                <div class="form-group">
                    <label class="form-label">E-mail</label>
                    <input class="form-input" id="login-email" type="email" placeholder="seu@email.com" autocomplete="off"/>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Senha</label>
                    <input class="form-input" id="login-senha" type="password" placeholder="Digite sua senha" autocomplete="new-password"/>
                </div>
                
                <button class="btn btn-primary" onclick="fazerLoginComSupabase()" style="margin-top:10px;">Entrar</button>
                <button class="btn btn-outline" onclick="closeModal()" style="margin-top:10px;">Cancelar</button>
            `;
            
            showModal(html);
            
            // Foca no campo de e-mail após abrir o modal
            setTimeout(() => {
                const emailInput = document.getElementById('login-email');
                if (emailInput) emailInput.focus();
            }, 300);
        }

        async function fazerLoginComSupabase() {
            const email = document.getElementById('login-email').value.trim();
            const senha = document.getElementById('login-senha').value;
            
            if (!email || !senha) {
                toast('Preencha e-mail e senha', 'error');
                return;
            }
            
            const btn = event.target;
            const textoOriginal = btn.innerText;
            btn.innerText = '⏳ Entrando...';
            btn.disabled = true;
            
            try {
                if (!supabaseClient) throw new Error('Supabase não inicializado');

                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: senha,
                });
                
                if (error) throw error;
                
                console.log('✅ Login realizado:', data.user.email);
                currentUser = data.user;
                
                // Salva perfil no localStorage
                localStorage.setItem('perfilAcesso', currentProfile);
                
                closeModal();
                toast('Bem-vindo ao Kayla Consignado!', 'success');
                showApp();
                
            } catch (error) {
                console.error('Erro login:', error);
                toast('❌ Erro: ' + (error.message || 'Credenciais inválidas'), 'error');
                btn.innerText = textoOriginal;
                btn.disabled = false;
            }
        }

        async function fazerLogout() {
            if (supabaseClient) {
                await supabaseClient.auth.signOut();
            }
            localStorage.removeItem('perfilAcesso');
            currentUser = null;
            currentProfile = null;
            toast('Logout realizado', 'success');
            showLoginScreen();
        }

        // ==========================================================
        // 8.3 NAVEGAÇÃO E UI
        // ==========================================================
        function showTab(tabName) {
            // Atualiza botões da nav
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            const navBtn = document.getElementById('nav-' + tabName);
            if (navBtn) navBtn.classList.add('active');
            
            const content = document.getElementById('content');
            const headerSub = document.getElementById('header-sub');
            
            // Renderiza conteúdo baseado na aba
            switch(tabName) {
                case 'scan':
                    headerSub.textContent = 'Scanner de Código de Barras';
                    content.innerHTML = renderScanTab();
                    break;
                case 'clients':
                    headerSub.textContent = 'Gestão de Clientes';
                    content.innerHTML = renderClientsTab();
                    break;
                case 'products':
                    headerSub.textContent = 'Catálogo de Produtos';
                    content.innerHTML = renderProductsTab();
                    break;
                case 'orders':
                    headerSub.textContent = 'Pedidos em Aberto';
                    content.innerHTML = renderOrdersTab();
                    break;
                case 'history':
                    headerSub.textContent = 'Histórico de Vendas';
                    content.innerHTML = renderHistoryTab();
                    break;
                case 'settings':
                    headerSub.textContent = 'Configurações do Sistema';
                    content.innerHTML = renderSettingsTab();
                    break;
            }
        }

        function renderScanTab() {
            return `
                <div class="card">
                    <div class="card-title">⚡ Escanear Produto</div>
                    <div style="background:var(--bg3); border-radius:var(--radius-sm); height:200px; display:flex; align-items:center; justify-content:center; color:var(--text3); margin-bottom:12px;">
                        [Área da Câmera / Scanner]
                    </div>
                    <div class="form-group">
                        <label class="form-label">Ou digite o código</label>
                        <div style="display:flex; gap:8px;">
                            <input class="form-input" placeholder="Código de barras..." style="flex:1;">
                            <button class="btn btn-primary" style="width:auto; padding:12px 16px;">Buscar</button>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title"> Pedido Atual</div>
                    <p style="color:var(--text3); text-align:center; padding:20px 0;">Nenhum item adicionado</p>
                </div>
            `;
        }

        function renderClientsTab() {
            return `
                <div class="card">
                    <div class="card-title">👥 Clientes Cadastrados</div>
                    <button class="btn btn-primary" style="margin-bottom:12px;">+ Novo Cliente</button>
                    <p style="color:var(--text3); text-align:center; padding:10px 0;">Nenhum cliente cadastrado</p>
                </div>
            `;
        }

        function renderProductsTab() {
            return `
                <div class="card">
                    <div class="card-title">🏷️ Produtos</div>
                    <button class="btn btn-primary" style="margin-bottom:12px;">+ Novo Produto</button>
                    <p style="color:var(--text3); text-align:center; padding:10px 0;">Nenhum produto cadastrado</p>
                </div>
            `;
        }

        function renderOrdersTab() {
            return `
                <div class="card">
                    <div class="card-title">📋 Pedidos em Aberto</div>
                    <p style="color:var(--text3); text-align:center; padding:20px 0;">Nenhum pedido em aberto</p>
                </div>
            `;
        }

        function renderHistoryTab() {
            return `
                <div class="card">
                    <div class="card-title">📊 Histórico</div>
                    <p style="color:var(--text3); text-align:center; padding:20px 0;">Nenhuma venda registrada</p>
                </div>
            `;
        }

        function renderSettingsTab() {
            const userEmail = currentUser ? currentUser.email : 'Não logado';
            return `
                <div class="card">
                    <div class="card-title">⚙️ Configurações</div>
                    <div class="form-group">
                        <label class="form-label">Usuário Logado</label>
                        <div style="background:var(--bg3); padding:12px; border-radius:var(--radius-sm); font-size:14px;">
                            ${userEmail}
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Versão do App</label>
                        <div style="background:var(--bg3); padding:12px; border-radius:var(--radius-sm); font-size:14px;">
                            v${APP_CONFIG ? APP_CONFIG.version : '4.1.4'}
                        </div>
                    </div>
                    <button class="btn btn-red" onclick="fazerLogout()" style="margin-top:10px;">
                         Sair / Logout
                    </button>
                </div>
            `;
        }

        // Sistema de Modais
        function showModal(htmlContent) {
            const modalRoot = document.getElementById('modal-root');
            modalRoot.innerHTML = `
                <div class="modal-content">
                    ${htmlContent}
                </div>
            `;
        }

        function closeModal() {
            document.getElementById('modal-root').innerHTML = '';
        }

        // Sistema de Toasts (Notificações)
        function toast(message, type = 'success') {
            const root = document.getElementById('toast-root');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = message;
            root.appendChild(el);
            setTimeout(() => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(-20px)';
                setTimeout(() => el.remove(), 300);
            }, 3000);
        }

        // Fecha modal ao clicar fora
        document.getElementById('modal-root').addEventListener('click', (e) => {
            if (e.target.id === 'modal-root') closeModal();
        });
    </script>
</body>
</html>
