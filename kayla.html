<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>Kayla Consignado</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg: #0f0f13; --bg2: #1a1a24; --bg3: #252530; --text: #fff; --text2: #a0a0b0; --text3: #606070; --accent: #7c5cfc; --border: #2a2a35; --success: #00c853; --error: #ff1744; --warning: #ffab00; --radius: 12px; --radius-sm: 8px; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #login-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 30px 20px; width: 100%; max-width: 360px; text-align: center; }
        .login-logo { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 20px; }
        .login-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .login-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 20px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; border: none; width: 100%; margin-bottom: 12px; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-red { background: var(--error); color: #fff; }
        .btn-sm { padding: 8px 16px; font-size: 13px; width: auto; }
        #app { display: none; flex-direction: column; height: 100vh; position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
        .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 16px; flex-shrink: 0; }
        .header-title { font-size: 18px; font-weight: 700; }
        .header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
        .content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 90px; }
        .nav { background: var(--bg2); border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 2px; cursor: pointer; border: none; background: transparent; color: var(--text2); font-size: 11px; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn .icon { font-size: 20px; margin-bottom: 2px; }
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
        .card-title { font-size: 14px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
        .form-group { margin-bottom: 14px; text-align: left; }
        .form-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; text-transform: uppercase; }
        .form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; color: var(--text); font-size: 15px; }
        .form-input:focus { border-color: var(--accent); outline: none; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin: 12px 0; }
        .checkbox-group input { width: 18px; height: 18px; }
        .item-list { display: flex; flex-direction: column; gap: 8px; }
        .item-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .item-info { flex: 1; }
        .item-name { font-weight: 600; margin-bottom: 4px; }
        .item-detail { font-size: 13px; color: var(--text3); }
        #reader { width: 100%; border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 16px; }
        #modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 2500; display: none; align-items: flex-end; justify-content: center; }
        #modal-overlay.show { display: flex; }
        .modal-content { background: var(--bg2); border-radius: 20px 20px 0 0; padding: 24px 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 8px; }
        .modal-sub { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 20px; }
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 3000; width: 90%; max-width: 300px; }
        .toast { padding: 12px 20px; border-radius: var(--radius-sm); margin-bottom: 8px; text-align: center; animation: fadeIn 0.3s; }
        .toast.success { background: var(--success); color: #fff; }
        .toast.error { background: var(--error); color: #fff; }
        .toast.warning { background: var(--warning); color: #000; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .error-box { background: var(--error); color: #fff; padding: 16px; border-radius: var(--radius); margin: 16px; text-align: center; }
        .user-type-info { font-size: 12px; color: var(--text3); margin-top: 8px; padding: 8px; background: var(--bg3); border-radius: 6px; }
    </style>
</head>
<body>
    <!-- TELA INICIAL DE SELEÇÃO -->
    <div id="login-screen">
        <div class="login-card">
            <img src="icon-192-dark.png" class="login-logo" alt="Kayla">
            <div class="login-title">Kayla Consignado</div>
            <div class="login-sub">Selecione seu perfil de acesso</div>
            <button class="btn btn-primary" onclick="abrirLogin('admin')">👑 Administrador</button>
            <button class="btn btn-outline" onclick="abrirLogin('user')">👤 Usuário</button>
            <div class="user-type-info">👑 Admin: Acesso total<br>👤 Usuário: Acesso limitado</div>
            <div style="font-size:11px;color:var(--text3);margin-top:20px">v4.1.4</div>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <div class="header-title">📦 Kayla Consignado</div>
            <div class="header-sub" id="header-sub">Scanner de Código de Barras</div>
        </div>
        <div class="content" id="content"></div>
        <div class="nav">
            <button class="nav-btn active" onclick="mudarAba('scan')"><span class="icon">⚡</span>Escanear</button>
            <button class="nav-btn" onclick="mudarAba('clients')"><span class="icon">👥</span>Clientes</button>
            <button class="nav-btn" onclick="mudarAba('products')"><span class="icon">🏷️</span>Produtos</button>
            <button class="nav-btn" onclick="mudarAba('orders')"><span class="icon">📋</span>Pedidos</button>
            <button class="nav-btn" onclick="mudarAba('history')"><span class="icon">📊</span>Histórico</button>
            <button class="nav-btn" onclick="mudarAba('settings')"><span class="icon">⚙️</span>Config</button>
        </div>
    </div>

    <div id="modal-overlay" onclick="fecharModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-body"></div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        var supabaseClient = null;
        var currentUser = null;
        var perfilAtual = null;
        var html5QrCode = null;
        var clientes = [];
        var produtos = [];
        var pedidos = [];
        var dbError = false;

        window.addEventListener('DOMContentLoaded', function() {
            console.log('Iniciando Kayla...');
            try {
                supabaseClient = supabase.createClient('https://xwwklngrkvdwgiinycvt.supabase.co', 'sb_publishable_2Viwv3t4SvejW4SEfvpxGA_5K5thi7S');
                console.log('Supabase conectado');
            } catch(e) { 
                console.error('Erro Supabase:', e); 
            }
            // SEMPRE mostra a tela de seleção inicial
            mostrarTelaSelecao();
        });

        function mostrarTelaSelecao() {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
            localStorage.removeItem('kayla_lembrar_me');
        }

        async function verificarSessao() {
            if (!supabaseClient) { mostrarTelaSelecao(); return; }
            
            var lembrarMe = localStorage.getItem('kayla_lembrar_me');
            
            if (lembrarMe === 'true') {
                var result = await supabaseClient.auth.getSession();
                if (result.data && result.data.session && result.data.session.user) {
                    currentUser = result.data.session.user;
                    var ok = await verificarTabelas();
                    if (ok) {
                        await carregarDados();
                        mostrarApp();
                        return;
                    }
                }
            }
            
            mostrarTelaSelecao();
        }

        async function verificarTabelas() {
            try {
                var test = await supabaseClient.from('clientes').select('id').limit(1);
                if (test.error && test.error.message.includes('could not find table')) {
                    dbError = true;
                    toast('⚠️ Tabelas não criadas no banco!', 'error');
                    setTimeout(mostrarErroTabelas, 2000);
                    return false;
                }
                return true;
            } catch(e) {
                dbError = true;
                return false;
            }
        }

        function mostrarErroTabelas() {
            var html = '<div class="modal-title">⚠️ Banco Não Configurado</div>';
            html += '<div class="modal-sub">Execute o SQL no Supabase</div>';
            html += '<div class="error-box">';
            html += '<strong>Passos:</strong><br><br>';
            html += '1. Acesse Supabase Dashboard<br>';
            html += '2. SQL Editor → New Query<br>';
            html += '3. Cole e execute o script<br><br>';
            html += '<a href="https://supabase.com/dashboard" target="_blank" class="btn btn-primary" style="text-decoration:none;display:inline-block">Abrir Supabase</a>';
            html += '<button class="btn btn-outline" onclick="fecharModal()" style="margin-top:10px">Fechar</button></div>';
            document.getElementById('modal-body').innerHTML = html;
            document.getElementById('modal-overlay').classList.add('show');
        }

        function mostrarApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            mudarAba('scan');
        }

        function abrirLogin(tipo) {
            perfilAtual = tipo;
            var titulo = tipo === 'admin' ? '👑 Login Admin' : '👤 Login Usuário';
            var html = '<div class="modal-title">' + titulo + '</div>';
            html += '<div class="modal-sub">Digite suas credenciais</div>';
            html += '<div class="form-group"><label class="form-label">E-mail</label><input class="form-input" id="email" type="email" placeholder="seu@email.com"></div>';
            html += '<div class="form-group"><label class="form-label">Senha</label><input class="form-input" id="senha" type="password" placeholder="Mínimo 6 caracteres"></div>';
            html += '<div class="checkbox-group"><input type="checkbox" id="lembrar-me"><label for="lembrar-me" style="color:var(--text2);font-size:13px">Lembrar de mim</label></div>';
            html += '<button class="btn btn-primary" onclick="verificarELogin()">Entrar</button>';
            html += '<button class="btn btn-outline" onclick="fecharModal(); mostrarTelaSelecao()">Cancelar</button>';
            document.getElementById('modal-body').innerHTML = html;
            document.getElementById('modal-overlay').classList.add('show');
            setTimeout(function() { document.getElementById('email').focus(); }, 100);
        }

        async function verificarELogin() {
            var email = document.getElementById('email').value.trim();
            var senha = document.getElementById('senha').value;
            
            if (!email || !senha) { toast('Preencha e-mail e senha', 'error'); return; }
            if (senha.length < 6) { toast('Senha deve ter no mínimo 6 caracteres', 'error'); return; }
            
            // Verifica se usuário existe tentando login
            var btn = event.target;
            var textoAntigo = btn.innerText;
            btn.innerText = 'Verificando...';
            btn.disabled = true;
            
            try {
                var result = await supabaseClient.auth.signInWithPassword({ 
                    email: email, 
                    password: senha 
                });
                
                if (result.error) {
                    // Usuário não existe ou senha errada
                    if (result.error.message.includes('Invalid login credentials') || 
                        result.error.message.includes('Email not confirmed')) {
                        // Pergunta se quer criar conta
                        perguntarSeCriaConta(email, senha);
                    } else {
                        toast('Erro: ' + result.error.message, 'error');
                    }
                } else {
                    // Login bem-sucedido
                    await loginSucesso(result.data.user);
                }
                
            } catch (error) {
                toast('Erro de conexão', 'error');
            }
            
            btn.innerText = textoAntigo;
            btn.disabled = false;
        }

        function perguntarSeCriaConta(email, senha) {
            var html = '<div class="modal-title">📝 Usuário Não Encontrado</div>';
            html += '<div class="modal-sub">E-mail: ' + email + '</div>';
            html += '<div class="card" style="background:var(--bg3);padding:16px;margin:12px 0;">';
            html += '<strong>Este usuário não está cadastrado.</strong><br><br>';
            html += 'Deseja criar uma nova conta?<br><br>';
            html += '<small style="color:var(--text3)">';
            if (perfilAtual === 'admin') {
                html += '👑 <strong>Admin:</strong> Acesso total ao sistema';
            } else {
                html += '👤 <strong>Usuário:</strong> Acesso limitado (somente visualização)';
            }
            html += '</small></div>';
            html += '<button class="btn btn-primary" onclick="criarNovaConta(\'' + email + '\', \'' + senha.replace(/'/g, "\\'") + '\')">✅ Criar Conta</button>';
            html += '<button class="btn btn-outline" onclick="fecharModal(); abrirLogin(\'' + perfilAtual + '\')">❌ Voltar</button>';
            document.getElementById('modal-body').innerHTML = html;
        }

        async function criarNovaConta(email, senha) {
            var btn = event.target;
            btn.innerText = 'Criando...';
            btn.disabled = true;
            
            try {
                // Cria usuário no Supabase Auth
                var result = await supabaseClient.auth.signUp({
                    email: email,
                    password: senha,
                    options: {
                        data: {
                            perfil: perfilAtual,
                            tipo: perfilAtual === 'admin' ? 'administrador' : 'usuario'
                        }
                    }
                });
                
                if (result.error) {
                    if (result.error.message.includes('already registered')) {
                        toast('Este e-mail já está em uso. Tente fazer login.', 'error');
                    } else {
                        toast('Erro: ' + result.error.message, 'error');
                    }
                    btn.innerText = '✅ Criar Conta';
                    btn.disabled = false;
                    return;
                }
                
                // Conta criada com sucesso
                if (result.data.user) {
                    toast('✅ Conta criada com sucesso!', 'success');
                    await loginSucesso(result.data.user);
                }
                
            } catch (error) {
                toast('Erro ao criar conta: ' + error.message, 'error');
                btn.innerText = '✅ Criar Conta';
                btn.disabled = false;
            }
        }

        async function loginSucesso(user) {
            currentUser = user;
            
            var lembrarMe = document.getElementById('lembrar-me');
            if (lembrarMe && lembrarMe.checked) {
                localStorage.setItem('kayla_lembrar_me', 'true');
                localStorage.setItem('kayla_email', document.getElementById('email').value);
            } else {
                localStorage.removeItem('kayla_lembrar_me');
                localStorage.removeItem('kayla_email');
            }
            
            // Verifica tabelas
            var ok = await verificarTabelas();
            if (!ok) {
                toast('Login realizado, mas configure o banco', 'warning');
                fecharModal();
                return;
            }
            
            localStorage.setItem('perfilAcesso', perfilAtual);
            await carregarDados();
            fecharModal();
            toast('Bem-vindo, ' + (perfilAtual === 'admin' ? 'Administrador' : 'Usuário') + '!', 'success');
            mostrarApp();
        }

        async function fazerLogout() {
            if (supabaseClient) await supabaseClient.auth.signOut();
            localStorage.removeItem('perfilAcesso');
            localStorage.removeItem('kayla_lembrar_me');
            localStorage.removeItem('kayla_email');
            if (html5QrCode) { html5QrCode.stop(); }
            currentUser = null;
            toast('Logout realizado', 'success');
            mostrarTelaSelecao();
        }

        async function carregarDados() {
            if (dbError) return;
            
            try {
                var resultClientes = await supabaseClient.from('clientes').select('*');
                clientes = resultClientes.error ? [] : (resultClientes.data || []);
                
                var resultProdutos = await supabaseClient.from('produtos').select('*');
                produtos = resultProdutos.error ? [] : (resultProdutos.data || []);
                
                var resultPedidos = await supabaseClient.from('pedidos').select('*');
                pedidos = resultPedidos.error ? [] : (resultPedidos.data || []);
            } catch(e) {
                console.error('Erro carregar dados:', e);
            }
        }

        function mudarAba(aba) {
            document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
            var btn = document.querySelector('.nav-btn:nth-child(' + getAbaIndex(aba) + ')');
            if (btn) btn.classList.add('active');
            
            var content = document.getElementById('content');
            var sub = document.getElementById('header-sub');
            
            if (dbError && aba !== 'settings') {
                content.innerHTML = '<div class="error-box">⚠️ Banco não configurado. Vá em Config.</div>';
                return;
            }
            
            switch(aba) {
                case 'scan':
                    sub.textContent = 'Scanner de Código de Barras';
                    content.innerHTML = renderizarScanner();
                    setTimeout(iniciarScanner, 500);
                    break;
                case 'clients':
                    sub.textContent = 'Gestão de Clientes';
                    content.innerHTML = renderizarClientes();
                    break;
                case 'products':
                    sub.textContent = 'Catálogo de Produtos';
                    content.innerHTML = renderizarProdutos();
                    break;
                case 'orders':
                    sub.textContent = 'Pedidos em Aberto';
                    content.innerHTML = renderizarPedidos();
                    break;
                case 'history':
                    sub.textContent = 'Histórico de Vendas';
                    content.innerHTML = renderizarHistorico();
                    break;
                case 'settings':
                    sub.textContent = 'Configurações';
                    content.innerHTML = renderizarConfig();
                    break;
            }
        }

        function getAbaIndex(aba) {
            return ['scan', 'clients', 'products', 'orders', 'history', 'settings'].indexOf(aba) + 1;
        }

        function renderizarScanner() {
            return '<div class="card"><div class="card-title">⚡ Escanear Produto</div>' +
                   '<div id="reader"></div>' +
                   '<div class="form-group"><label class="form-label">Ou digite o código</label>' +
                   '<div style="display:flex;gap:8px"><input class="form-input" id="codigo-manual" placeholder="Código de barras"><button class="btn btn-primary btn-sm" onclick="buscarProdutoManual()">Buscar</button></div></div></div>' +
                   '<div class="card"><div class="card-title">📦 Pedido Atual</div><div id="pedido-atual"><p style="color:var(--text3);text-align:center;padding:20px">Nenhum item</p></div></div>';
        }

        function renderizarClientes() {
            var html = '<div class="card"><div class="card-title">👥 Clientes Cadastrados</div>' +
                      '<button class="btn btn-primary" onclick="abrirModalCliente()">+ Novo Cliente</button></div>';
            if (clientes.length === 0) {
                html += '<div class="card"><p style="color:var(--text3);text-align:center;padding:20px">Nenhum cliente cadastrado</p></div>';
            } else {
                html += '<div class="item-list">';
                clientes.forEach(function(c) {
                    html += '<div class="item-card"><div class="item-info"><div class="item-name">' + c.nome + '</div><div class="item-detail">' + (c.telefone || 'Sem telefone') + '</div></div>' +
                           '<button class="btn btn-sm btn-outline" onclick="editarCliente(\'' + c.id + '\')">Editar</button></div>';
                });
                html += '</div>';
            }
            return html;
        }

        function renderizarProdutos() {
            var html = '<div class="card"><div class="card-title">🏷️ Produtos</div>' +
                      '<button class="btn btn-primary" onclick="abrirModalProdutoManual()">+ Novo Produto</button></div>';
            if (produtos.length === 0) {
                html += '<div class="card"><p style="color:var(--text3);text-align:center;padding:20px">Nenhum produto cadastrado</p></div>';
            } else {
                html += '<div class="item-list">';
                produtos.forEach(function(p) {
                    html += '<div class="item-card"><div class="item-info"><div class="item-name">' + p.nome + '</div><div class="item-detail">R$ ' + p.preco + ' | ' + p.codigo + '</div></div>' +
                           '<button class="btn btn-sm btn-outline" onclick="editarProduto(\'' + p.id + '\')">Editar</button></div>';
                });
                html += '</div>';
            }
            return html;
        }

        function renderizarPedidos() {
            var html = '<div class="card"><div class="card-title">📋 Pedidos em Aberto</div>' +
                      '<button class="btn btn-primary" onclick="novoPedido()">+ Novo Pedido</button></div>';
            if (pedidos.length === 0) {
                html += '<div class="card"><p style="color:var(--text3);text-align:center;padding:20px">Nenhum pedido</p></div>';
            } else {
                html += '<div class="item-list">';
                pedidos.forEach(function(p) {
                    html += '<div class="item-card"><div class="item-info"><div class="item-name">Pedido #' + p.id.substr(0,8) + '</div><div class="item-detail">' + p.cliente_nome + '</div></div>' +
                           '<button class="btn btn-sm btn-outline" onclick="verPedido(\'' + p.id + '\')">Ver</button></div>';
                });
                html += '</div>';
            }
            return html;
        }

        function renderizarHistorico() {
            return '<div class="card"><div class="card-title">📊 Histórico</div>' +
                   '<p style="color:var(--text3);text-align:center;padding:40px">Nenhuma venda</p></div>';
        }

        function renderizarConfig() {
            var html = '<div class="card"><div class="card-title">⚙️ Configurações</div>';
            if (dbError) {
                html += '<div class="error-box">⚠️ Tabelas não encontradas!</div>';
            }
            html += '<div class="form-group"><label class="form-label">Usuário</label><div style="background:var(--bg3);padding:12px;border-radius:8px;margin-bottom:12px">' + (currentUser ? currentUser.email : 'Não logado') + '</div></div>';
            html += '<div class="form-group"><label class="form-label">Perfil</label><div style="background:var(--bg3);padding:12px;border-radius:8px;margin-bottom:12px">' + (perfilAtual === 'admin' ? '👑 Administrador' : '👤 Usuário') + '</div></div>';
            html += '<div class="form-group"><label class="form-label">Versão</label><div style="background:var(--bg3);padding:12px;border-radius:8px">v4.1.4</div></div>';
            html += '<button class="btn btn-red" onclick="fazerLogout()">🚪 Sair</button></div>';
            return html;
        }

        function iniciarScanner() {
            if (dbError) return;
            if (html5QrCode) { html5QrCode.stop(); html5QrCode = null; }
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, onScanSuccess)
                .catch(function(err) { 
                    document.getElementById('reader').innerHTML = '<p style="color:var(--text3);text-align:center;padding:20px">Câmera indisponível</p>';
                });
        }

        function onScanSuccess(decodedText) {
            if (html5QrCode) html5QrCode.pause();
            toast('Código: ' + decodedText, 'success');
            verificarProdutoCodigo(decodedText);
        }

        async function verificarProdutoCodigo(codigo) {
            var produto = produtos.find(function(p) { return p.codigo === codigo; });
            if (produto) {
                toast('Produto: ' + produto.nome, 'success');
                selecionarClienteParaProduto(produto);
            } else {
                toast('Produto não cadastrado!', 'warning');
                setTimeout(function() { abrirModalProdutoComCodigo(codigo); }, 1500);
            }
        }

        async function selecionarClienteParaProduto(produto) {
            var clienteSel = localStorage.getItem('clienteSelecionado');
            if (clienteSel) {
                await adicionarProdutoAoPedido(produto, JSON.parse(clienteSel));
            } else {
                var html = '<div class="modal-title">👥 Selecionar Cliente</div>';
                html += '<div class="modal-sub">' + produto.nome + ' - R$ ' + produto.preco + '</div>';
                if (clientes.length === 0) {
                    html += '<div class="card" style="background:var(--bg3);padding:16px;"><p style="color:var(--text3);text-align:center">Nenhum cliente</p><button class="btn btn-primary" onclick="abrirModalClienteDoScanner()" style="margin-top:12px">+ Cliente</button></div>';
                } else {
                    html += '<div class="item-list" style="margin-bottom:16px">';
                    clientes.forEach(function(c) {
                        html += '<div class="item-card" style="cursor:pointer" onclick="selecionarCliente(\'' + c.id + '\', \'' + c.nome.replace(/'/g, "\\'") + '\')"><div class="item-info"><div class="item-name">' + c.nome + '</div></div><span style="color:var(--accent)">Selecionar →</span></div>';
                    });
                    html += '</div>';
                }
                html += '<button class="btn btn-outline" onclick="fecharModal(); retomarScanner()">Cancelar</button>';
                document.getElementById('modal-body').innerHTML = html;
                document.getElementById('modal-overlay').classList.add('show');
            }
        }

        function selecionarCliente(id, nome) {
            localStorage.setItem('clienteSelecionado', JSON.stringify({id: id, nome: nome}));
            toast('Cliente: ' + nome, 'success');
            fecharModal();
            retomarScanner();
        }

        async function adicionarProdutoAoPedido(produto, cliente) {
            var pedido = pedidos.find(function(p) { return p.cliente_id === cliente.id && p.status === 'aberto'; });
            if (pedido) {
                toast('Pedido #' + pedido.id.substr(0,8), 'success');
            } else {
                var data = { cliente_id: cliente.id, cliente_nome: cliente.nome, status: 'aberto', itens: 1, total: produto.preco, user_id: currentUser.id, created_at: new Date().toISOString() };
                var result = await supabaseClient.from('pedidos').insert(data);
                if (result.error) { toast('Erro: ' + result.error.message, 'error'); retomarScanner(); return; }
                toast('Pedido criado!', 'success');
                await carregarDados();
            }
            setTimeout(retomarScanner, 2000);
        }

        function retomarScanner() { if (html5QrCode) html5QrCode.resume(); }
        function buscarProdutoManual() { var codigo = document.getElementById('codigo-manual').value.trim(); if (codigo) { if (html5QrCode) html5QrCode.pause(); verificarProdutoCodigo(codigo); } }

        function abrirModalProdutoComCodigo(codigo) {
            var html = '<div class="modal-title">🏷️ Cadastrar Produto</div><div class="modal-sub">Produto não encontrado</div>';
            html += '<div class="form-group"><label class="form-label">Nome</label><input class="form-input" id="produto-nome"></div>';
            html += '<div class="form-group"><label class="form-label">Código</label><input class="form-input" id="produto-codigo" value="' + codigo + '" readonly></div>';
            html += '<div class="form-group"><label class="form-label">Preço (R$)</label><input class="form-input" id="produto-preco" type="number" step="0.01"></div>';
            html += '<button class="btn btn-primary" onclick="salvarProdutoDoScanner()">Salvar</button>';
            html += '<button class="btn btn-outline" onclick="fecharModal(); retomarScanner()">Cancelar</button>';
            document.getElementById('modal-body').innerHTML = html;
            document.getElementById('modal-overlay').classList.add('show');
            setTimeout(function() { document.getElementById('produto-nome').focus(); }, 300);
        }

        async function salvarProdutoDoScanner() {
            var nome = document.getElementById('produto-nome').value.trim();
            var codigo = document.getElementById('produto-codigo').value.trim();
            var preco = parseFloat(document.getElementById('produto-preco').value);
            if (!nome || !codigo || !preco) { toast('Preencha tudo', 'error'); return; }
            if (produtos.find(function(p) { return p.codigo === codigo; })) { toast('Já cadastrado!', 'error'); return; }
            var result = await supabaseClient.from('produtos').insert({ nome: nome, codigo: codigo, preco: preco, user_id: currentUser.id, created_at: new Date().toISOString() });
            if (result.error) { toast('Erro: ' + result.error.message, 'error'); return; }
            toast('Produto salvo!', 'success');
            fecharModal();
            await carregarDados();
            setTimeout(retomarScanner, 1000);
        }

        function abrirModalClienteDoScanner() {
            var html = '<div class="modal-title">👥 Novo Cliente</div><div class="modal-sub">Preencha os dados</div>';
            html += '<div class="form-group"><label class="form-label">Nome</label><input class="form-input" id="cliente-nome"></div>';
            html += '<div class="form-group"><label class="form-label">Telefone</label><input class="form-input" id="cliente-telefone"></div>';
            html += '<div class="form-group"><label class="form-label">Endereço</label><input class="form-input" id="cliente-endereco"></div>';
            html += '<button class="btn btn-primary" onclick="salvarClienteDoScanner()">Salvar</button>';
            html += '<button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>';
            document.getElementById('modal-body').innerHTML = html;
            document.getElementById('modal-overlay').classList.add('show');
        }

        async function salvarClienteDoScanner() {
            var nome = document.getElementById('cliente-nome').value.trim();
            if (!nome) { toast('Nome obrigatório', 'error'); return; }
            var result = await supabaseClient.from('clientes').insert({ nome: nome, telefone: document.getElementById('cliente-telefone').value, endereco: document.getElementById('cliente-endereco').value, user_id: currentUser.id, created_at: new Date().toISOString() });
            if (result.error) { toast('Erro: ' + result.error.message, 'error'); return; }
            toast('Cliente salvo!', 'success');
            fecharModal();
            await carregarDados();
        }

        function abrirModalCliente() {
            var html = '<div class="modal-title">👥 Cadastrar Cliente</div><div class="modal-sub">Preencha os dados</div>';
            html += '<div class="form-group"><label class="form-label">Nome</label><input class="form-input" id="cliente-nome"></div>';
            html += '<div class="form-group"><label class="form-label">Telefone</label><input class="form-input" id="cliente-telefone"></div>';
            html += '<div class="form-group"><label class="form-label">Endereço</label><input class="form-input" id="cliente-endereco"></div>';
            html += '<button class="btn btn-primary" onclick="salvarCliente()">Salvar</button>';
            html += '<button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>';
            document.getElementById('modal-body').innerHTML = html;
            document.getElementById('modal-overlay').classList.add('show');
        }

        async function salvarCliente() {
            var nome = document.getElementById('cliente-nome').value.trim();
            if (!nome) { toast('Nome obrigatório', 'error'); return; }
            var result = await supabaseClient.from('clientes').insert({ nome: nome, telefone: document.getElementById('cliente-telefone').value, endereco: document.getElementById('cliente-endereco').value, user_id: currentUser.id, created_at: new Date().toISOString() });
            if (result.error) { toast('Erro: ' + result.error.message, 'error'); return; }
            toast('Cliente salvo!', 'success');
            fecharModal();
            await carregarDados();
            mudarAba('clients');
        }

        function abrirModalProdutoManual() {
            var html = '<div class="modal-title">🏷️ Cadastrar Produto</div><div class="modal-sub">Preencha os dados</div>';
            html += '<div class="form-group"><label class="form-label">Nome</label><input class="form-input" id="produto-nome-manual"></div>';
            html += '<div class="form-group"><label class="form-label">Código</label><input class="form-input" id="produto-codigo-manual"></div>';
            html += '<div class="form-group"><label class="form-label">Preço (R$)</label><input class="form-input" id="produto-preco-manual" type="number" step="0.01"></div>';
            html += '<button class="btn btn-primary" onclick="salvarProdutoManual()">Salvar</button>';
            html += '<button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>';
            document.getElementById('modal-body').innerHTML = html;
            document.getElementById('modal-overlay').classList.add('show');
        }

        async function salvarProdutoManual() {
            var nome = document.getElementById('produto-nome-manual').value.trim();
            var codigo = document.getElementById('produto-codigo-manual').value.trim();
            var preco = parseFloat(document.getElementById('produto-preco-manual').value);
            if (!nome || !codigo || !preco) { toast('Preencha tudo', 'error'); return; }
            if (produtos.find(function(p) { return p.codigo === codigo; })) { toast('Já cadastrado!', 'error'); return; }
            var result = await supabaseClient.from('produtos').insert({ nome: nome, codigo: codigo, preco: preco, user_id: currentUser.id, created_at: new Date().toISOString() });
            if (result.error) { toast('Erro: ' + result.error.message, 'error'); return; }
            toast('Produto salvo!', 'success');
            fecharModal();
            await carregarDados();
            mudarAba('products');
        }

        function fecharModal(e) {
            if (!e || e.target.id === 'modal-overlay') {
                document.getElementById('modal-overlay').classList.remove('show');
                document.getElementById('modal-body').innerHTML = '';
            }
        }

        function novoPedido() { toast('Em desenvolvimento', 'success'); }
        function verPedido(id) { toast('Pedido #' + id.substr(0,8), 'success'); }
        function editarCliente(id) { toast('Editar cliente', 'success'); }
        function editarProduto(id) { toast('Editar produto', 'success'); }

        function toast(msg, tipo) {
            var el = document.createElement('div');
            el.className = 'toast ' + tipo;
            el.textContent = msg;
            document.getElementById('toast-container').appendChild(el);
            setTimeout(function() { el.style.opacity = '0'; setTimeout(function() { el.remove(); }, 300); }, 3000);
        }
    </script>
</body>
</html>
