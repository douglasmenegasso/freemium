<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyPulse">
<meta name="mobile-web-app-capable" content="yes">

<title>MyPulse - Venda Consignada</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon-dark.png">
<link rel="shortcut icon" href="apple-touch-icon-dark.png">
<style>
:root{
  --bg:#0f0f12;--bg2:#18181f;--bg3:#22222c;--surface:#1e1e28;
  --border:#2e2e3d;--accent:#6c63ff;--accent2:#a78bfa;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;
  --text:#f0f0f5;--text2:#9999b3;--text3:#5a5a75;
  --radius:14px;--radius-sm:8px;
  --font:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;}
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;flex-shrink:0;}
.header-title{font-size:18px;font-weight:700;letter-spacing:-0.4px;}
.header-sub{font-size:12px;color:var(--text2);margin-top:1px;}
.content{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;padding-bottom:80px;margin-bottom:0}
.nav {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    flex-shrink: 0;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    padding-bottom: env(safe-area-inset-bottom);
}

.nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 10px 2px 12px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text2);
    font-size: 12px;
}

.nav-btn.active {
    color: var(--accent2);
}

.nav-btn .icon {
    font-size: 20px;
}
.nav-btn .icon{font-size:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.card-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:var(--radius-sm);font-size:15px;font-weight:600;font-family:var(--font);cursor:pointer;border:none;transition:all .15s;width:100%;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-red{background:var(--red);color:#fff;}
.btn-amber{background:var(--amber);color:#000;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;}
.form-group{margin-bottom:14px;}
.form-label{font-size:13px;color:var(--text2);margin-bottom:6px;display:block;}
.form-hint{font-size:11px;color:var(--text3);margin-top:4px;}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-size:16px;color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s;-webkit-appearance:none;}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--text3);}
.search-wrap{position:relative;margin-bottom:14px;}
.search-wrap .form-input{padding-left:40px;}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}
/* Scanner */
.scan-box{position:relative;border-radius:var(--radius);overflow:hidden;background:#000;height:min(40vh, 280px);margin-bottom:4px;}
.scan-box video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
.scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.scan-frame{width:70%;height:40%;position:relative;}
.sc{position:absolute;width:24px;height:24px;border-color:var(--accent2);border-style:solid;}
.sc.tl{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0;}
.sc.tr{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0;}
.sc.bl{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px;}
.sc.br{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0;}
.scan-line{position:absolute;width:100%;height:2px;background:linear-gradient(90deg,transparent,var(--accent2),transparent);animation:scanline 2s linear infinite;}
@keyframes scanline{0%{top:0}100%{top:100%}}
.cam-overlay{position:absolute;inset:0;background:rgba(15,15,18,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;text-align:center;border-radius:var(--radius);}
.manual-bar{display:flex;gap:8px;margin-bottom:14px;}
.manual-bar .form-input{flex:1;}
.manual-bar button{flex-shrink:0;padding:0 18px;height:46px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;}
.item-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.item-row:last-child{border-bottom:none;}
.item-icon{width:38px;height:38px;border-radius:var(--radius-sm);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.item-info{flex:1;min-width:0;}
.item-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.item-price{font-size:15px;font-weight:700;color:var(--green);flex-shrink:0;}
.client-card{background:var(--bg3);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer;border:1px solid transparent;transition:border-color .15s;}
.client-card:active{border-color:var(--accent);}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:2000;animation:fadeIn .15s;padding:20px;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border-radius:var(--radius);width:100%;max-width:400px;padding:24px;max-height:90dvh;overflow-y:auto;animation:modalPop .2s;box-shadow:0 20px 40px rgba(0,0,0,0.4);border:1px solid var(--border);}
@keyframes modalPop{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-size:20px;font-weight:700;margin-bottom:6px;}
.modal-sub{font-size:14px;color:var(--text2);margin-bottom:16px;line-height:1.5;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:30px;padding:10px 20px;font-size:14px;font-weight:500;z-index:3000;white-space:nowrap;animation:toastIn .2s;pointer-events:none;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:var(--red);}
.toast.info{border-color:var(--accent2);color:var(--accent2);}
.total-bar{background:var(--bg2);border-top:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.empty{text-align:center;padding:40px 24px;color:var(--text2);}
.empty .icon{font-size:44px;margin-bottom:10px;}
.qty-ctrl{display:flex;align-items:center;gap:8px;}
.qty-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.qty-num{font-size:14px;font-weight:700;min-width:18px;text-align:center;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.row{display:flex;gap:10px;}
.row .form-group{flex:1;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.4px;}
.badge-amber{background:rgba(245,158,11,.15);color:var(--amber);}
.badge-green{background:rgba(34,197,94,.15);color:var(--green);}
.badge-blue{background:rgba(59,130,246,.15);color:var(--blue);}
.scan-icon-btn{flex-shrink:0;width:44px;height:44px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.section-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
.status-banner{border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.status-waiting{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--amber);}
/* Login Screen */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
	/* iOS Install Prompt */
	#ios-install-prompt{position:fixed;bottom:20px;left:20px;right:20px;background:var(--bg2);border:1px solid var(--accent);border-radius:var(--radius);padding:16px;z-index:3000;display:none;box-shadow:0 10px 30px rgba(0,0,0,0.5);animation:slideUp 0.5s ease-out;}
	@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
	.install-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
	.install-icon{width:40px;height:40px;border-radius:8px;}
	.install-text{font-size:14px;font-weight:600;}
	.install-steps{font-size:12px;color:var(--text2);line-height:1.4;}
	.install-steps span{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;background:var(--bg3);border-radius:4px;margin:0 2px;font-size:10px;vertical-align:middle;}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:32px 24px;width:100%;max-width:360px;text-align:center;}
.login-logo{font-size:48px;margin-bottom:16px;}
.login-title{font-size:24px;font-weight:800;margin-bottom:8px;}
.login-sub{font-size:14px;color:var(--text2);margin-bottom:32px;}
.login-btn{margin-bottom:12px;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><img src="icon-192-dark.png" style="width:80px;height:80px;border-radius:20px;box-shadow:0 10px 20px rgba(0,0,0,0.3);"></div>

		    <button class="btn btn-primary login-btn" onclick="solicitarLogin()">👑 Administrador</button>

<span id="header-clock" style="color:var(--text2);"></span>

<script>
// Script de Limpeza Forçada de Cache (Anti-Stall)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(registrations => {
    for (let registration of registrations) {
      if (localStorage.getItem('last_sw_reset') !== 'v4.1.2') {
        registration.unregister();
        console.log('SW antigo removido para atualização.');
      }
    }
    if (localStorage.getItem('last_sw_reset') !== 'v4.1.2') {
      localStorage.setItem('last_sw_reset', 'v4.1.2');
      caches.keys().then(names => {
        for (let name of names) caches.delete(name);
      });
      setTimeout(() => location.reload(true), 500);
    }
  });

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js?v=4.1.2').then(reg => {
      reg.update();
    }).catch(err => console.warn('SW:', err));
  });
}

// ── Enter key global handler ──────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  const active = document.activeElement;
  if (!active) return;
  const id = active.id;

  // Manual barcode input
  if (id === 'manual-code') { e.preventDefault(); submitManualCode(); return; }

  // Modal: login password
  if (id === 'login-pass') { e.preventDefault(); checkAdminPass(); return; }

  // Modal: new admin setup
  if (id === 'new-pass' || id === 'new-email') {
    if (id === 'new-email') { e.preventDefault(); setupAdmin(); }
    return;
  }

  // Modal: recovery key
  if (id === 'rec-key') { e.preventDefault(); validateRecoveryKey(); return; }

  // Modal: reset password
  if (id === 'reset-pass') { e.preventDefault(); resetAdminPass(); return; }

  // Modal: product/client name fields — submit nearest primary button
  if (id === 'prod-name' || id === 'prod-price' || id === 'prod-code' ||
      id === 'client-name' || id === 'client-phone' || id === 'gh-repo' || id === 'gh-token') {
    e.preventDefault();
    const btn = document.querySelector('.modal .btn-primary');
    if (btn) btn.click();
    return;
  }

  // Modal: quantity inputs — submit nearest primary button
  if (active.type === 'number' && active.closest('.modal')) {
    e.preventDefault();
    const btn = active.closest('.modal').querySelector('.btn-primary');
    if (btn) btn.click();
    return;
  }
});


// Lógica de Detecção de iOS para Instalação
function checkIOSInstall() {
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const isAndroid = /Android/.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
  
  if (!isStandalone) {
    const prompt = document.getElementById('ios-install-prompt');
    if (prompt) {
      if (isIOS) {
        prompt.innerHTML = `
          <div style="font-size:24px;margin-bottom:8px;">📲</div>
          <div style="font-weight:700;margin-bottom:4px;">Instalar MyPulse no iPhone</div>
          <div style="font-size:12px;opacity:0.9;">Toque no ícone de <b>compartilhar</b> <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Ios_share_icon.svg/1200px-Ios_share_icon.svg.png" style="height:16px;vertical-align:middle;"> e selecione <b>"Adicionar à Tela de Início"</b>.</div>
        `;
        prompt.style.display = 'block';
      } else if (isAndroid) {
        prompt.innerHTML = `
          <div style="font-size:24px;margin-bottom:8px;">📲</div>
          <div style="font-weight:700;margin-bottom:4px;">Instalar MyPulse no Android</div>
          <div style="font-size:12px;opacity:0.9;">Toque no ícone de <b>três pontos</b> <span style="font-size:16px;vertical-align:middle;">⋮</span> no topo do Chrome e selecione <b>"Instalar Aplicativo"</b>.</div>
        `;
        prompt.style.display = 'block';
      }
    }
  }
}
// Tenta rodar em diferentes estágios para garantir
window.addEventListener('DOMContentLoaded', function() {
  checkIOSInstall();
  ['login-ver','hdr-ver','cfg-ver'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = APP_VERSION;
  });
});
window.addEventListener('load', checkIOSInstall);
setTimeout(checkIOSInstall, 2000); // Backup caso demore a carregar

// FREEMIUM — limites e controle de plano
// ══════════════════════════════════════════════════════════
const PLAN_LIMITS = { free: { clients: 3, products: 20 }, pro: { clients: Infinity, products: Infinity } };
const PLAN_FEATURES = { free: { pdf: false, cloud: false, multiUser: false }, pro: { pdf: true, cloud: true, multiUser: true } };

function getPlan() {
  return S.security && S.security.proKey ? 'pro' : 'free';
}

function isPro() { return getPlan() === 'pro'; }

function canAddClient() {
  if (isPro()) return true;
  return Object.keys(S.clients).length < PLAN_LIMITS.free.clients;
}

function canAddProduct() {
  if (isPro()) return true;
  return Object.keys(S.products).length < PLAN_LIMITS.free.products;
}


function saveLocal() {
  DB.save('csn_products', S.products);
  DB.save('csn_clients',  S.clients);
  DB.save('csn_orders',   S.orders);
  DB.save('csn_closed',   S.closed);
  DB.save('csn_returned', S.returned);
  DB.save('csn_security', S.security);
}

function save() {
  saveLocal();
  S.lastSaved = Date.now();
  ghSaveQueued();
}

async function setupAdmin() {
    const email = document.getElementById('new-email').value;
    const senha = document.getElementById('new-pass').value;

    if (!email || !senha) {
        toast('Preencha todos os campos', 'err');
        return;
    }

    if (senha.length < 6) {
        toast('Senha deve ter pelo menos 6 caracteres', 'err');
        return;
    }

    const btn = event.target;
    const textoOriginal = btn.innerText;
    btn.innerText = ' Processando...';
    btn.disabled = true;

    try {
        // 1. Primeiro tenta fazer LOGIN (se o usuário já existe)
        let { data: authData, error: loginError } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: senha,
        });

        // 2. Se falhar o login, tenta CRIAR o usuário
        if (loginError && loginError.message.includes('Invalid login credentials')) {
            console.log('Usuário não existe, criando...');
            
            const { data: signUpData, error: signUpError } = await supabaseClient.auth.signUp({
                email: email,
                password: senha,
            });

            if (signUpError) throw signUpError;
            authData = signUpData;

            // Cria o perfil na tabela profiles
            if (authData.user) {
                const { error: profileError } = await supabaseClient
                    .from('profiles')
                    .insert({
                        id: authData.user.id,
                        email: email,
                        is_pro: true,
                        plan_expires_at: null
                    });

                if (profileError && !profileError.message.includes('duplicate')) {
                    console.error('Erro perfil:', profileError);
                }
            }

            // Faz login após criar
            const { error: loginAfterCreate } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: senha,
            });

            if (loginAfterCreate) throw loginAfterCreate;
        } else if (loginError) {
            throw loginError;
        }

        // 3. Salva localmente
        S.adminPass = senha;
        S.recoveryEmail = email;
        DB.save('csn_adminpass', senha);
        DB.save('csn_recoveryemail', email);

        toast('✅ Administrador configurado!', 'success');

        // 4. Fecha modal e recarrega
        if (typeof closeModal === 'function') {
            closeModal();
        }
        location.reload();

    } catch (error) {
        toast('❌ ' + error.message, 'err');
        btn.innerText = textoOriginal;
        btn.disabled = false;
    }
}

const GH_FILE = 'dados.json';
function utf8_to_b64(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = ''; bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}
function b64_to_utf8(str) {
  const bin = atob(str);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

async function ghReq(method, path, body) {
  if (!S.ghToken || !S.ghRepo) return null;
  const r = await fetch(`https://api.github.com/repos/${S.ghRepo}/contents/${path}`, {
    method,
    headers: {
      'Authorization': 'token ' + S.ghToken,
      'Content-Type': 'application/json',
      'Accept': 'application/vnd.github.v3+json'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message); }
  return r.json();
}

async function ghLoad() {
  if (!S.ghToken || !S.ghRepo) return false;
  try {
    const f = await ghReq('GET', GH_FILE);
    const d = JSON.parse(b64_to_utf8(f.content.replace(/\n/g, '')));
    S.products = JSON.parse(JSON.stringify(d.products || {}));
    S.clients  = JSON.parse(JSON.stringify(d.clients  || {}));
    S.orders   = JSON.parse(JSON.stringify(d.orders   || {}));
    S.closed   = JSON.parse(JSON.stringify(d.closed   || []));
    if (d.security) {
      if (!S.adminPass) { S.adminPass = d.security.adminPass; DB.save('csn_adminpass', S.adminPass); }
      if (!S.recoveryKey) { S.recoveryKey = d.security.recoveryKey; DB.save('csn_recoverykey', S.recoveryKey); }
      if (!S.recoveryEmail) { S.recoveryEmail = d.security.recoveryEmail; DB.save('csn_recoveryemail', S.recoveryEmail); }
      if (d.security.validProKeys) { S.security.validProKeys = d.security.validProKeys; }
      if (d.security.proKeysMap) { S.security.proKeysMap = d.security.proKeysMap; }
    }
    S.lastSaved = d.savedAt ? new Date(d.savedAt).getTime() : 0;
    saveLocal();
    return true;
  } catch(e) {
    if (e.message && e.message.includes('Not Found')) return false;
    throw e;
  }
}

let _ghSaving = false;
let _ghQueued = false;

async function ghSaveQueued() {
  if (!isPro()) return;
  if (!S.ghToken || !S.ghRepo) return;
  if (_ghSaving) { _ghQueued = true; return; }
  _ghSaving = true;
  _ghQueued = false;
  try { await _ghDoSave(); }
  catch(e) {}
  finally {
    _ghSaving = false;
    if (_ghQueued) { _ghQueued = false; setTimeout(ghSaveQueued, 1000); }
  }
}

async function _ghDoSave() {
  const savedAt = new Date().toISOString();
  const d = {
    products: JSON.parse(JSON.stringify(S.products)),
    clients:  JSON.parse(JSON.stringify(S.clients)),
    orders:   JSON.parse(JSON.stringify(S.orders)),
    closed:   JSON.parse(JSON.stringify(S.closed)),
    returned: JSON.parse(JSON.stringify(S.returned || {})),
    security: { 
      adminPass: S.adminPass, 
      recoveryKey: S.recoveryKey, 
      recoveryEmail: S.recoveryEmail, 
      validProKeys: S.security.validProKeys || [],
      proKeysMap: S.security.proKeysMap || {}
    },
    savedAt
  };
  const content = utf8_to_b64(JSON.stringify(d, null, 2));
  let sha;
  try { const f = await ghReq('GET', GH_FILE); sha = f.sha; } catch(e) {}
  try {
    await ghReq('PUT', GH_FILE, { message: 'Sync ' + new Date().toLocaleString('pt-BR'), content, ...(sha ? { sha } : {}) });
    S.lastSaved = new Date(savedAt).getTime();
    S.lastSync = new Date().getTime();
    DB.save('csn_lastsync', S.lastSync);
  } catch(e) {
    if (e.message && e.message.includes('does not match')) {
      let sha2;
      try { const f2 = await ghReq('GET', GH_FILE); sha2 = f2.sha; } catch(e2) {}
      await ghReq('PUT', GH_FILE, { message: 'Sync retry ' + new Date().toLocaleString('pt-BR'), content, ...(sha2 ? { sha: sha2 } : {}) });
      S.lastSaved = new Date(savedAt).getTime();
      S.lastSync = new Date().getTime();
      DB.save('csn_lastsync', S.lastSync);
    } else { throw e; }
  }
}

async function syncNow() {
  if (!isPro()) { showPaywall('cloud'); return; }
  if (!S.ghToken || !S.ghRepo) { toast('Configure a Nuvem nas ⚙️ Config', 'info'); return; }
  toast('Sincronizando…', 'info');
  try { await _ghDoSave(); toast('✓ Sincronizado!', 'ok'); }
  catch(e) { toast('Erro: ' + e.message, 'err'); }
}

let _saveTimer = null;
let _pullTimer = null;

function updateClock() {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  const dateStr = now.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
  const clockEl = document.getElementById('header-clock');
  const cloudStatusEl = document.getElementById('cloud-status');
  if (cloudStatusEl) {
    if (S.ghToken && S.ghRepo) {
      // Online se conectado — só marca Offline se lastSync > 10min ou nunca sincronizou nesta sessão
      const tenMin = 10 * 60 * 1000;
      const isOnline = navigator.onLine;
      if (!isOnline) {
        cloudStatusEl.innerHTML = '☁️ Offline';
        cloudStatusEl.style.color = 'var(--amber)';
      } else if (S.lastSync && (Date.now() - S.lastSync > tenMin)) {
        cloudStatusEl.innerHTML = '☁️ Sincronizando...';
        cloudStatusEl.style.color = 'var(--amber)';
      } else {
        cloudStatusEl.innerHTML = '☁️ Online';
        cloudStatusEl.style.color = 'var(--green)';
      }
    } else {
      cloudStatusEl.innerHTML = '☁️ Desconectado';
      cloudStatusEl.style.color = 'var(--text3)';
    }
  }
  if (clockEl) clockEl.textContent = `${dateStr} ${timeStr}`;
}

function startAutoSync() {
  updateClock();
  setInterval(updateClock, 1000);
  stopAutoSync();
  if (!S.ghToken || !S.ghRepo) return;
  _saveTimer = setInterval(() => ghSaveQueued(), 60000);
  _pullTimer = setInterval(() => ghPull(), 30000);
}
function stopAutoSync() {
  if (_saveTimer) { clearInterval(_saveTimer); _saveTimer = null; }
  if (_pullTimer) { clearInterval(_pullTimer); _pullTimer = null; }
}

async function ghPull() {
  if (_ghSaving || !S.ghToken || !S.ghRepo) return;
  try {
    const f = await ghReq('GET', GH_FILE);
    if (!f) return;
    const d = JSON.parse(b64_to_utf8(f.content.replace(/\n/g, '')));
    if (!d.savedAt) return;
    const remoteT = new Date(d.savedAt).getTime();
    const localT  = S.lastSaved || 0;
    if (remoteT > localT + 3000) {
      S.products  = JSON.parse(JSON.stringify(d.products || {}));
      S.clients   = JSON.parse(JSON.stringify(d.clients  || {}));
      S.orders    = JSON.parse(JSON.stringify(d.orders   || {}));
      S.closed    = JSON.parse(JSON.stringify(d.closed   || []));
      if (d.security) {
        S.adminPass = d.security.adminPass;
        S.recoveryKey = d.security.recoveryKey;
        S.recoveryEmail = d.security.recoveryEmail;
        DB.save('csn_adminpass', S.adminPass);
        DB.save('csn_recoverykey', S.recoveryKey);
        DB.save('csn_recoveryemail', S.recoveryEmail);
      }
      S.lastSaved = remoteT;
      saveLocal();
      toast('☁️ Dados atualizados de outro dispositivo', 'info');
      refreshCurrentTab();
    }
  } catch(e) {}
}

function refreshCurrentTab() {
  const t = S.tab;
  if      (t === 'scan')     renderScan();
  else if (t === 'clients')  renderClients();
  else if (t === 'products') renderProducts();
  else if (t === 'orders')   renderOrders();
  else if (t === 'history')  renderHistory();
  else if (t === 'settings') renderSettings();
}

function fmt(v) { return 'R$ ' + Number(v || 0).toFixed(2).replace('.', ','); }
function initials(n) { return (n || '?').split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase(); }
function fmtDate(iso) {
  if (!iso) return '--';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '--';
  return d.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });
}

  el.textContent = msg;
  document.getElementById('toast-root').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function closeModal() {
  // Não paramos o scanner ao fechar modal para manter a câmera ativa
  document.getElementById('modal-root').innerHTML = '';
  // Se estiver na aba scan e a câmera estiver desligada, religa
  if (S.tab === 'scan' && !_active) {
    _startScanner('main-video', handleCode, 'cam-overlay', 'cam-msg', 'cam-btn');
  }
}

// ══════════════════════════════════════════════════════════
// SCANNER ENGINE
// ══════════════════════════════════════════════════════════
let _stream  = null;
let _reader  = null;
let _scanRAF = null;
let _bd      = null;
let _active  = false, _lastScan = 0, _lastCode = '';

function _hasBarcodeDetector() { return typeof BarcodeDetector !== 'undefined'; }

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 1800;
    osc.type = 'square';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.12);
  } catch(e) {}
}

async function _getStream() {
  const constraints = { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280, max: 1920 }, height: { ideal: 720, max: 1080 } } };
  try { return await navigator.mediaDevices.getUserMedia(constraints); }
  catch(e) {
    try { return await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: 'environment' } } }); }
    catch(e2) { return await navigator.mediaDevices.getUserMedia({ video: true }); }
  }
}

async function _playVideo(video, stream) {
  video.srcObject = stream;
  video.setAttribute('playsinline', '');
  video.setAttribute('webkit-playsinline', '');
  video.muted = true;
  await new Promise((res, rej) => {
    const tid = setTimeout(() => rej(new Error('timeout')), 10000);
    const go = () => { clearTimeout(tid); video.play().then(res).catch(rej); };
    video.readyState >= 3 ? go() : video.addEventListener('canplay', go, { once: true });
  });
}

function _makeZXingReader() {
  if (typeof ZXing === 'undefined') return null;
  const hints = new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
    ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8, ZXing.BarcodeFormat.CODE_128,
    ZXing.BarcodeFormat.QR_CODE, ZXing.BarcodeFormat.UPC_A, ZXing.BarcodeFormat.UPC_E,
    ZXing.BarcodeFormat.CODE_39, ZXing.BarcodeFormat.ITF,
  ]);
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
  hints.set(ZXing.DecodeHintType.CHARACTER_SET, 'UTF-8');
  return new ZXing.BrowserMultiFormatReader(hints, { delayBetweenScanAttempts: 80, delayBetweenScanSuccess: 1500 });
}

async function _startBarcodeDetectorLoop(video, onCode) {
  _bd = new BarcodeDetector({ formats: ['ean_13','ean_8','code_128','qr_code','upc_a','upc_e','code_39','itf'] });
  let last = '', lastT = 0, frameCount = 0;
  async function tick() {
    if (!_active) return;
    frameCount++;
    if (frameCount % 3 !== 0) { _scanRAF = requestAnimationFrame(tick); return; }
    try {
      if (video.readyState >= 2) {
        const results = await _bd.detect(video);
        if (results && results.length > 0) {
          const code = results[0].rawValue;
          const now = Date.now();
          if (code !== last || now - lastT > 2500) { last = code; lastT = now; onCode(code); }
        }
      }
    } catch(e) {}
    if (_active) _scanRAF = requestAnimationFrame(tick);
  }
  _scanRAF = requestAnimationFrame(tick);
}

function _stopScanner() {
  _active = false;
  if (_scanRAF) { cancelAnimationFrame(_scanRAF); _scanRAF = null; }
  if (_reader)  { try { _reader.reset(); } catch(e) {} _reader = null; }
  if (_stream)  { _stream.getTracks().forEach(t => t.stop()); _stream = null; }
  _bd = null;
}

async function _startScanner(videoId, onCode, overlayId, msgId, btnId) {
  const video = document.getElementById(videoId); if (!video) return;
  _stopScanner(); _active = true;
  await new Promise(res => setTimeout(res, 300)); if (!_active) return;
  const overlay = document.getElementById(overlayId);
  const msg = document.getElementById(msgId);
  const btn = document.getElementById(btnId);
  if (overlay) overlay.style.display = 'flex';
  if (msg) msg.innerHTML = '⏳ Iniciando câmera…';
  if (btn) btn.style.display = 'none';
  try {
    _stream = await _getStream();
    await _playVideo(video, _stream);
    if (overlay) overlay.style.display = 'none';
    const wrappedOnCode = (code) => {
      const now = Date.now();
      if (code === _lastCode && (now - _lastScan) < 3000) return; // Debounce de 3 segundos para o mesmo código
      _lastCode = code; _lastScan = now;
      beep(); onCode(code);
    };
    if (_hasBarcodeDetector()) { await _startBarcodeDetectorLoop(video, wrappedOnCode); }
    else {
      _reader = _makeZXingReader();
      if (!_reader) { throw new Error('ZXing not loaded'); }
      _reader.decodeFromStream(_stream, video, (result) => { if (!result || !_active) return; wrappedOnCode(result.getText()); });
    }
  } catch(err) {
    _active = false;
    const denied = err.name === 'NotAllowedError' || err.name === 'SecurityError';
    if (overlay) overlay.style.display = 'flex';
    if (msg) msg.innerHTML = denied ? '🍎 <b>iPhone:</b> Ajustes → Safari → Câmera → Permitir<br><br>Ou use a entrada manual abaixo.' : 'Câmera não disponível.<br>Use a entrada manual abaixo.';
    if (btn) btn.style.display = denied ? 'flex' : 'none';
  }
}

function showTab(tab) {
  S.tab = tab;
  ['scan','clients','products','orders','settings'].forEach(t =>
    document.getElementById('nav-' + t).classList.toggle('active', t === tab));
  _stopScanner();
  document.getElementById('total-slot').innerHTML = '';
  if      (tab === 'scan')     renderScan();
  else if (tab === 'clients')  renderClients();
  else if (tab === 'products') renderProducts();
  else if (tab === 'orders')   renderOrders();
  else if (tab === 'history')  renderHistory();
  else if (tab === 'settings') renderSettings();
}

function renderScan() {

    setTimeout(() => _startScanner('main-video', handleCode, 'cam-overlay', 'cam-msg', 'cam-btn'), 100);
  }

  const clientBanner = client
    ? `<div class="client-card" onclick="showClientPicker()" style="margin-bottom:4px;">
        <div class="avatar" style="width:44px;height:44px;font-size:16px;background:var(--accent);">${initials(client.name)}</div>

        <div style="font-size:12px;color:var(--text2);">${client.phone || 'Sem telefone'}</div></div>
        <div style="font-size:20px;color:var(--text2);">›</div>

  const statusBanner = (order && items.length && status === 'waiting')
    ? `<div class="status-banner status-waiting">⏳ Aguardando devolução — pode adicionar ou devolver itens. <br> <small>(Para editar quantidades, reabra o pedido abaixo)</small></div>`
    : '';

  const itemCount = items.reduce((s, i) => s + i.qty, 0);
  const orderTotal = items.reduce((s, i) => s + (i.price * i.qty), 0);
  const itemsHtml = items.length ? `<div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">
      <span>📦 Itens no pedido (${itemCount})</span>
      <span style="color:var(--accent);">${fmt(orderTotal)}</span>
    </div>
    ${items.map(i => `<div class="item-row">
      <div class="item-icon">📦</div>
      <div class="item-info"><div class="item-name">${i.name}</div><div class="item-sub">${i.code}</div></div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty('${i.code}',-1)">−</button>
        <span class="qty-num">${i.qty}</span>
        <button class="qty-btn" onclick="changeQty('${i.code}',1)">+</button>
      </div>
      <div class="item-price">${fmt(i.price * i.qty)}</div>
    </div>`).join('')}
  </div>` : '';

  let actionBtns = '';
  if (client && items.length) {
    if (status === 'open') {
      actionBtns = `<button class="btn btn-amber" style="margin-bottom:10px;" onclick="setOrderWaiting()">⏳ Finalizar pedido (aguardar devolução)</button>`;
    } else if (status === 'waiting') {
      actionBtns = `<button class="btn btn-green" style="margin-bottom:10px;" onclick="showPaymentModal()">💰 Registrar pagamento</button>
      <button class="btn btn-outline" style="margin-bottom:10px;" onclick="reopenOrder()">↩ Reabrir pedido</button>`;
    }
  }

  document.getElementById('content').innerHTML = `
    <div style="margin-bottom:12px;">${clientBanner}</div>
    <div class="mode-bar" style="display:flex;background:var(--bg3);border-radius:var(--radius-sm);padding:4px;gap:4px;margin-bottom:14px;">
      <button class="mode-opt ${S.scanMode === 'sale' ? 'active' : ''}" onclick="setScanMode('sale')" style="flex:1;padding:8px;border-radius:6px;border:none;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;background:${S.scanMode === 'sale' ? 'var(--accent)' : 'none'};color:${S.scanMode === 'sale' ? '#fff' : 'var(--text2)'};">🛒 Venda</button>
      <button class="mode-opt ${S.scanMode === 'return' ? 'active' : ''}" onclick="setScanMode('return')" style="flex:1;padding:8px;border-radius:6px;border:none;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;background:${S.scanMode === 'return' ? 'var(--accent)' : 'none'};color:${S.scanMode === 'return' ? '#fff' : 'var(--text2)'};">↩ Devolução</button>
    </div>
    <div class="scan-box">
      <video id="main-video" playsinline webkit-playsinline muted autoplay></video>
      <div class="scan-overlay"><div class="scan-frame">
        <span class="sc tl"></span><span class="sc tr"></span>
        <span class="sc bl"></span><span class="sc br"></span>
        <div class="scan-line"></div>
      </div></div>
      <div class="cam-overlay" id="cam-overlay" style="display:none;">
        <div style="font-size:40px;">📷</div>
        <div style="font-size:15px;font-weight:700;">Acesso à câmera</div>
        <div id="cam-msg" style="font-size:13px;color:var(--text2);line-height:1.7;max-width:270px;"></div>
        <button class="btn btn-primary" id="cam-btn" style="width:auto;padding:12px 24px;" onclick="_startScanner('main-video', handleCode, 'cam-overlay', 'cam-msg', 'cam-btn')">Permitir câmera</button>
      </div>
    </div>
    <div style="text-align:center;font-size:12px;color:var(--text2);margin-bottom:10px;">
      📏 Mantenha o código centralizado · distância ~15cm
    </div>
    <div class="manual-bar">
      <input class="form-input" id="manual-code" placeholder="Ou digite o código…" inputmode="numeric" autocomplete="off"/>
      <button class="btn btn-primary btn-sm" style="width:auto;padding:0 16px;" onclick="submitManualCode()">Buscar</button>
    </div>
    ${S.activeClient ? `<button class="btn btn-outline" style="margin-bottom:10px;font-size:13px;" onclick="showAddItemManual('${S.activeClient}')">🔍 Buscar produto por nome</button>` : ''}
    ${statusBanner}
    ${itemsHtml}
    ${actionBtns}
    <div style="height:16px;"></div>
  `;

  document.getElementById('header-sub').textContent = client ? `Cliente: ${client.name}` : 'Selecione um cliente para iniciar';
  document.getElementById('manual-code').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); submitManualCode(); } });
  if (order && items.length) {
    document.getElementById('total-slot').innerHTML = `<div class="total-bar"><span style="font-size:14px;color:var(--text2);">Total</span><span style="font-size:22px;font-weight:800;color:var(--green);">${fmt(order.total)}</span></div>`;
  }
  requestAnimationFrame(() => _startScanner('main-video', handleCode, 'cam-overlay', 'cam-msg', 'cam-btn'));
}

function submitManualCode() {
  const inp = document.getElementById('manual-code');
  const code = (inp?.value || '').trim();
  if (!code) { toast('Digite um código', 'err'); return; }
  inp.value = ''; handleCode(code);
}

function setScanMode(m) { S.scanMode = m; renderScan(); }

function handleCode(code) {
  code = code.toString().trim(); if (!code) return;
  // Busca exata ou com fallback para string se for número
  let product = S.products[code];
  
  // Se não achou, tenta buscar por código numérico se o input for string
  if (!product) {
    product = Object.values(S.products).find(p => String(p.code).trim() === code);
    if (product) code = product.code; // Normaliza o código para o encontrado
  }

  if (!product) { showRegisterProduct(code); return; }
  
  // Bloqueio de edição em status 'waiting'
  const order = S.orders[S.activeClient];
  if (order && order.status === 'waiting') {
    toast('Pedido em espera. Reabra para editar.', 'err');
    return;
  }

  if (S.scanMode === 'sale') handleSaleScan(code, product);
  else handleReturnScan(code, product);
}

function changeQty(code, delta) {
  const order = S.orders[S.activeClient]; if (!order || !order.items[code]) return;

  if (order.status === 'waiting') {
    toast('Reabra o pedido para alterar quantidades.', 'err');
    return;
  }

  if (delta < 0) {
    const item = order.items[code];
    if (!S.returned[S.activeClient]) S.returned[S.activeClient] = {};
    if (!S.returned[S.activeClient][code]) {
      S.returned[S.activeClient][code] = { code: code, name: item.name, price: item.price, qty: 0, lastAt: '' };
    }
    S.returned[S.activeClient][code].qty += Math.abs(delta);
    S.returned[S.activeClient][code].lastAt = new Date().toISOString();
  }

  order.items[code].qty += delta;
  order.total = Math.max(0, (order.total || 0) + delta * order.items[code].price);
  if (order.items[code].qty <= 0) delete order.items[code];
  save(); renderScan();
}


// ══════════════════════════════════════════════════════════
// ORDER FLOW
// ══════════════════════════════════════════════════════════
function handleSaleScan(code, product) {
  if (!S.activeClient) { showSelectOrCreateClient(code, product); return; }
  addToOrder(code, product);
}

function handleReturnScan(code, product) {
  if (!S.activeClient) { toast('Selecione um cliente', 'err'); return; }
  const order = S.orders[S.activeClient];
  if (!order || !order.items[code] || order.items[code].qty <= 0) { toast('Item não está no pedido deste cliente', 'err'); return; }
  const rName = order.items[code].name || product.name;
  const rPrice = order.items[code].price || product.price;
  order.items[code].qty--;
  order.total = Math.max(0, (order.total || 0) - product.price);
  if (order.items[code].qty === 0) delete order.items[code];
  if (!S.returned[S.activeClient]) S.returned[S.activeClient] = {};
  if (!S.returned[S.activeClient][code]) S.returned[S.activeClient][code] = { code, name: rName, price: rPrice, qty: 0, lastAt: '' };
  S.returned[S.activeClient][code].qty++;
  S.returned[S.activeClient][code].lastAt = new Date().toISOString();
  save(); toast('↩ Devolvido: ' + rName); renderScan();
}

function addToOrder(code, product, force = false) {
  if (!S.activeClient) { toast('Selecione um cliente primeiro', 'err'); return; }
  if (!S.orders[S.activeClient]) S.orders[S.activeClient] = { clientId: S.activeClient, items: {}, total: 0, status: 'open' };
  const order = S.orders[S.activeClient];
  
  if (!force) {
    const returnedRec = S.returned[S.activeClient] && S.returned[S.activeClient][code];
    if (returnedRec) {
      const rMsg = 'O cliente ja provou ' + product.name + ' e devolveu ' + returnedRec.qty + 'x em ' + fmtDate(returnedRec.lastAt) + '. Deseja adicionar ao pedido mesmo assim?';
      showModal('<div class="modal-handle"></div>'
        + '<div class="modal-title" style="color:var(--blue);">&#8629; Item Ja Devolvido</div>'
        + '<div class="modal-sub">' + rMsg + '</div>'
        + '<div class="form-group" style="margin-top:12px;"><label class="form-label">Quantidade:</label>'
        + '<div style="display:flex;gap:8px;"><input type="number" id="ret-qty" class="form-input" value="1" min="1" style="text-align:center;font-size:18px;flex:1;">'
        + '<button class="btn btn-primary" style="width:48px;font-size:24px;" onclick="const q=parseInt(document.getElementById(\'ret-qty\').value)||1;addToOrder(\''+code+'\',S.products[\''+code+'\'],true,q);toast(\'✓ Adicionado\');">+</button></div></div>'
        + '<div style="display:flex;flex-direction:column;gap:8px;margin-top:8px;">'
        + '<button class="btn btn-outline" style="background:var(--accent);color:#fff;border:none;" onclick="closeModal()">Concluir</button>'
        + '<button class="btn btn-outline" onclick="closeModal()">Cancelar</button>'
        + '</div>');
      return;
    }
    // 1. Verificar histórico do cliente
    const boughtBefore = S.closed.some(o => o.clientId === S.activeClient && o.items[code]);
    // 2. Verificar se já está no pedido atual
    const inCurrentOrder = order.items[code];
    
    if (boughtBefore || inCurrentOrder) {
      // Busca histórico de compras deste item pelo cliente
      const pastOrders = S.closed.filter(o => o.clientId === S.activeClient && o.items[code]);
      let historyHtml = '';
      if (pastOrders.length) {
        historyHtml += '<div style="margin:10px 0 4px;font-size:12px;color:var(--text3);font-weight:600;">Histórico de compras</div>';
        historyHtml += '<div style="background:var(--bg2);border-radius:10px;padding:8px 12px;margin-bottom:8px;">';
        pastOrders.slice(-3).reverse().forEach(o => {
          historyHtml += '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bg3);">'
            + '<span style="font-size:12px;color:var(--text2);">' + fmtDate(o.closedAt) + '</span>'
            + '<span style="font-size:12px;font-weight:700;color:var(--text1);">' + o.items[code].qty + 'x &nbsp;' + fmt(o.items[code].price * o.items[code].qty) + '</span>'
            + '</div>';
        });
        historyHtml += '</div>';
      }
      const currentQtyHtml = inCurrentOrder
        ? '<div style="font-size:12px;color:var(--amber);margin-bottom:8px;">⚠️ Já no pedido: <b>' + order.items[code].qty + 'x</b></div>'
        : '';
      showModal(
        '<div class="modal-handle"></div>'
        + '<div class="modal-title" style="color:var(--amber);">⚠️ Aviso de Item</div>'
        + '<div style="font-weight:600;font-size:15px;margin-bottom:6px;">' + product.name + '</div>'
        + currentQtyHtml
        + historyHtml
        + '<div class="form-group">'
        + '<label class="form-label">Quantidade a adicionar:</label>'
        + '<div style="display:flex;align-items:center;gap:8px;margin-top:6px;">'
        + '<button class="btn btn-outline" style="width:52px;height:52px;font-size:24px;padding:0;flex-shrink:0;" onclick="const el=document.getElementById(\'confirm-qty\');const v=parseInt(el.value)||1;if(v>1)el.value=v-1;">−</button>'
        + '<input type="number" id="confirm-qty" class="form-input" value="1" min="1" style="text-align:center;font-size:22px;font-weight:700;flex:1;height:52px;">'
        + '<button class="btn btn-primary" style="width:52px;height:52px;font-size:24px;padding:0;flex-shrink:0;" onclick="const el=document.getElementById(\'confirm-qty\');const v=parseInt(el.value)||1;el.value=v+1;">+</button>'
        + '</div>'
        + '</div>'
        + '<div style="display:flex;flex-direction:column;gap:8px;margin-top:12px;">'
        + '<button class="btn btn-primary" onclick="const q=parseInt(document.getElementById(\'confirm-qty\').value)||1;addToOrder(\''+code+'\',S.products[\''+code+'\'],true,q);closeModal();">✅ Adicionar ao Pedido</button>'
        + '<button class="btn btn-outline" onclick="closeModal()">Cancelar</button>'
        + '</div>'
      );
      return;
    }
    
    // Se for um item novo, pergunta a quantidade se não for scan rápido (opcional, mas vamos colocar direto)
    showModal(`
      <div class="modal-handle"></div>
      <div class="modal-title">📦 Adicionar Item</div>
      <div class="modal-sub">${product.name}</div>
      <div style="font-size:13px;color:var(--text3);margin-bottom:8px;">Preço unit.: ${fmt(product.price)}</div>
      <div class="form-group">
        <label class="form-label">Quantidade:</label>
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
          <button class="btn btn-outline" style="width:52px;height:52px;font-size:24px;padding:0;flex-shrink:0;"
            onclick="const el=document.getElementById('new-item-qty');const v=parseInt(el.value)||1;if(v>1){el.value=v-1;}">−</button>
          <input type="number" id="new-item-qty" class="form-input" value="1" min="1"
            style="text-align:center;font-size:22px;font-weight:700;flex:1;height:52px;">
          <button class="btn btn-primary" style="width:52px;height:52px;font-size:24px;padding:0;flex-shrink:0;"
            onclick="const el=document.getElementById('new-item-qty');const v=parseInt(el.value)||1;el.value=v+1;">+</button>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:12px;">
        <button class="btn btn-primary" onclick="const q=parseInt(document.getElementById('new-item-qty').value)||1;addToOrder('${code}',S.products['${code}'],true,q);closeModal();">✅ Adicionar ao Pedido</button>
        <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      </div>
    `);
    return;
  }

  // Lógica de adição real (chamada com force=true)
  const qtyToAdd = arguments[3] || 1;
  if (order.items[code]) order.items[code].qty += qtyToAdd;
  else order.items[code] = { code, name: product.name, price: product.price, qty: qtyToAdd };
  
  order.total = Object.values(order.items).reduce((s, i) => s + (i.price * i.qty), 0);
  save(); toast(`✓ ${qtyToAdd}x ${product.name}`); renderScan();
}

function setOrderWaiting() {
  const order = S.orders[S.activeClient]; if (!order) return;
  order.status = 'waiting'; save(); toast('⏳ Aguardando devolução'); renderScan();
}

function reopenOrder() {
  const order = S.orders[S.activeClient]; if (!order) return;

function showPaymentModal() {
  const client = S.clients[S.activeClient];
  const order  = S.orders[S.activeClient]; if (!order) return;
  const items = Object.values(order.items || {});
  showModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">💰 Registrar pagamento</div>
    <div class="modal-sub">${client.name}${client.phone ? ' · ' + client.phone : ''}</div>
    <div class="card" style="margin-bottom:16px;">
      ${items.map(i => `<div class="item-row"><div class="item-info"><div class="item-name">${i.name}</div><div class="item-sub">Qtd: ${i.qty}</div></div><div class="item-price">${fmt(i.price * i.qty)}</div></div>`).join('')}
      <div class="divider"></div>

    </div>
    <div style="background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:var(--radius-sm);padding:12px;font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6;">✅ Após confirmar, o pedido será registrado como PAGO e não poderá ser editado.</div>
    <button class="btn btn-green" style="margin-bottom:10px;" onclick="confirmPayment('${S.activeClient}')">✅ Confirmar pagamento</button>
    <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
  `);
}

function confirmPayment(clientId) {
  const client = S.clients[clientId];
  const order  = S.orders[clientId]; if (!order) return;
  
  // Persistência cumulativa: Se já existe um histórico de devoluções, mantemos.
  // A lógica de S.returned já é cumulativa por natureza no handleReturnScan.
  // O que vamos garantir é que S.closed registre o pedido sem apagar o histórico de devoluções.
  
  S.closed.unshift({ 
    clientId, 
    clientName: client.name, 
    clientPhone: client.phone || '', 
    items: { ...order.items }, 
    total: order.total, 
    closedAt: new Date().toISOString() 
  });
  
  delete S.orders[clientId];
  // Não deletamos S.returned[clientId] para manter o histórico cumulativo de devoluções.
  
  if (S.activeClient === clientId) S.activeClient = null;
  save(); closeModal(); toast(`✅ Pagamento de ${client.name} registrado!`); showTab('orders');
}

// ── Helpers para modal de cliente ──────────────────
function _clientModal(title, name, phone, footer) {
  showModal(
    '<div class="modal-handle"></div>'
    + '<div class="modal-title">' + title + '</div>'
    + '<div class="form-group"><label class="form-label">Nome *</label>'
    + '<input type="text" id="cf-name" class="form-input" placeholder="Nome do cliente" value="' + (name||'') + '"></div>'
    + '<div class="form-group"><label class="form-label">Telefone / WhatsApp</label>'
    + '<input type="tel" id="cf-phone" class="form-input" placeholder="(00) 00000-0000" value="' + (phone||'') + '"></div>'
    + (footer || '')
  );
  setTimeout(() => { const el = document.getElementById('cf-name'); if (el) el.focus(); }, 100);
}

function _readCF() {
  const name  = (document.getElementById('cf-name')  || {}).value || '';
  const phone = (document.getElementById('cf-phone') || {}).value || '';
  return { name: name.trim(), phone: phone.trim() };
}

function showNewClientForm(redirect) { _clientModal('Novo Cliente', '', '', `<div class="row"><div class="form-group"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button></div><div class="form-group"><button class="btn btn-primary" onclick="saveNewClient('${redirect || ''}')">Salvar</button></div></div>`); }
function showNewClientFormThen(code) { _clientModal('Novo Cliente', '', '', `<div class="row"><div class="form-group"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button></div><div class="form-group"><button class="btn btn-primary" onclick="saveNewClientAndAdd('${code}')">Salvar e Adicionar</button></div></div>`); }

function saveNewClient(redirect) {
  console.log('Validando limite de clientes...');
  if (!canAddClient()) { 
    console.log('Limite atingido, mostrando paywall');
    showPaywall('client'); 
    return; 
  }
  const { name, phone } = _readCF(); if (!name) { toast('Preencha o nome', 'err'); return; }
  const id = phone ? phone.replace(/\D/g, '') : 'c_' + Date.now();
  S.clients[id] = { id, name, phone }; save(); closeModal(); toast(`Cliente ${name} cadastrado!`);
  if (redirect) showTab(redirect); else setTimeout(() => renderScan(), 100);
}

function saveNewClientAndAdd(code) {
  if (!canAddClient()) { showPaywall('client'); return; }
  const { name, phone } = _readCF(); if (!name) { toast('Preencha o nome', 'err'); return; }
  const id = phone ? phone.replace(/\D/g, '') : 'c_' + Date.now();
  S.clients[id] = { id, name, phone }; S.activeClient = id; save(); closeModal();
  setTimeout(() => { _startScanner('main-video', handleCode, 'cam-overlay', 'cam-msg', 'cam-btn'); addToOrder(code, S.products[code]); }, 400);
}

function showEditClient(id) {
  const c = S.clients[id];
  _clientModal('Editar Cliente', c.name, c.phone || '', `<div class="row"><div class="form-group"><button class="btn btn-outline" onclick="showClientDetail('${id}')">Cancelar</button></div><div class="form-group"><button class="btn btn-primary" onclick="updateClient('${id}')">Salvar</button></div></div>`);
}

function updateClient(id) {
  const { name, phone } = _readCF(); if (!name) { toast('Preencha o nome', 'err'); return; }
  S.clients[id] = { ...S.clients[id], name, phone }; save(); closeModal(); renderClients(); toast('Cliente atualizado!');
}

function deleteClient(id) {
  if (!confirm('Excluir este cliente e seu pedido?')) return;
  delete S.clients[id]; delete S.orders[id]; if (S.activeClient === id) S.activeClient = null;
  save(); closeModal(); renderClients(); toast('Cliente excluído');
}

function addItemToClient(clientId, code, qty = null) {
  const product = S.products[code]; if (!product) return;
  S.activeClient = clientId;

    addToOrder(code, product, true, qty);
    toast('✅ Item adicionado: ' + product.name, 'ok');
  } else {
    // Adição via clique na linha (abre o modal de confirmação/quantidade)
    addToOrder(code, product);
  }
}

function renderHistory() {
  const clients = Object.values(S.clients);
  if (!clients.length) {
    document.getElementById('content').innerHTML =
      '<div class="empty"><div class="icon">📊</div><p>Nenhum cliente cadastrado ainda.</p></div>';
    return;
  }

  // Build client summary: total items sent, paid, returned, open
  const summaries = clients.map(c => {
    const cid = c.id;
    // Active order
    const order = S.orders[cid];
    const activeItems = order ? Object.values(order.items || {}) : [];
    const activeQty = activeItems.reduce((s,i) => s + i.qty, 0);
    const activeTotal = activeItems.reduce((s,i) => s + i.price * i.qty, 0);
    const activeStatus = order ? (order.status || 'open') : null;

    // Closed/paid
    const closedOrders = (S.closed || []).filter(o => o.clientId === cid);
    const paidQty = closedOrders.reduce((s,o) => s + Object.values(o.items||{}).reduce((ss,i) => ss+i.qty,0), 0);
    const paidTotal = closedOrders.reduce((s,o) => s + (o.total||0), 0);

    // Returned
    const retItems = S.returned && S.returned[cid] ? Object.values(S.returned[cid]) : [];
    const retQty = retItems.reduce((s,i) => s + i.qty, 0);

    // All unique products ever touched
    const allProducts = new Set();
    activeItems.forEach(i => allProducts.add(i.code || i.name));
    closedOrders.forEach(o => Object.keys(o.items||{}).forEach(k => allProducts.add(k)));
    retItems.forEach(i => allProducts.add(i.code || i.name));

    return { c, cid, activeQty, activeTotal, activeStatus, paidQty, paidTotal, retQty, totalProducts: allProducts.size, closedOrders };
  }).filter(s => s.activeQty > 0 || s.paidQty > 0 || s.retQty > 0)
    .sort((a,b) => (b.paidTotal + b.activeTotal) - (a.paidTotal + a.activeTotal));

  const searchBar = `
    <div style="position:relative;margin-bottom:16px;">
      <input type="text" id="history-search" class="form-input"
        placeholder="🔍 Buscar cliente..."
        oninput="filterHistory(this.value)"
        style="padding-left:16px;">
    </div>`;

  const cards = summaries.map(s => {
    const { c, cid, activeQty, activeTotal, activeStatus, paidQty, paidTotal, retQty, totalProducts } = s;
    const statusBadge = activeStatus === 'waiting'
      ? '<span style="background:rgba(251,191,36,.15);color:var(--amber);padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;">⏳ Aguardando</span>'
      : activeStatus === 'open'
      ? '<span style="background:rgba(108,99,255,.15);color:var(--accent2);padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;">📋 Em aberto</span>'
      : '';

    return `<div class="card history-card" data-name="${c.name.toLowerCase()}" style="cursor:pointer;margin-bottom:10px;" onclick="showClientHistory('${cid}')">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
        <div class="avatar" style="width:44px;height:44px;font-size:16px;flex-shrink:0;">${initials(c.name)}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:700;font-size:15px;">${c.name}</div>
          <div style="font-size:12px;color:var(--text3);">${c.phone || 'Sem telefone'} · ${totalProducts} produto${totalProducts !== 1 ? 's' : ''}</div>
        </div>
        ${statusBadge}
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;">
        <div style="background:var(--bg2);border-radius:10px;padding:8px 4px;">
          <div style="font-size:18px;font-weight:700;color:var(--accent2);">${activeQty}</div>
          <div style="font-size:10px;color:var(--text3);">Em mãos</div>
        </div>
        <div style="background:var(--bg2);border-radius:10px;padding:8px 4px;">
          <div style="font-size:18px;font-weight:700;color:var(--green);">${paidQty}</div>
          <div style="font-size:10px;color:var(--text3);">Pagos</div>
        </div>
        <div style="background:var(--bg2);border-radius:10px;padding:8px 4px;">
          <div style="font-size:18px;font-weight:700;color:var(--text3);">${retQty}</div>
          <div style="font-size:10px;color:var(--text3);">Devolvidos</div>
        </div>
      </div>
      ${paidTotal > 0 ? `<div style="margin-top:10px;text-align:right;font-size:13px;color:var(--text3);">Total pago: <b style="color:var(--green);">${fmt(paidTotal)}</b></div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = summaries.length
    ? searchBar + cards
    : '<div class="empty"><div class="icon">📊</div><p>Nenhuma movimentação registrada.</p></div>';
}

function filterHistory(q) {
  const term = q.toLowerCase();
  document.querySelectorAll('.history-card').forEach(el => {
    el.style.display = el.dataset.name.includes(term) ? '' : 'none';
  });
}

function showClientHistory(cid) {
  const c = S.clients[cid]; if (!c) return;

  // ── Active order items
  const order = S.orders[cid];
  const activeItems = order ? Object.values(order.items || {}) : [];
  const activeStatus = order ? (order.status || 'open') : null;

  // ── Closed orders
  const closedOrders = (S.closed || []).filter(o => o.clientId === cid)
    .sort((a,b) => new Date(b.closedAt) - new Date(a.closedAt));

  // ── Returned items
  const retMap = (S.returned && S.returned[cid]) ? S.returned[cid] : {};
  const retItems = Object.values(retMap);

  // ── Build sections
  let html = `<div class="modal-handle"></div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
      <div class="avatar" style="width:48px;height:48px;font-size:18px;">${initials(c.name)}</div>
      <div>
        <div style="font-weight:700;font-size:17px;">${c.name}</div>
        <div style="font-size:12px;color:var(--text3);">${c.phone || 'Sem telefone'}</div>
      </div>
    </div>`;

  // Active/Waiting items
  if (activeItems.length) {
    const stLabel = activeStatus === 'waiting' ? '⏳ Aguardando devolução' : '📋 Em aberto';
    const stColor = activeStatus === 'waiting' ? 'var(--amber)' : 'var(--accent2)';
    html += `<div style="font-size:11px;font-weight:700;color:${stColor};text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">${stLabel}</div>`;
    html += '<div style="background:var(--bg2);border-radius:12px;padding:10px 12px;margin-bottom:14px;">';
    activeItems.forEach(i => {
      const retEntry = retMap[i.code] || Object.values(retMap).find(r => r.name === i.name) || null;
      const retQty = retEntry ? (retEntry.qty || 0) : 0;
      const inHands = i.qty - retQty;
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bg3);">
        <div>
          <div style="font-size:13px;font-weight:600;">${i.name}</div>
          <div style="font-size:11px;color:var(--text3);">Enviado: ${i.qty}x${retQty > 0 ? ` · Devolvido: ${retQty}x` : ''} · Em mãos: ${Math.max(0,inHands)}x</div>
        </div>
        <div style="font-size:13px;font-weight:700;color:${stColor};">${fmt(i.price * i.qty)}</div>
      </div>`;
    });
    const activeTotal = activeItems.reduce((s,i) => s + i.price * i.qty, 0);
    html += `<div style="display:flex;justify-content:space-between;padding-top:8px;">
      <span style="font-size:12px;font-weight:600;">Total em aberto</span>
      <span style="font-size:14px;font-weight:700;color:${stColor};">${fmt(activeTotal)}</span>
    </div></div>`;
  }

  // Paid orders
  if (closedOrders.length) {
    html += `<div style="font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">✅ Pedidos Pagos (${closedOrders.length})</div>`;
    closedOrders.forEach((o, oi) => {
      const oItems = Object.values(o.items || {});
      html += `<div style="background:var(--bg2);border-radius:12px;padding:10px 12px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:11px;color:var(--text3);">📅 ${fmtDate(o.closedAt)}</span>
          <span style="font-size:12px;font-weight:700;color:var(--green);">${fmt(o.total)}</span>
        </div>`;
      oItems.forEach(i => {
        html += `<div style="display:flex;justify-content:space-between;padding:4px 0;border-top:1px solid var(--bg3);">
          <span style="font-size:12px;color:var(--text2);">${i.name} <span style="color:var(--text3);">×${i.qty}</span></span>
          <span style="font-size:12px;font-weight:600;">${fmt(i.price * i.qty)}</span>
        </div>`;
      });
      html += '</div>';
    });
  }

  // Returned items — always show section
  html += '<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">↩ Itens Devolvidos (' + retItems.length + ')</div>';
  html += '<div style="background:var(--bg2);border-radius:12px;padding:10px 12px;margin-bottom:14px;">';
  if (retItems.length) {
    retItems.forEach(i => {
      const retEntry = retMap[i.code] || Object.values(retMap).find(r => r.name === i.name) || i;
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bg3);">'
        + '<div>'
        + '<div style="font-size:13px;font-weight:600;color:var(--text1);">' + i.name + '</div>'
        + '<div style="font-size:11px;color:var(--text3);">Devolvido ' + i.qty + 'x' + (i.lastAt ? ' · ' + fmtDate(i.lastAt) : '') + '</div>'
        + '</div>'
        + '<div style="text-align:right;">'
        + '<div style="font-size:13px;font-weight:700;color:var(--text3);">↩ ' + i.qty + 'x</div>'
        + (i.price ? '<div style="font-size:11px;color:var(--text3);">' + fmt(i.price * i.qty) + '</div>' : '')
        + '</div>'
        + '</div>';
    });
  } else {
    html += '<div style="text-align:center;font-size:13px;color:var(--text3);padding:8px 0;">Nenhum item devolvido registrado.</div>';
  }
  html += '</div>';

  if (!activeItems.length && !closedOrders.length && !retItems.length) {
    html += '<div class="empty" style="padding:20px 0;"><p>Nenhuma movimentação registrada para este cliente.</p></div>';
  }

  html += '<button class="btn btn-outline" style="margin-top:4px;" onclick="closeModal()">Fechar</button>';
  showModal(html);
}

function renderOrders() {

  const closed = S.closed || [];
  function orderCard(o) {
    const c = S.clients[o.clientId]; if (!c) return ''; const count = Object.values(o.items).reduce((s, i) => s + i.qty, 0); const isW = o.status === 'waiting';
    return `<div class="card" style="cursor:pointer;" onclick="showOrderDetail('${o.clientId}')"><div style="display:flex;align-items:center;gap:12px;"><div class="avatar" style="width:44px;height:44px;font-size:16px;background:${isW ? 'var(--amber)' : 'var(--accent)'};">${initials(c.name)}</div><div style="flex:1;"><div style="font-size:15px;font-weight:600;">${c.name}</div><div style="font-size:12px;color:var(--text2);">${count} item(s)${c.phone ? ' · ' + c.phone : ''}</div></div><div style="text-align:right;"><div style="font-size:17px;font-weight:800;color:var(--green);">${fmt(o.total)}</div><span class="badge ${isW ? 'badge-amber' : 'badge-blue'}">${isW ? '⏳ AGUARDANDO' : 'EM ABERTO'}</span></div></div></div>`;
  }
  document.getElementById('content').innerHTML = `${waitingOrders.length ? `<div class="section-label">⏳ Aguardando devolução</div>${waitingOrders.map(o => orderCard(o)).join('')}<div style="height:8px;"></div>` : ''}<div class="section-label">Em aberto</div>${openOrders.length ? openOrders.map(o => orderCard(o)).join('') : `<div style="padding:16px 0;text-align:center;color:var(--text2);font-size:14px;">Nenhum pedido em aberto</div>`}${closed.length ? `<div class="section-label" style="margin-top:16px;">Histórico de pagamentos</div>${closed.map((o, i) => `<div class="card" style="cursor:pointer;opacity:.85;" onclick="showClosedDetail(${i})"><div style="display:flex;align-items:center;gap:12px;"><div class="avatar" style="width:44px;height:44px;font-size:16px;background:var(--bg3);color:var(--text2);">${initials(o.clientName)}</div><div style="flex:1;"><div style="font-size:15px;font-weight:600;">${o.clientName}</div><div style="font-size:12px;color:var(--text2);">${fmtDate(o.closedAt)}</div></div><div style="text-align:right;"><div style="font-size:17px;font-weight:800;color:var(--green);">${fmt(o.total)}</div><span class="badge badge-green">PAGO ✅</span></div></div></div>`).join('')}` : ''}<div style="height:12px;"></div>`;
}

function exportBackup() {
  const data = { version: 2, exportedAt: new Date().toISOString(), products: S.products, clients: S.clients, orders: S.orders, closed: S.closed };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a');
  a.href = url; a.download = `consignado-backup-${new Date().toISOString().slice(0, 10)}.json`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); toast('Backup exportado!');

function importBackup(event) {
  const file = event.target.files[0]; if (!file) return; const r = new FileReader();
  r.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result); if (!data.products || !data.clients) { toast('Arquivo inválido', 'err'); return; }
      showModal(`<div class="modal-handle"></div><div class="modal-title">Confirmar importação</div><div class="modal-sub">Backup de ${new Date(data.exportedAt).toLocaleString('pt-BR')}. Dados atuais serão substituídos.</div><div class="row"><div class="form-group"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button></div><div class="form-group"><button class="btn btn-primary" onclick='applyBackup(${JSON.stringify(JSON.stringify(data))})'>Importar</button></div></div>`);
    } catch(e) { toast('Erro ao ler arquivo', 'err'); }
  };
  r.readAsText(file);
}
function applyBackup(jsonStr) { const data = JSON.parse(jsonStr); S.products = data.products; S.clients = data.clients; S.orders = data.orders || {}; S.closed = data.closed || []; S.returned = data.returned || {}; S.activeClient = null; save(); closeModal(); toast('Backup importado!'); renderSettings(); }

function checkLicense() {
  if (!isPro()) return;
  const expDate = new Date(S.security.proExpiresAt);
  const now = new Date();
  const diffTime = expDate - now;
  const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

  if (diffDays <= 0) {
    S.security.proKey = '';
    save();
    showModal(`
      <div class="modal-handle"></div>
      <div class="modal-title">⌛ Licença Expirada</div>
      <div class="modal-sub">Sua licença Pro venceu. O app voltou ao modo gratuito, mas seus dados estão seguros.</div>
      <button class="btn btn-primary" onclick="showPlans()">Renovar Agora</button>
      <button class="btn btn-outline" style="margin-top:8px;" onclick="closeModal()">Continuar no Grátis</button>
    `);
  } else if (diffDays <= 5) {
    showModal(`
      <div class="modal-handle"></div>
      <div class="modal-title">⚠️ Licença Vencendo</div>
      <div class="modal-sub">Sua licença Pro vence em <b>${diffDays} dias</b>. Renove agora para evitar o bloqueio dos recursos ilimitados.</div>
      <button class="btn btn-primary" onclick="showPlans()">Renovar Licença</button>
      <button class="btn btn-outline" style="margin-top:8px;" onclick="closeModal()">Lembrar mais tarde</button>
    `);
  }
}

    // Função para gerar PDF de Pedido
    window.generateOrderPDF = async function generateOrderPDF(order, type) {
      if (type === undefined) type = 'full';
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });
      const pageW = doc.internal.pageSize.getWidth();
      // Logo centralizada com fundo transparente (PNG com transparência)
      try {
        // Renderiza icone com cantos arredondados mantendo fundo escuro
        await new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            const size = img.width;
            const radius = size * 0.22; // raio de arredondamento ~22%
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            // Clip com cantos arredondados
            ctx.beginPath();
            ctx.moveTo(radius, 0);
            ctx.lineTo(size - radius, 0);
            ctx.quadraticCurveTo(size, 0, size, radius);
            ctx.lineTo(size, size - radius);
            ctx.quadraticCurveTo(size, size, size - radius, size);
            ctx.lineTo(radius, size);
            ctx.quadraticCurveTo(0, size, 0, size - radius);
            ctx.lineTo(0, radius);
            ctx.quadraticCurveTo(0, 0, radius, 0);
            ctx.closePath();
            ctx.clip();
            ctx.drawImage(img, 0, 0);
            try { doc.addImage(canvas.toDataURL('image/png'), 'PNG', (pageW - 32) / 2, 6, 32, 32); } catch(e) {}
            resolve();
          };
          img.onerror = resolve;
          img.src = 'data:image/png;base64,' + LOGO_B64;
        });
      } catch(e) {}
      // Title below bar
      doc.setFontSize(15); doc.setFont('helvetica', 'bold'); doc.setTextColor(30,30,30);
      const title = type === 'paid' ? 'Recibo de Pagamento' : 'Pedido de Consignação';
      doc.text(title, pageW / 2, 46, { align: 'center' });
      doc.setDrawColor(180,180,180); doc.line(10, 50, pageW-10, 50);
      doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(30,30,30);
      const closedAt = order.closedAt || order.date || new Date().toISOString();
      // Dados da empresa no topo do PDF
      if (S.company && S.company.name) {
        doc.setFontSize(9); doc.setFont('helvetica', 'bold'); doc.setTextColor(80,80,80);
        doc.text(S.company.name, pageW / 2, 46, { align: 'center' });
        doc.setFont('helvetica', 'normal');
        if (S.company.responsible) doc.text(S.company.responsible, pageW / 2, 51, { align: 'center' });
        if (S.company.phone) doc.text(S.company.phone, pageW / 2, 56, { align: 'center' });
        doc.setTextColor(30,30,30);
      }
      doc.text('Cliente: ' + (order.clientName || '--'), 10, 58);
      doc.text('Telefone: ' + (order.clientPhone || '--'), 10, 64);
      doc.text('Data: ' + fmtDate(closedAt), 10, 70);
      doc.line(10, 74, pageW-10, 74);
      doc.setFont('helvetica','bold');
      doc.text('Produto', 10, 81);
      doc.text('Qtd', pageW-55, 81, { align: 'right' });
      doc.text('Unit.', pageW-33, 81, { align: 'right' });
      doc.text('Subtotal', pageW-10, 81, { align: 'right' });
      doc.setDrawColor(120,120,120); doc.line(10, 84, pageW-10, 84);
      doc.setFont('helvetica','normal');
      let y = 92; let grandTotal = 0;
      for (const code in order.items) {
        const item = order.items[code];
        let qty = item.qty;
        if (type === 'paid') qty = qty - (item.returned || 0);
        if (qty <= 0) continue;
        const subtotal = item.price * qty;
        grandTotal += subtotal;
        if (y > 265) { doc.addPage(); y = 20; }
        doc.text(String(item.name || '').substring(0,36), 10, y);
        doc.text(String(qty), pageW-55, y, { align: 'right' });
        doc.text(fmt(item.price), pageW-33, y, { align: 'right' });
        doc.text(fmt(subtotal), pageW-10, y, { align: 'right' });
        doc.setDrawColor(220,220,220); doc.line(10, y+3, pageW-10, y+3);
        doc.setDrawColor(120,120,120); y += 10;
      }
      y += 2; doc.line(10, y, pageW-10, y); y += 7;
      doc.setFont('helvetica','bold'); doc.setFontSize(13);
      doc.text('Total a Pagar:', 10, y);
      doc.text(fmt(grandTotal), pageW-10, y, { align: 'right' });
      doc.setFont('helvetica','italic'); doc.setFontSize(7); doc.setTextColor(160,160,160);
      doc.text('Gerado por MyPulse - Venda Consignada', pageW/2, y+16, { align: 'center' });
      return doc.output('blob');
    }

    window.sharePDF = async function sharePDF(order, type = 'full') {
      if (!isPro()) { showPaywall('pdf'); return; }
      try {
        // Enrich order with client info if missing (open/waiting orders don't store clientName)
        if (!order.clientName && order.clientId && S.clients[order.clientId]) {
          order = Object.assign({}, order, {
            clientName:  S.clients[order.clientId].name  || '',
            clientPhone: S.clients[order.clientId].phone || ''
          });
        }
        const pdfBlob = await generateOrderPDF(order, type);
        const clientLabel = (order.clientName || 'Cliente').replace(/\s/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
        const fileName = 'MyPulse_Pedido_' + clientLabel + '_' + new Date().toISOString().slice(0,10) + '.pdf';
        const file = new File([pdfBlob], fileName, { type: 'application/pdf' });

        if (navigator.share) {
          await navigator.share({
            files: [file],
            title: `Pedido MyPulse - ${order.clientName}`,
            text: `Detalhes do pedido de ${order.clientName}`,
          });
          toast('PDF compartilhado com sucesso!', 'ok');
        } else {
          // Fallback para download em navegadores que não suportam Web Share API
          const url = URL.createObjectURL(file);
          const a = document.createElement('a');
          a.href = url;
          a.download = fileName;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          toast('PDF baixado.', 'info');
        }
      } catch (error) {
        console.error('Erro ao gerar PDF:', error, 'order:', JSON.stringify(order));
        toast('Erro ao gerar PDF: ' + (error.message || error), 'err');
      }
    }

    function toast(message, type = 'info') {
      const toastRoot = document.getElementById('toast-root');
      const toastEl = document.createElement('div');
      toastEl.className = `toast ${type}`;
      toastEl.textContent = message;
      toastRoot.appendChild(toastEl);

      setTimeout(() => {
        toastEl.remove();
      }, 3000);
    }

  const keyInput = document.getElementById('pro-key');
  const key = (keyInput ? keyInput.value : '').trim().toUpperCase();
  if (!key) { toast('Digite a chave de ativação', 'err'); return; }
  
  toast('Validando chave...', 'info');
  
  try {
    if (!S.ghToken || !S.ghRepo) {
      toast('Conecte a nuvem primeiro nas configurações.', 'err');
      return;
    }

    const res = await fetch(`https://api.github.com/repos/${S.ghRepo}/contents/dados.json`, {
      headers: { 'Authorization': `token ${S.ghToken}` }
    });
    const fileData = await res.json();
    const content = JSON.parse(atob(fileData.content));
    const validKeys = content.security?.validProKeys || [];
    
    const keyData = validKeys.find(k => k.key === key);

    if (keyData) {
      if (keyData.uses >= keyData.limit) {
        toast('Esta chave já atingiu o limite de ativações.', 'err');
        return;
      }

      keyData.uses += 1;
      keyData.lastUsedAt = new Date().toISOString();
      
      const updatedContent = btoa(JSON.stringify(content, null, 2));
      await fetch(`https://api.github.com/repos/${S.ghRepo}/contents/dados.json`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${S.ghToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: `fix: activate key ${key}`, content: updatedContent, sha: fileData.sha })
      });

      S.security.proKey = key;
      const expDate = new Date();
      expDate.setDate(expDate.getDate() + (keyData.days || 30));
      S.security.proExpiresAt = expDate.toISOString();
      
      save();
      toast('🎉 Plano Pro ativado com sucesso!', 'ok');
      setTimeout(() => {
          closeModal();
          location.reload();
      }, 1500);
    } else {
      toast('Chave inválida ou inexistente.', 'err');
    }
  } catch (e) {
    console.error(e);
    toast('Erro ao validar chave na nuvem.', 'err');
  }
}

function fallbackActivate() {
    const validLegacy = S.security.validProKeys || [];
    if (validLegacy.includes(key)) {
      S.security.proKey = key;
      save();
      closeModal();
      toast('🎉 Plano Pro ativado!', 'ok');
      setTimeout(() => location.reload(), 1000);
    } else {
      toast('Chave inválida ou não encontrada.', 'err');
    }
}

function doAppUpdate() {
  const b = document.getElementById('update-banner');
  if (b) b.innerHTML = '<div style="text-align:center;color:#fff;padding:4px 0;font-size:13px;">Limpando cache profundo...</div>';
  
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(registrations => {
      for (let r of registrations) r.unregister();
    });
  }

  if ('caches' in window) {
    caches.keys().then(keys => {
      for (let k of keys) caches.delete(k);
    });
  }

  localStorage.removeItem('last_sw_reset');
  
  setTimeout(() => {
    window.location.href = 'index.html?t=' + Date.now();
  }, 1000);
}

async function checkAppUpdate() {
  if (!navigator.onLine) return;
  try {
    const res = await fetch('version_v41.json', { cache: 'no-store', signal: AbortSignal.timeout(5000) });
    if (!res.ok) return;
    const data = await res.json();
    if (data.version && data.version !== APP_VERSION) {
      showUpdateBanner(data.version);
    } else {
      const b = document.getElementById('update-banner');
      if (b) b.remove();
    }
  } catch(e) {}
}

if (navigator.onLine) checkAppUpdate();
setInterval(checkAppUpdate, 5 * 60 * 1000);
window.addEventListener('online', checkAppUpdate);

<script>
    // Verifica se o usuário está logado ao abrir o app
    async function verificarSessao() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        
        if (session && session.user) {
            // Logado: esconde a tela de login e mostra o app
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            console.log('✅ Logado como:', session.user.email);
        } else {
            // Não logado: mostra a tela de login
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('app').style.display = 'none';
        }
    }

    // Quando clicar em "Administrador" ou "Usuário", abre o prompt de login
    function solicitarLogin(tipo) {
        const email = prompt('📧 Digite seu e-mail de Administrador:');
        if (!email) return;
        
        const senha = prompt('🔒 Digite sua senha:');
        if (!senha) return;

        fazerLoginComSupabase(email, senha, tipo);
    }

    async function fazerLoginComSupabase(email, senha, tipo) {
        try {
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: senha,
            });

            if (error) {
                alert('❌ Erro: ' + error.message);
                return;
            }

            // Salvamos o tipo de perfil no localStorage
            localStorage.setItem('perfilAcesso', tipo);
            console.log('✅ Login realizado como:', tipo);
            
            // Recarrega para aplicar
            location.reload();
        } catch (erro) {
            alert('Erro de conexão. Verifique sua internet.');
        }
    }

    // Logout (pode usar no botão de sair)
    async function fazerLogout() {
        await supabaseClient.auth.signOut();
        localStorage.removeItem('perfilAcesso');
        location.reload();
    }

    // Executa a verificação quando a página carregar
    document.addEventListener('DOMContentLoaded', verificarSessao);
</script>
